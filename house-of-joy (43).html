let tutFrom='sSetup';

function openTutorial(from='sSetup'){
  tutFrom=from;tutStep=0;
  show('sTutorial');
  buildLangBars();
  tutRender();
  startTutAnim();
}

function tutRender(){
  const step=TUTORIAL_STEPS[tutStep];
  // Resize canvas
  const content=document.getElementById('tutContent');
  const headerH=document.getElementById('tutHeader').offsetHeight;
  const bottomH=document.getElementById('tutBottom').offsetHeight;
  const avail=window.innerHeight-headerH-bottomH-60;
  TCv.width=Math.min(window.innerWidth-40,680);
  TCv.height=Math.max(avail,160);
  tutW=TCv.width;tutH=TCv.height;
  // Header
  const L=LANGS[curLang]||LANGS.pt;
  const sid=step.id||'';
  document.getElementById('tutGameTitle').textContent=(sid&&L.tutGame[sid])||step.game;
  document.getElementById('tutGameTitle').style.color=step.color;
  document.getElementById('tb1').style.background=step.color;
  document.getElementById('tb2').style.background=step.color;
  // Progress dots
  const prog=document.getElementById('tutProgress');
  prog.innerHTML='';
  TUTORIAL_STEPS.forEach((_,i)=>{
    const d=document.createElement('div');d.className='tut-dot';
    if(i<tutStep)d.classList.add('done');
    else if(i===tutStep)d.classList.add('active');
    prog.appendChild(d);
  });
  // Text
  document.getElementById('tutDesc').textContent=(sid&&L.tutDesc[sid])||step.desc;
  document.getElementById('tutHint').textContent=(sid&&L.tutHint[sid])||step.hint;
  // Nav buttons
  document.getElementById('tutPrev').style.opacity=tutStep===0?'0.3':'1';
  document.getElementById('tutPrev').style.pointerEvents=tutStep===0?'none':'all';
  const isLast=tutStep===TUTORIAL_STEPS.length-1;
  document.getElementById('tutNext').textContent=isLast?t('tutPlay'):t('tutNext');
  document.getElementById('tutNext').onclick=isLast?tutFinish:()=>tutNav(1);
}

function startTutAnim(){
  if(tutRaf)cancelAnimationFrame(tutRaf);
  tutAnim=0;
  function loop(ts){
    if(document.getElementById('sTutorial').classList.contains('off')){tutRaf=null;return;}
    tutRaf=requestAnimationFrame(loop);
    tutAnim=(ts||0)*.001;
    const step=TUTORIAL_STEPS[tutStep];
    step.draw(TCx,tutW,tutH,tutAnim);
  }
  tutRaf=requestAnimationFrame(loop);
}

function tutNav(dir){
  tutStep=Math.max(0,Math.min(TUTORIAL_STEPS.length-1,tutStep+dir));
  tutRender();
}

function tutFinish(){
  if(tutRaf)cancelAnimationFrame(tutRaf);tutRaf=null;
  show(tutFrom==='sLobby'?'sLobby':'sSetup');
}

// Keyboard nav for tutorial
document.addEventListener('keydown',e=>{
  if(document.getElementById('sTutorial').classList.contains('off'))return;
  if(e.key==='ArrowRight'||e.key==='Enter')tutNav(1);
  if(e.key==='ArrowLeft')tutNav(-1);
  if(e.key==='Escape')tutFinish();
});

show('sSetup');
</script>

<script>

// MOBILE CONTROLS

let mobileMode = false;
let mJoys = [], mActs = [];

// Layout: {jL,jR,jB,jT} for joystick, {aL,aR,aB,aT} for action btn
const M_LAYOUTS = {
  2:[
    {jL:14,jB:14, aL:148,aB:40},
    {jR:14,jB:14, aR:148,aB:40},
  ],
  3:[
    {jL:14,jB:14, aL:148,aB:40},
    {jR:14,jB:14, aR:148,aB:40},

  4:[
    {jL:14,jB:14, aL:148,aB:40},
    {jR:14,jB:14, aR:148,aB:40},
    {jL:14,jT:14, aL:148,aT:40},
    {jR:14,jT:14, aR:148,aT:40},
  ],
};

const _PCOLS = ['#ff4757','#2ed573','#ffa502','#1e90ff'];

function toggleMobileMode(){
  mobileMode = !mobileMode;
  const btn = document.getElementById('mobileModeBtn');
  btn.textContent = '📱 MOBILE: ' + (mobileMode ? 'ON ✓' : 'OFF');
  btn.classList.toggle('on', mobileMode);
  const inGame = !document.getElementById('sGame').classList.contains('off');
  _mShow(mobileMode && inGame);
}

function _injectKey(k, v){
  if(!k) return;
  KD[k] = v;
  KD[k.toLowerCase()] = v;
}

function _mShow(vis){
  mJoys.forEach(j => j.style.display = vis ? 'block' : 'none');
  mActs.forEach(a => a.style.display = vis ? 'flex' : 'none');
}

function buildMobileOverlay(){
  const ov = document.getElementById('mobileOverlay');
  ov.innerHTML = '';
  mJoys = []; mActs = [];
  if(!players || !players.length) return;

  const n = Math.min(numPlayers, 4);
  const lays = M_LAYOUTS[n] || M_LAYOUTS[2];

  players.forEach((pl, pi) => {
    if(pi >= lays.length) return;
    const lay = lays[pi];
    const col = _PCOLS[pi];
    const keys = pl.keys;

    // ── Joystick ──────────────────────
    const joy = document.createElement('div');
    joy.className = 'm-joy-wrap';
    const js = joy.style;
    js.display = 'none';
    js.position = 'fixed';
    js.width = js.height = '120px';
    js.borderRadius = '50%';
    js.border = `2.5px solid ${col}88`;
    js.background = col + '18';
    js.zIndex = '9999';
    js.touchAction = 'none';
    js.userSelect = 'none';
    js.boxSizing = 'border-box';
    if(lay.jL != null) js.left = lay.jL+'px'; else js.right  = lay.jR+'px';
    if(lay.jB != null) js.bottom= lay.jB+'px'; else js.top   = lay.jT+'px';

    // Label
    const lbl = document.createElement('div');
    lbl.textContent = 'P'+(pi+1);
    lbl.style.cssText = `position:absolute;top:-20px;left:50%;transform:translateX(-50%);
      font-family:'Fredoka One',cursive;font-size:.72rem;color:${col};pointer-events:none;`;
    joy.appendChild(lbl);

    // Knob
    const knob = document.createElement('div');
    knob.style.cssText = `position:absolute;top:50%;left:50%;width:46px;height:46px;
      border-radius:50%;transform:translate(-50%,-50%);background:${col};
      box-shadow:0 0 14px ${col}cc;pointer-events:none;`;
    joy.appendChild(knob);

    let tid = null;
    const R = 34, TH = 14;

    let jcx=0, jcy=0; // joystick center, cached on touchstart

    function move(tx, ty){
      const dx = tx-jcx, dy = ty-jcy;
      const d = Math.hypot(dx,dy);
      const s = d>R ? R/d : 1;
      const nx=dx*s, ny=dy*s;
      knob.style.transform = `translate(calc(-50% + ${nx}px),calc(-50% + ${ny}px))`;
      _injectKey(keys.left,  nx < -TH);
      _injectKey(keys.right, nx >  TH);
      _injectKey(keys.up,    ny < -TH);
      _injectKey(keys.down,  ny >  TH);
    }

    function reset(){
      tid = null;
      knob.style.transform = 'translate(-50%,-50%)';
      _injectKey(keys.left,  false);
      _injectKey(keys.right, false);
      _injectKey(keys.up,    false);
      _injectKey(keys.down,  false);
    }

    joy.addEventListener('touchstart', e=>{
      e.preventDefault();
      if(tid!==null)return;
      tid = e.changedTouches[0].identifier;
      // Cache center now that element is fully rendered
      const r = joy.getBoundingClientRect();
      jcx = r.left + r.width/2;
      jcy = r.top  + r.height/2;
      const t=e.changedTouches[0];
      move(t.clientX,t.clientY);
    },{passive:false});

    joy.addEventListener('touchmove', e=>{
      e.preventDefault();
      for(const t of e.changedTouches)
        if(t.identifier===tid) move(t.clientX,t.clientY);
    },{passive:false});

    const endJoy = e=>{
      for(const t of e.changedTouches)
        if(t.identifier===tid){reset();break;}
    };
    joy.addEventListener('touchend',    endJoy);
    joy.addEventListener('touchcancel', endJoy);

    ov.appendChild(joy);
    mJoys.push(joy);

    // ── Action Button ──────────────────
    const act = document.createElement('div');
    act.style.cssText = `display:none;position:fixed;width:68px;height:68px;
      border-radius:50%;align-items:center;justify-content:center;
      font-size:1.5rem;touch-action:none;user-select:none;z-index:9999;
      background:${col}28;border:3px solid ${col}aa;
      box-shadow:0 0 16px ${col}66;transition:filter .07s,transform .07s;`;
    act.textContent = '⚡';
    const as = act.style;
    if(lay.aL != null) as.left = lay.aL+'px'; else as.right  = lay.aR+'px';
    if(lay.aB != null) as.bottom= lay.aB+'px'; else as.top   = lay.aT+'px';

    let atid = null;
    act.addEventListener('touchstart', e=>{
      e.preventDefault();
      act.style.filter = 'brightness(1.6)';
      act.style.transform = 'scale(.9)';
      _injectKey(keys.action, true);
      atid = e.changedTouches[0].identifier;
    },{passive:false});

    const relAct = e=>{
      for(const t of e.changedTouches){
        if(t.identifier===atid){
          act.style.filter = '';
          act.style.transform = '';
          _injectKey(keys.action, false);
          atid = null;
          break;
        }
      }
    };
    act.addEventListener('touchend',    relAct);
    act.addEventListener('touchcancel', relAct);

    ov.appendChild(act);
    mActs.push(act);
  });
}

// Hook into launchGame
const _mOrigLaunch = launchGame;
launchGame = function(id){
  _mOrigLaunch(id);
  if(mobileMode){
    buildMobileOverlay();
    _mShow(true);
  }
};

// Hook into show() to hide controls when leaving game
const _mOrigShow = show;
show = function(...ids){
  _mOrigShow(...ids);
  _mShow(mobileMode && ids.includes('sGame'));
};

// Block canvas scroll
document.getElementById('cv').addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
document.getElementById('cv').addEventListener('touchmove', e=>e.preventDefault(),{passive:false});
</script>
