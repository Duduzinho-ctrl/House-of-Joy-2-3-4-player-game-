<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>HOUSE OF JOY</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#1a1a2e;--panel:#16213e;--card:#0f3460;
  --c1:#ff4757;--c2:#2ed573;--c3:#ffa502;--c4:#1e90ff;
  --gold:#ffd32a;--white:#f1f2f6;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--white);}
canvas{display:block;}

/* == SCREENS == */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.screen.off{display:none!important;}

/* == SHARED == */
.big-title{font-family:'Fredoka One',cursive;font-size:clamp(2.5rem,10vw,5rem);letter-spacing:3px;text-align:center;line-height:1;}
.sub{font-size:.9rem;letter-spacing:3px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-top:6px;}
.btn{font-family:'Fredoka One',cursive;font-size:1.1rem;letter-spacing:2px;border:none;border-radius:50px;padding:14px 36px;cursor:pointer;transition:transform .12s,box-shadow .12s;}
.btn:hover{transform:scale(1.06);}
.btn:active{transform:scale(.96);}
.btn-gold{background:var(--gold);color:#000;box-shadow:0 4px 24px rgba(255,211,42,.35);}
.btn-ghost{background:rgba(255,255,255,.08);color:var(--white);border:1.5px solid rgba(255,255,255,.15);}

/* == SETUP SCREEN == */
#sSetup{gap:20px;padding:20px;}
.player-row{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.05);border-radius:16px;padding:12px 20px;width:100%;max-width:420px;border:2px solid transparent;transition:border-color .2s;}
.player-row.active{border-color:rgba(255,255,255,.2);}
.p-dot{width:36px;height:36px;border-radius:50%;flex-shrink:0;}
.p-label{font-weight:800;font-size:1rem;flex:1;}
.p-keys{font-size:.7rem;color:rgba(255,255,255,.35);letter-spacing:1px;}
.toggle-btn{font-family:'Fredoka One',cursive;font-size:.8rem;border:none;border-radius:20px;padding:6px 14px;cursor:pointer;}
.num-select{display:flex;gap:8px;margin-bottom:4px;}
.num-btn{font-family:'Fredoka One',cursive;font-size:1.2rem;width:50px;height:50px;border-radius:50%;border:2.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer;transition:all .15s;}
.num-btn.on{border-color:var(--gold);background:rgba(255,211,42,.15);color:var(--gold);}

/* == LOBBY / MINIGAME SELECT == */
#sLobby{gap:0;padding:0;justify-content:flex-start;overflow:hidden;}
#lobbyHeader{flex-shrink:0;text-align:center;padding:18px 16px 10px;width:100%;}
#lobbyScroll{flex:1;overflow-y:auto;overflow-x:hidden;width:100%;padding:0 16px 80px;scroll-behavior:smooth;}
#lobbyScroll::-webkit-scrollbar{width:4px;}
#lobbyScroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
#lobbyFooter{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;flex-direction:column;align-items:center;gap:0;pointer-events:none;}
#scrollHint{font-family:'Fredoka One',cursive;font-size:.75rem;letter-spacing:2px;color:rgba(255,255,255,.35);animation:bounce 1.6s infinite;pointer-events:none;padding-bottom:2px;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
#lobbyBtns{display:flex;gap:10px;padding:10px 16px 14px;background:linear-gradient(to top,var(--bg) 70%,transparent);width:100%;justify-content:center;pointer-events:all;}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;width:100%;max-width:760px;margin:0 auto;}
.game-section{width:100%;max-width:760px;margin:8px auto 0;}
.game-section-title{font-family:'Fredoka One',cursive;font-size:.8rem;letter-spacing:3px;color:rgba(255,255,255,.3);padding:8px 4px 6px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:8px;}
.game-card{background:var(--card);border-radius:14px;padding:16px 10px;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;border:2px solid transparent;display:flex;flex-direction:column;align-items:center;gap:6px;}
.game-card:hover{transform:translateY(-3px);box-shadow:0 6px 22px rgba(0,0,0,.4);}
.game-card.sel{border-color:var(--gold);box-shadow:0 0 18px rgba(255,211,42,.3);background:#1a2a40;}
.game-icon{font-size:2rem;}
.game-name{font-family:'Fredoka One',cursive;font-size:.9rem;text-align:center;}
.game-desc{font-size:.58rem;color:rgba(255,255,255,.35);text-align:center;letter-spacing:.5px;}
#selCount{font-family:'Fredoka One',cursive;font-size:.8rem;color:var(--gold);letter-spacing:1px;margin-top:2px;}

/* == SCOREBOARD == */
#sScores{gap:14px;padding:20px;}
.score-row{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.05);border-radius:14px;padding:12px 20px;width:100%;max-width:360px;}
.score-num{font-family:'Fredoka One',cursive;font-size:2rem;min-width:50px;text-align:right;}
.score-name{font-weight:800;font-size:1.1rem;flex:1;}
.score-bar-wrap{width:100px;height:10px;background:rgba(255,255,255,.1);border-radius:5px;overflow:hidden;}
.score-bar{height:100%;border-radius:5px;transition:width .4s;}
.crown{font-size:1.4rem;}

/* == COUNTDOWN == */
#sCount{background:rgba(0,0,0,.85);z-index:80;}
#countNum{font-family:'Fredoka One',cursive;font-size:clamp(8rem,30vw,18rem);line-height:1;animation:pop .9s ease-out;}
@keyframes pop{0%{transform:scale(2);opacity:0}60%{transform:scale(.9)}100%{transform:scale(1);opacity:1}}

/* == WIN SPLASH == */
#sWin{background:rgba(0,0,0,.85);z-index:90;gap:12px;}
.win-banner{font-family:'Fredoka One',cursive;font-size:clamp(2rem,10vw,5rem);text-align:center;animation:winIn .5s cubic-bezier(.34,1.56,.64,1);}

/* == TUTORIAL == */
#sTutorial{gap:0;padding:0;background:var(--bg);}
#tutBg{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.tut-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;}
#tutContent{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;max-width:700px;padding:20px;gap:0;height:100%;}
#tutHeader{display:flex;align-items:center;justify-content:space-between;width:100%;padding-bottom:12px;}
#tutGameTitle{font-family:'Fredoka One',cursive;font-size:1.8rem;letter-spacing:2px;}
#tutProgress{display:flex;gap:5px;}
.tut-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .3s;}
.tut-dot.done{background:var(--gold);}
.tut-dot.active{background:white;transform:scale(1.3);}
#tutCanvas{border-radius:16px;flex:1;min-height:0;width:100%;}
#tutBottom{width:100%;padding-top:12px;display:flex;flex-direction:column;align-items:center;gap:8px;}
#tutDesc{font-size:1rem;font-weight:700;text-align:center;line-height:1.4;min-height:2.8em;max-width:500px;}
#tutHint{font-size:.75rem;letter-spacing:2px;color:rgba(255,255,255,.35);text-align:center;}
#tutNav{display:flex;gap:10px;align-items:center;margin-top:4px;}
.tut-nav-btn{font-family:'Fredoka One',cursive;font-size:.9rem;letter-spacing:2px;border:none;border-radius:30px;padding:10px 28px;cursor:pointer;transition:transform .1s;}
.tut-nav-btn:active{transform:scale(.95);}
#tutSkip{font-size:.7rem;letter-spacing:2px;color:rgba(255,255,255,.25);background:none;border:none;cursor:pointer;padding:4px 12px;margin-top:-4px;}
#tutSkip:hover{color:rgba(255,255,255,.5);}

@keyframes winIn{from{transform:scale(0) rotate(-10deg)}to{transform:scale(1) rotate(0deg)}}

/* == CANVAS GAME SCREEN == */
#sGame{padding:0;background:var(--bg);}
#gameHUD{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);}
.hud-player{display:flex;align-items:center;gap:6px;}
.hud-dot{width:22px;height:22px;border-radius:50%;}
.hud-name{font-weight:800;font-size:.85rem;}
.hud-pts{font-family:'Fredoka One',cursive;font-size:1.2rem;}
#gameTitle{font-family:'Fredoka One',cursive;font-size:1rem;letter-spacing:2px;color:rgba(255,255,255,.4);}
#gameTimer{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--gold);}

/* ── TOURNAMENT ── */
.tourn-card{
  background:linear-gradient(135deg,rgba(255,211,42,.08),rgba(255,107,53,.08));
  border:1.5px solid rgba(255,211,42,.25);
  border-radius:14px;padding:14px 18px;cursor:pointer;
  display:flex;align-items:center;gap:14px;
  transition:background .2s,transform .15s;
}
.tourn-card:hover,.tourn-card:active{
  background:linear-gradient(135deg,rgba(255,211,42,.18),rgba(255,107,53,.18));
  transform:scale(1.02);
}
.tourn-icon{font-size:2.2rem;flex-shrink:0;}
.tourn-info{flex:1;}
.tourn-name{font-family:'Fredoka One',cursive;font-size:1.15rem;color:#ffd32a;letter-spacing:1px;}
.tourn-desc{font-size:.72rem;color:rgba(255,255,255,.5);margin-top:2px;letter-spacing:.5px;}
.tourn-badge{background:rgba(255,211,42,.15);border:1px solid rgba(255,211,42,.4);
  border-radius:20px;padding:3px 10px;font-size:.7rem;font-family:'Fredoka One',cursive;
  color:#ffd32a;letter-spacing:1px;white-space:nowrap;}


/* ── GAME CARD PREVIEW ── */
.game-card:hover .game-preview{opacity:1;transform:scaleY(1);}
.game-preview{opacity:0;transform:scaleY(0);transform-origin:top;transition:opacity .2s,transform .2s;
  height:48px;width:100%;background:rgba(0,0,0,.3);border-radius:8px;margin-top:2px;
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  font-size:.7rem;color:rgba(255,255,255,.5);letter-spacing:.5px;}



@media (pointer:coarse){
  /* Touch device — bigger tap targets */
  .btn{min-height:52px;font-size:1.05rem;}
  .game-card{padding:20px 10px;}
  .game-icon{font-size:2.2rem;}
  #gameHUD{height:52px;}
}


/* ══ MOBILE CONTROLS ══ */
.m-joy-wrap{
  position:fixed;width:120px;height:120px;
  background:rgba(0,0,0,.35);border-radius:50%;
  border:2.5px solid rgba(255,255,255,.2);
  touch-action:none;user-select:none;
  display:none;z-index:999;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.m-joy-wrap.show{display:block;}
.m-joy-knob{
  position:absolute;top:50%;left:50%;
  width:48px;height:48px;border-radius:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.m-joy-label{
  position:absolute;top:-22px;left:50%;transform:translateX(-50%);
  font-family:'Fredoka One',cursive;font-size:.7rem;
  color:#fff;opacity:.6;white-space:nowrap;
}
.m-act-btn{
  position:fixed;width:68px;height:68px;border-radius:50%;
  border:3px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;touch-action:none;user-select:none;
  display:none;z-index:999;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  transition:filter .08s;
}
.m-act-btn.show{display:flex;}
.m-act-btn:active,.m-act-btn.pressed{filter:brightness(1.5);transform:scale(.92);}
#mobileModeBtn{border-color:#ffa502;color:#ffa502;background:rgba(255,150,0,.1);}
#mobileModeBtn.on{background:rgba(255,150,0,.3);}
@media(pointer:coarse){.btn{min-height:50px;}}

</style>
</head>
<body>
<div id="mobileOverlay"></div>

<!-- SETUP -->
<div class="screen" id="sSetup">
  <div class="big-title" style="background:linear-gradient(135deg,#ff4757,#ffd32a,#2ed573,#1e90ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent">HOUSE OF JOY</div>
  <div class="sub" id="setupSub">QUEM VAI JOGAR?</div>
  <div class="num-select" style="margin-top:8px;">
    <button class="num-btn" id="nb2" onclick="setPlayers(2)">2</button>
    <button class="num-btn" id="nb3" onclick="setPlayers(3)">3</button>
    <button class="num-btn" id="nb4" onclick="setPlayers(4)">4</button>
  </div>
  <div id="playerRows" style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:420px;"></div>
  <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center;"><button class="btn btn-ghost" onclick="openTutorial()" id="tutorialBtn" style="flex:1;min-width:130px">📖 TUTORIAL</button><button class="btn btn-ghost" onclick="openTournament()" style="flex:1;min-width:130px;border-color:#ffd32a;color:#ffd32a">🏆 TOURNAMENT</button><button class="btn btn-gold" onclick="goLobby()" id="chooseGamesBtn" style="flex:1;min-width:130px">ESCOLHER JOGOS →</button></div>
  <button class="btn btn-ghost" id="mobileModeBtn" onclick="toggleMobileMode()" style="margin-top:8px;width:100%;max-width:420px;border-color:#ffa502;color:#ffa502;">📱 MODO MOBILE: OFF</button>
</div>

<!-- LOBBY -->
<div class="screen off" id="sLobby">
  <div id="lobbyHeader">
    <div class="big-title" style="font-size:1.8rem;" id="lobbyTitleEl">ESCOLHA OS MINIGAMES</div>
    <div id="selCount">0 SELECIONADOS</div>
    <div id="langBar"></div>
  </div>
  <div id="lobbyScroll">
    <div id="gamesGrid"></div>
  </div>
  <div id="lobbyFooter">
    <div id="scrollHint">▼ &nbsp; ROLE PARA VER MAIS &nbsp; ▼</div>
    <div id="lobbyBtns">
      <button class="btn btn-ghost" onclick="show('sSetup')">← VOLTAR</button>
      <button class="btn btn-ghost" onclick="randomSelect()" style="border-color:#a29bfe;color:#a29bfe" title="Sortear jogos">🎲</button>
      <button class="btn btn-gold" id="playBtn" onclick="startSelected()">JOGAR! ▶</button>
    </div>
  </div>
</div>


<!-- TUTORIAL -->
<div class="screen off" id="sTutorial">
  <div id="tutBg">
    <div class="tut-blob" id="tb1" style="width:400px;height:400px;top:-100px;left:-100px;"></div>
    <div class="tut-blob" id="tb2" style="width:300px;height:300px;bottom:-80px;right:-80px;"></div>
  </div>
  <div id="tutContent">
    <div id="tutHeader">
      <div id="tutGameTitle">Tutorial</div>
      <div id="tutProgress"></div>
    </div>
    <canvas id="tutCv"></canvas>
    <div id="tutBottom">
      <div id="tutDesc">Bem-vindo ao House of Joy!</div>
      <div id="tutHint">USE AS TECLAS OU CLIQUE NOS BOTÕES</div>
      <div id="tutNav">
        <button class="tut-nav-btn btn-ghost" id="tutPrev" onclick="tutNav(-1)">← ANTERIOR</button>
        <button class="tut-nav-btn btn-gold" id="tutNext" onclick="tutNav(1)">PRÓXIMO →</button>
      </div>
      <div id="tutLangBar"></div>
      <button id="tutSkip" onclick="tutFinish()">PULAR TUTORIAL</button>
    </div>
  </div>
</div>

<!-- GAME HUD -->
<div id="gameHUD" style="display:none;">
  <div id="hudLeft" style="display:flex;gap:12px;"></div>
  <div style="display:flex;flex-direction:column;align-items:center;">
    <div id="gameTitle">—</div>
    <div id="gameTimer">—</div>
  </div>
  <div id="hudRight" style="display:flex;gap:12px;"></div>
</div>

<!-- GAME CANVAS -->
<div class="screen off" id="sGame">
  <canvas id="cv"></canvas>
</div>

<!-- COUNTDOWN -->
<div class="screen off" id="sCount">
  <div id="countNum" style="color:var(--gold);">3</div>
  <div style="font-family:'Fredoka One',cursive;font-size:1.4rem;color:rgba(255,255,255,.5);letter-spacing:3px;" id="countGame"></div>
</div>

<!-- WIN SPLASH -->
<div class="screen off" id="sWin">
  <div id="winEmoji" style="font-size:5rem;"></div>
  <div class="win-banner" id="winText" id="winText">PLAYER 1 VENCEU!</div>
  <div id="winSub" style="font-size:.8rem;letter-spacing:3px;color:rgba(255,255,255,.4);"></div>
  <button class="btn btn-gold" onclick="nextRound()" style="margin-top:16px;" id="nextBtn" id="nextBtn">PRÓXIMA RODADA →</button>
</div>

<!-- TOURNAMENT -->
<div class="screen off" id="sTournament">
  <div class="big-title" style="font-size:1.6rem;background:linear-gradient(135deg,#ffd32a,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">🏆 TOURNAMENT</div>
  <div style="font-size:.75rem;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:8px;">ESCOLHA UM TORNEIO</div>
  <div id="tournamentList" style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:440px;overflow-y:auto;max-height:55vh;padding:4px 0;"></div>
  <div style="display:flex;gap:10px;margin-top:12px;">
    <button class="btn btn-ghost" onclick="show('sSetup')" style="flex:1">← VOLTAR</button>
  </div>
</div>

<!-- SCOREBOARD -->
<div class="screen off" id="sScores">
  <div class="big-title" style="font-size:2.5rem;" id="finalTitleEl">🏆 PLACAR FINAL</div>
  <div id="scoreList" style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:380px;margin-top:10px;"></div>
  <div style="display:flex;gap:10px;margin-top:14px;">
    <button class="btn btn-ghost" onclick="restartAll()" id="playAgainBtn">JOGAR DE NOVO</button>
    <button class="btn btn-gold" onclick="show('sSetup')" id="menuBtn">MENU</button>
  </div>
</div>




<script>
// ══════════════════════════════════════════════════
// CORE
// ══════════════════════════════════════════════════
const PDATA=[
  {name:'P1',color:'#ff4757',keys:{up:'w',down:'s',left:'a',right:'d',action:'g'}},
  {name:'P2',color:'#2ed573',keys:{up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight',action:'l'}},
  {name:'P3',color:'#ffa502',keys:{up:'t',down:'h',left:'f',right:'y',action:'g'}, // g shared, action=y
   keys:{up:'t',down:'h',left:'f',right:'y',action:'r'}},
  {name:'P4',color:'#1e90ff',keys:{up:'i',down:'k',left:'j',right:'l',action:'u'},
   keys:{up:'i',down:'k',left:'j',right:'o',action:'u'}},
];
// Fix P3/P4 keys properly
PDATA[2].keys={up:'t',down:'h',left:'f',right:'y',action:'r'};
PDATA[3].keys={up:'i',down:'k',left:'j',right:'o',action:'u'};

let numPlayers=2, players=[], scores=[], roundNum=0, totalRounds=5;
let selectedGame=null, currentGame=null;
const CV=document.getElementById('cv'), CX=CV.getContext('2d');
let W,H;

function resizeCanvas(){
  const hudH=document.getElementById('gameHUD').style.display!=='none'?48:0;
  W=CV.width=window.innerWidth;
  H=CV.height=window.innerHeight-hudH;
}
window.addEventListener('resize',resizeCanvas);

// INPUT
const KD={};
document.addEventListener('keydown',e=>{KD[e.key]=true;KD[e.key.toLowerCase()]=true;['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)&&e.preventDefault();});
document.addEventListener('keyup',e=>{KD[e.key]=false;KD[e.key.toLowerCase()]=false;});
function key(p,a){const k=p.keys[a];return !!(KD[k]||KD[k?.toLowerCase()]);}

// SCREEN
function show(...ids){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('off'));
  ids.forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('off');});
}

// ══════════════════════════════════════════════════
// SETUP
// ══════════════════════════════════════════════════
function setPlayers(n){
  numPlayers=n;
  [2,3,4].forEach(i=>document.getElementById('nb'+i).classList.toggle('on',i===n));
  buildPlayerRows();
}

function buildPlayerRows(){
  const cont=document.getElementById('playerRows');
  cont.innerHTML='';
  const keyHints=['WASD + G','↑←↓→ + L','TFHY + R','IJKO + U'];
  for(let i=0;i<numPlayers;i++){
    const p=PDATA[i];
    const row=document.createElement('div');
    row.className='player-row active';
    row.innerHTML=`<div class="p-dot" style="background:${p.color}"></div>
      <div style="flex:1"><div class="p-label">${p.name}</div><div class="p-keys">${keyHints[i]}</div></div>`;
    cont.appendChild(row);
  }
}

function initPlayers(){
  players=[];scores=[];
  for(let i=0;i<numPlayers;i++){
    players.push({...PDATA[i],id:i,score:0});
    scores.push(0);
  }
}

setPlayers(2);

// ══════════════════════════════════════════════════
// LOBBY
// ══════════════════════════════════════════════════
const GAMES=[
  {id:'sumo',      name:'SUMÔ',        icon:'🥋', desc:'Empurre todos para fora!'},
  {id:'collect',   name:'COLETA LOUCA', icon:'⭐', desc:'Colete mais estrelas que todos!'},

let selectedGames=[], currentRoundGame=0, roundHistory=[];

function buildLobby(){
  const grid=document.getElementById('gamesGrid');
  grid.innerHTML='';
  // Two sections
  const CLASSIC=GAMES.slice(0,8);
  const NEW=GAMES.slice(8);
  const mkSection=(title,games)=>{
    const sec=document.createElement('div');sec.className='game-section';
    const h=document.createElement('div');h.className='game-section-title';h.textContent=title;sec.appendChild(h);
    const g=document.createElement('div');g.className='games-grid';
    games.forEach(gm=>{
      const card=document.createElement('div');card.className='game-card';card.id='gc_'+gm.id;
      const L2=LANGS[curLang]||LANGS.pt;const cname=L2.names[gm.id]||gm.name;const cdesc=L2.descs[gm.id]||gm.desc;
      const L_=LANGS[curLang]||LANGS.pt;const ptip=L_.canvas?.controls_sub||'← → mover • [AÇÃO] ativar';
      card.innerHTML=`<div class="game-icon">${gm.icon}</div><div class="game-name">${cname}</div><div class="game-desc">${cdesc}</div><div class="game-preview">${gm.icon} ${cname}</div>`;
      card.onclick=()=>toggleGame(gm.id);g.appendChild(card);
    });
    sec.appendChild(g);grid.appendChild(sec);
  };
  mkSection(t('classics'),CLASSIC);
  mkSection(t('newgames'),NEW);
  // auto select 5 random
  selectedGames=GAMES.map(g=>g.id).sort(()=>Math.random()-.5).slice(0,5);
  selectedGames.forEach(id=>document.getElementById('gc_'+id)?.classList.add('sel'));
  // Build language selector bars
  buildLangBars();
  updateSelCount();
  // Scroll hint visibility
  const scr=document.getElementById('lobbyScroll');
  const hint=document.getElementById('scrollHint');
  scr.onscroll=()=>{hint.style.opacity=scr.scrollTop>40?'0':'1';};
}

function toggleGame(id){
  const idx=selectedGames.indexOf(id);
  if(idx>=0){if(selectedGames.length>1){selectedGames.splice(idx,1);document.getElementById('gc_'+id).classList.remove('sel');SFX.desel();}}
  else{selectedGames.push(id);document.getElementById('gc_'+id).classList.add('sel');SFX.select();}
  totalRounds=selectedGames.length;
  updateSelCount();
}
function randomSelect(){
  const n=selectedGames.length||5;
  const all=GAMES.map(g=>g.id).sort(()=>Math.random()-.5);
  selectedGames=all.slice(0,Math.min(n,all.length));
  totalRounds=selectedGames.length;
  document.querySelectorAll('.game-card').forEach(c=>{
    c.classList.toggle('sel',selectedGames.includes(c.id.replace('gc_','')));
  });
  updateSelCount();SFX.click();
}
function updateSelCount(){
  const n=selectedGames.length;document.getElementById('selCount').textContent=`${n} ${n!==1?t('selectedPlural'):t('selected')}  •  ${t('clickToMark')}`;
}

function goLobby(){initPlayers();roundNum=0;buildLobby();show('sLobby');}

function startSelected(){
  if(!selectedGames.length) return;
  currentRoundGame=0;
  totalRounds=selectedGames.length;
  roundHistory=[];
  playRound(currentRoundGame);
}

function playRound(idx){
  roundNum=idx;
  const gid=selectedGames[idx];
  const gdef=GAMES.find(g=>g.id===gid);
  countdownThen(gdef,()=>launchGame(gid));
}

function countdownThen(gdef,cb){
  show('sCount');
  const L_=LANGS[curLang]||LANGS.pt;document.getElementById('countGame').textContent=gdef.icon+' '+(L_.names[gdef.id]||gdef.name);
  let n=3;
  const el=document.getElementById('countNum');
  el.textContent=n; el.style.color=`var(--gold)`;
  el.style.animation='none'; void el.offsetWidth; el.style.animation='pop .9s ease-out';
  const iv=setInterval(()=>{
    n--;
    if(n===0){
      el.textContent=t('go'); el.style.color='#2ed573'; SFX.go();
      el.style.animation='none'; void el.offsetWidth; el.style.animation='pop .9s ease-out';
      clearInterval(iv);
      setTimeout(cb,700);
    } else {
      SFX.countdown();
      el.textContent=n;
      el.style.animation='none'; void el.offsetWidth; el.style.animation='pop .9s ease-out';
    }
  },900);
}

function launchGame(id){
  resizeCanvas();
  show('sGame');
  document.getElementById('gameHUD').style.display='flex';
  buildHUD();
  resizeCanvas();
  if(currentGame){currentGame.destroy();}
  const gdef=GAMES.find(g=>g.id===id);
  const L2_=LANGS[curLang]||LANGS.pt;document.getElementById('gameTitle').textContent=gdef.icon+' '+(L2_.names[gdef.id]||gdef.name);
  const GameClass={sumo:Sumo,collect:Collect,race:Race,laststand:LastStand,icerink:IceRink,tug:TugOfWar,soccer:MiniSoccer,paint:PaintWar,king:KingOfHill,volley:Volley,bounce:PongChaos,zombie:Zombie,asteroid:Asteroid,snake:SnakeGame,gravity:GravityZero,hotfloor:HotFloor,duel:Duel,balloon:Balloon,thunder:Thunder,runner:Runner,boostrace:BoostRace,bullet:BulletHell,dash:DashAttack,builder:Builder,punch:PunchOut,iceblock:IceBlock,chicken:Chicken,magnet:Magnet,drill:Drill,flappy:FlappyBird,hockey:AirHockey,bumper:BumperCars,bomb:HotPotato,tag:TagGame,cannon:CannonGame,shrinkzone:ShrinkZone,tictactoe:TicTacToe,reflect:ReflexGame,minigolf:MiniGolf}[id];
  currentGame=new GameClass(CV,CX,players,W,H,onGameEnd);
  currentGame.start();
}

function buildHUD(){
  const left=document.getElementById('hudLeft'), right=document.getElementById('hudRight');
  left.innerHTML='';right.innerHTML='';
  players.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='hud-player'; div.id='hudp'+i;
    div.innerHTML=`<div class="hud-dot" style="background:${p.color}"></div><div><div class="hud-name">${p.name}</div><div class="hud-pts" style="color:${p.color}">${scores[i]}pt</div></div>`;
    (i<2?left:right).appendChild(div);
  });
}

function updateHUDScores(){
  players.forEach((p,i)=>{
    const el=document.getElementById('hudp'+i);
    if(el) el.querySelector('.hud-pts').textContent=scores[i]+'pt';
  });
}

function onGameEnd(winnerIdx, pointsMap){
  if(currentGame){currentGame.destroy();currentGame=null;}
  document.getElementById('gameHUD').style.display='none';
  const earned = pointsMap ? [...pointsMap] : players.map((_,i)=>i===winnerIdx?3:0);
  earned.forEach((pts,i)=>{if(i<scores.length)scores[i]+=pts;});
  // Track round history
  roundHistory.push({
    gameId: selectedGames[roundNum],
    winner: winnerIdx,
    pts: earned,
    round: roundNum
  });
  updateHUDScores();
  showWin(winnerIdx, earned);
}

function showWin(wi, earned){
  show('sWin');
  const isLast=(currentRoundGame>=totalRounds-1);
  document.getElementById('nextBtn').textContent=isLast?t('finalScore'):t('nextRound');
  // Check for tie: multiple players with same top score
  const maxEarned=earned?Math.max(...earned):0;
  const tiedPlayers=earned?earned.map((p,i)=>p===maxEarned?i:-1).filter(i=>i>=0):[];
  const isTie=wi<0||(tiedPlayers.length>1);
  if(isTie){
    document.getElementById('winEmoji').textContent='🤝';
    document.getElementById('winText').textContent=t('draw'); SFX.draw();
    document.getElementById('winText').style.color='#fff';
    const tieNames=tiedPlayers.map(i=>players[i]?.name).filter(Boolean).join(' & ');
    document.getElementById('winSub').textContent=tieNames?tieNames+' empataram':'';
  } else {
    const p=players[wi];
    document.getElementById('winEmoji').textContent=GAMES.find(g=>g.id===selectedGames[roundNum])?.icon||'🏆';
    document.getElementById('winText').textContent=p.name+' '+t('won'); SFX.win();
    document.getElementById('winText').style.color=p.color;
    const ptsLine=earned?earned.map((p,i)=>players[i]?players[i].name+' +'+Math.round(p):'').filter(Boolean).join('  '):'';
    document.getElementById('winSub').textContent=ptsLine||t('pts');
  }
}

function nextRound(){
  currentRoundGame++;
  if(currentRoundGame>=totalRounds){showFinalScores();return;}
  playRound(currentRoundGame);
}

function showFinalScores(){
  show('sScores');
  const sorted=[...players].map((p,i)=>({...p,total:scores[i],idx:i})).sort((a,b)=>b.total-a.total);
  const list=document.getElementById('scoreList');
  list.innerHTML='';
  const max=Math.max(...scores,1);
  // MVP: most wins
  const wins=players.map((_,i)=>roundHistory.filter(r=>r.winner===i).length);
  const mvpIdx=wins.indexOf(Math.max(...wins));
  // Detect top tie
  const topScore=sorted[0]?.total||0;
  const topTied=sorted.filter(p=>p.total===topScore);
  const isFinalTie=topTied.length>1;
  if(isFinalTie){
    const tieEl=document.createElement('div');
    tieEl.style.cssText='font-family:Fredoka One,cursive;font-size:1.6rem;color:#ffd32a;letter-spacing:2px;margin-bottom:6px;';
    tieEl.textContent='🤝 EMPATE!';
    list.appendChild(tieEl);
    const namesEl=document.createElement('div');
    namesEl.style.cssText='font-size:.85rem;color:rgba(255,255,255,.6);margin-bottom:10px;';
    namesEl.textContent=topTied.map(p=>p.name).join(' & ')+' — '+topScore+' pts cada';
    list.appendChild(namesEl);
  }
  const medals=isFinalTie?['🤝','🤝','🥉','💀']:['👑','🥈','🥉','💀'];
  sorted.forEach((p,rank)=>{
    const isTiedFirst=isFinalTie&&p.total===topScore;
    const row=document.createElement('div');
    row.className='score-row';
    const isMVP=p.idx===mvpIdx&&wins[p.idx]>0;
    row.innerHTML=`
      <div class="crown" title="${rank===0?(isFinalTie?'Empate':'Vencedor'):''}">${isTiedFirst?'🤝':medals[Math.min(rank,3)]}</div>
      <div class="hud-dot" style="background:${p.color};width:28px;height:28px;border-radius:50%;flex-shrink:0;"></div>
      <div class="score-name" style="color:${p.color}">${p.name}${isMVP?'<span style="font-size:.65rem;margin-left:4px;opacity:.7">MVP</span>':''}</div>
      <div class="score-bar-wrap"><div class="score-bar" style="width:${(scores[p.idx]/max)*100}%;background:${p.color};"></div></div>
      <div class="score-num" style="color:${p.color}">${scores[p.idx]}</div>`;
    list.appendChild(row);
  });
  // Round history mini-timeline
  if(roundHistory.length>0){
    const hist=document.createElement('div');
    hist.style.cssText='width:100%;max-width:380px;margin-top:10px;font-size:.68rem;color:rgba(255,255,255,.45);letter-spacing:.5px;';
    const PCOLS=['#ff4757','#2ed573','#ffa502','#1e90ff'];
    hist.innerHTML='<div style="margin-bottom:4px;letter-spacing:1px;font-family:Fredoka One,cursive;font-size:.7rem;">HISTÓRICO DE RODADAS</div>'+
      roundHistory.map((r,idx)=>{
        const gm=GAMES.find(g=>g.id===r.gameId);
        const winName=r.winner>=0?players[r.winner]?.name:'—';
        const winColor=r.winner>=0?(PCOLS[r.winner]||'#fff'):'#fff';
        return `<div style="display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.06);">
          <span style="opacity:.5;min-width:18px">${idx+1}.</span>
          <span>${gm?.icon||'🎮'}</span>
          <span style="flex:1;opacity:.6">${gm?.name||r.gameId}</span>
          <span style="color:${winColor};font-weight:700">${winName}</span>
          <span style="opacity:.4">${r.pts.map((p,i)=>players[i]?'+'+Math.round(p):'').filter(Boolean).join(' ')}</span>
        </div>`;
      }).join('');
    list.appendChild(hist);
  }
}

// SOUND EFFECTS (Web Audio API)
// ══════════════════════════════════════════════════
const _AC = (()=>{try{return new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}})();
function _beep(freq=440,dur=0.1,vol=0.18,type='square',decay=0.08){
  if(!_AC)return;
  try{
    const o=_AC.createOscillator(),g=_AC.createGain();
    o.connect(g);g.connect(_AC.destination);
    o.type=type;o.frequency.setValueAtTime(freq,_AC.currentTime);
    g.gain.setValueAtTime(vol,_AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,_AC.currentTime+dur+decay);
    o.start(_AC.currentTime);o.stop(_AC.currentTime+dur+decay+0.05);
  }catch(e){}
}
const SFX={
  click:   ()=>_beep(440,0.06,0.12,'square'),
  select:  ()=>_beep(660,0.08,0.14,'sine'),
  desel:   ()=>_beep(330,0.07,0.12,'sine'),
  countdown:()=>_beep(550,0.18,0.22,'sine',0.1),
  go:      ()=>{_beep(880,0.08,0.25,'sine');setTimeout(()=>_beep(1100,0.12,0.25,'sine'),80);},
  win:     ()=>{[0,80,160,240].forEach((d,i)=>{setTimeout(()=>_beep(440+i*220,0.12,0.2,'sine'),d);});},
  draw:    ()=>_beep(330,0.25,0.18,'sawtooth',0.15),
  nav:     ()=>_beep(500,0.05,0.1,'sine'),
  error:   ()=>_beep(180,0.15,0.15,'sawtooth',0.2),
};

function buildTournamentList(){
  // Fill 'all' pool
  GAME_POOLS.all = GAMES.map(g=>g.id);
  const list = document.getElementById('tournamentList');
  list.innerHTML = '';
  TOURNAMENTS.forEach(t=>{
    const card = document.createElement('div');
    card.className = 'tourn-card';
    const poolArr = GAME_POOLS[t.pool]||GAME_POOLS.all;
    const available = Math.min(t.count, poolArr.length);
    card.innerHTML = `
      <div class="tourn-icon">${t.icon}</div>
      <div class="tourn-info">
        <div class="tourn-name" style="color:${t.color}">${t.name}</div>

      <div class="tourn-badge" style="border-color:${t.color};color:${t.color}">${available} JOGOS</div>
    `;
    card.onclick = ()=>startTournament(t);
    list.appendChild(card);
  });
}

function startTournament(t){
  GAME_POOLS.all = GAMES.map(g=>g.id);
  const pool = (GAME_POOLS[t.pool]||GAME_POOLS.all).slice();
  // Shuffle and pick t.count games
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  selectedGames = pool.slice(0, Math.min(t.count, pool.length));
  totalRounds = selectedGames.length;
  currentRoundGame = 0;
  // reset scores
  scores = players.map(()=>0); roundHistory=[];
  // Show a brief "tournament starting" splash
  show('sCount');
  const el = document.getElementById('countNum');
  const gEl = document.getElementById('countGame');
  el.textContent = t.icon;
  el.style.color = t.color;
  el.style.animation='none'; void el.offsetWidth; el.style.animation='pop .9s ease-out';
  gEl.textContent = t.name + ' — ' + selectedGames.length + ' JOGOS';
  setTimeout(()=>playRound(0), 1400);
}

class BaseGame{
  constructor(cv,cx,players,w,h,onEnd){this.cv=cv;this.cx=cx;this.pl=players;this.W=w;this.H=h;this.onEnd=onEnd;this.raf=null;this.alive=[...players.map(()=>true)];this.timer=0;this.maxTime=30;}
  start(){this.init();this.loop(performance.now());}
  init(){}
  destroy(){if(this.raf)cancelAnimationFrame(this.raf);}
  loop(ts){this.raf=requestAnimationFrame(t=>this.loop(t));const dt=Math.min((ts-(this._lt||ts))/1000,.05);this._lt=ts;this.update(dt);this.draw();}
  update(dt){this.timer+=dt;if(this.timer>this.maxTime)this.timeUp();}
  timeUp(){this.endGame(-1);}
  draw(){}
  endGame(wi,pts){if(this._over)return;this._over=true;this.destroy();this.onEnd(wi,pts);}
  setTimer(t){document.getElementById('gameTimer').textContent=Math.ceil(Math.max(0,this.maxTime-this.timer))+'s';}
  pPos(i,ox,oy){return{x:this.W*(0.2+i*0.2)+(ox||0),y:this.H*0.5+(oy||0)};}
  drawArena(color='#0f3460',border='rgba(255,255,255,.15)'){const{W,H,cx}=this;cx.fillStyle=color;cx.fillRect(0,0,W,H);}
}

// ══════════════════════════════════════════════════
// GAME 1: SUMÔ — push others off the circle
// ══════════════════════════════════════════════════
class Sumo extends BaseGame{
  init(){
    this.maxTime=45;
    const n=this.pl.length;
    this.R=Math.min(this.W,this.H)*0.36;
    this.cx2=this.W/2; this.cy2=this.H/2;
    this.ps=this.pl.map((p,i)=>{
      const a=(i/n)*Math.PI*2-Math.PI/2;
      return{x:this.cx2+Math.cos(a)*this.R*.5,y:this.cy2+Math.sin(a)*this.R*.5,vx:0,vy:0,r:20,alive:true,p};
    });
    this.lives=this.ps.map(()=>3);
    this.respawn=this.ps.map(()=>0);
  }
  update(dt){
    super.update(dt);
    this.setTimer();
    const spd=612,fric=0.60,push=2000;
    this.ps.forEach((s,i)=>{
      if(!s.alive){this.respawn[i]-=dt;if(this.respawn[i]<=0&&this.lives[i]>0){const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;s.x=this.cx2+Math.cos(a)*this.R*.4;s.y=this.cy2+Math.sin(a)*this.R*.4;s.vx=0;s.vy=0;s.alive=true;}return;}
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      const dx=s.x-this.cx2,dy=s.y-this.cy2,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist+s.r>this.R){this.lives[i]--;s.alive=false;s.vx=0;s.vy=0;this.respawn[i]=this.lives[i]>0?2:999;if(this.lives[i]<=0){this.checkWin();}}
    });
    // collisions between alive players
    for(let i=0;i<this.ps.length;i++)for(let j=i+1;j<this.ps.length;j++){
      const a=this.ps[i],b=this.ps[j];if(!a.alive||!b.alive)continue;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy),md=a.r+b.r;
      if(d<md&&d>0){const nx=dx/d,ny=dy/d,ov=(md-d)/2;a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;
        const f=push*dt;a.vx-=nx*f;a.vy-=ny*f;b.vx+=nx*f;b.vy+=ny*f;}
    }
  }
  checkWin(){
    const alive=this.ps.filter((s,i)=>this.lives[i]>0);
    if(alive.length<=1){const wi=alive.length===1?this.ps.indexOf(alive[0]):-1;this.endGame(wi,this.lives.map(l=>Math.max(0,l)));}
  }
  timeUp(){
    const maxL=Math.max(...this.lives);
    const winners=this.lives.map((l,i)=>l===maxL?i:-1).filter(i=>i>=0);
    this.endGame(winners.length>=1?winners[0]:this.lives.indexOf(Math.max(...this.lives)),this.lives.map(l=>Math.max(0,l)));
  }
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#0d1b2a';cx.fillRect(0,0,W,H);
    // Arena
    const grad=cx.createRadialGradient(this.cx2,this.cy2,0,this.cx2,this.cy2,this.R);
    grad.addColorStop(0,'#1a3a5c');grad.addColorStop(1,'#0d1b2a');
    cx.fillStyle=grad;cx.beginPath();cx.arc(this.cx2,this.cy2,this.R,0,Math.PI*2);cx.fill();
    cx.strokeStyle='rgba(255,255,255,.3)';cx.lineWidth=4;cx.beginPath();cx.arc(this.cx2,this.cy2,this.R,0,Math.PI*2);cx.stroke();
    cx.strokeStyle='rgba(255,255,255,.08)';cx.lineWidth=2;cx.beginPath();cx.arc(this.cx2,this.cy2,this.R*.5,0,Math.PI*2);cx.stroke();
    cx.beginPath();cx.moveTo(this.cx2-this.R,this.cy2);cx.lineTo(this.cx2+this.R,this.cy2);cx.stroke();
    // Players
    this.ps.forEach((s,i)=>{
      if(!s.alive)return;
      cx.shadowColor=s.p.color;cx.shadowBlur=16;
      const g=cx.createRadialGradient(s.x-s.r*.3,s.y-s.r*.3,2,s.x,s.y,s.r);
      g.addColorStop(0,s.p.color+'dd');g.addColorStop(1,s.p.color+'66');
      cx.fillStyle=g;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;cx.fillStyle='white';cx.font='bold 14px Nunito';cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(s.p.name,s.x,s.y);
      // lives
      for(let l=0;l<this.lives[i];l++){cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x-12+l*13,s.y-s.r-10,5,0,Math.PI*2);cx.fill();}
    });
  }
}

// ══════════════════════════════════════════════════
// GAME 3: COLLECT — grab stars
// ══════════════════════════════════════════════════
class Collect extends BaseGame{
  init(){
    this.maxTime=35;
    this.ps=this.pl.map((p,i)=>({x:this.W*(0.15+i*(0.7/(this.pl.length-1||1))),y:this.H/2,vx:0,vy:0,r:18,pts:0,p}));
    this.stars=[];this.coins=[];
    for(let i=0;i<12;i++)this.spawnStar();
    for(let i=0;i<4;i++)this.spawnCoin();
    this.spawnTimer=0;
  }
  spawnStar(){this.stars.push({x:80+Math.random()*(this.W-160),y:80+Math.random()*(this.H-160),r:12,t:Math.random()*Math.PI*2});}
  spawnCoin(){this.coins.push({x:80+Math.random()*(this.W-160),y:80+Math.random()*(this.H-160),r:16,t:0,golden:Math.random()<.2});}
  update(dt){
    super.update(dt);this.setTimer();
    this.stars.forEach(s=>s.t+=dt*2);this.coins.forEach(c=>c.t+=dt*3);
    this.spawnTimer+=dt;if(this.spawnTimer>2){this.spawnStar();this.spawnTimer=0;}
    const spd=591,fric=0.60;
    this.ps.forEach((s)=>{
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));s.y=Math.max(s.r,Math.min(this.H-s.r,s.y));
      this.stars=this.stars.filter(st=>{const d=Math.hypot(s.x-st.x,s.y-st.y);if(d<s.r+st.r){s.pts+=1;return false;}return true;});
      this.coins=this.coins.filter(c=>{const d=Math.hypot(s.x-c.x,s.y-c.y);if(d<s.r+c.r){s.pts+=c.golden?5:2;return false;}return true;});
    });
    // player collisions
    for(let i=0;i<this.ps.length;i++)for(let j=i+1;j<this.ps.length;j++){
      const a=this.ps[i],b=this.ps[j];
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy),md=a.r+b.r;
      if(d<md&&d>0){const nx=dx/d,ny=dy/d,ov=(md-d)/2;a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;}
    }
  }
  timeUp(){
    const maxP=Math.max(...this.ps.map(p=>p.pts));
    const wi=this.ps.findIndex(p=>p.pts===maxP);
    const pts=this.ps.map(p=>Math.round(p.pts/2));
    this.endGame(wi,pts);
  }
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#0a1a0a';cx.fillRect(0,0,W,H);
    for(let x=0;x<W;x+=60)for(let y=0;y<H;y+=60){cx.fillStyle='rgba(255,255,255,.015)';cx.fillRect(x,y,59,59);}
    // Stars
    this.stars.forEach(s=>{cx.save();cx.translate(s.x,s.y);cx.rotate(s.t);cx.fillStyle='#ffd32a';cx.shadowColor='#ffd32a';cx.shadowBlur=10;
      cx.font=`${s.r*2}px serif`;cx.textAlign='center';cx.textBaseline='middle';cx.fillText('⭐',0,0);cx.shadowBlur=0;cx.restore();});
    // Coins
    this.coins.forEach(c=>{cx.save();cx.translate(c.x,c.y);cx.rotate(c.t);
      cx.fillStyle=c.golden?'#ffd32a':'#aaa';cx.shadowColor=c.golden?'#ffd32a':'#aaa';cx.shadowBlur=8;
      cx.font=`${c.r*2}px serif`;cx.textAlign='center';cx.textBaseline='middle';cx.fillText(c.golden?'💰':'🪙',0,0);cx.shadowBlur=0;cx.restore();});
    // Players
    this.ps.forEach(s=>{
      cx.shadowColor=s.p.color;cx.shadowBlur=14;
      cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;cx.fillStyle='white';cx.font='bold 12px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y-2);
      cx.font='bold 14px Fredoka One';cx.fillStyle='#ffd32a';cx.fillText(s.pts+'★',s.x,s.y+12);
    });
  }
}

// ══════════════════════════════════════════════════
// GAME 4: RACE — reach the finish line
// ══════════════════════════════════════════════════
class Race extends BaseGame{
  init(){
    this.maxTime=40;
    this.laneH=this.H/(this.pl.length);
    this.ps=this.pl.map((p,i)=>({x:60,y:(i+.5)*this.laneH,vx:0,vy:0,r:18,finished:false,rank:0,p}));
    this.finishX=this.W-80;this.obstacles=[];this.finishCount=0;
    // spawn obstacle rows
    for(let x=200;x<this.finishX-50;x+=130+(Math.random()*60)){
      const laneSkip=Math.floor(Math.random()*this.pl.length);
      for(let lane=0;lane<this.pl.length;lane++){
        if(lane!==laneSkip){this.obstacles.push({x,y:(lane+.5)*this.laneH,r:18});}
      }
    }
  }
  update(dt){
    this.timer+=dt;this.setTimer();
    const spd=632,fric=0.60;
    this.ps.forEach((s)=>{
      if(s.finished)return;
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      s.x=Math.max(s.r,Math.min(this.W,s.x));s.y=Math.max(this.laneH*this.ps.indexOf(s)+s.r,Math.min(this.laneH*(this.ps.indexOf(s)+1)-s.r,s.y));
      // obstacle collision
      this.obstacles.forEach(o=>{const d=Math.hypot(s.x-o.x,s.y-o.y);if(d<s.r+o.r&&d>0){const nx=(s.x-o.x)/d,ny=(s.y-o.y)/d;const ov=s.r+o.r-d;s.x+=nx*ov;s.y+=ny*ov;s.vx=Math.abs(s.vx)*0.3;s.vy*=0.5;}});
      if(s.x>=this.finishX&&!s.finished){s.finished=true;this.finishCount++;s.rank=this.finishCount;if(this.finishCount===1)setTimeout(()=>this.endRace(),2500);}
    });
    if(this.timer>this.maxTime)this.endRace();
  }
  timeUp(){this.endRace();}
  endRace(){
    const pts=this.ps.map((s,i)=>s.rank>0?Math.max(0,this.pl.length+1-s.rank):0);
    const wi=pts.indexOf(Math.max(...pts));
    this.endGame(wi,pts);
  }
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#1a1a0a';cx.fillRect(0,0,W,H);
    // Lanes
    this.ps.forEach((s,i)=>{cx.fillStyle=i%2?'rgba(255,255,255,.02)':'rgba(0,0,0,.1)';cx.fillRect(0,i*this.laneH,W,this.laneH);});
    cx.strokeStyle='rgba(255,255,255,.08)';cx.lineWidth=1;
    this.ps.forEach((_,i)=>{cx.beginPath();cx.moveTo(0,i*this.laneH);cx.lineTo(W,i*this.laneH);cx.stroke();});
    // Finish line
    cx.strokeStyle='rgba(255,255,255,.8)';cx.lineWidth=4;cx.setLineDash([12,12]);
    cx.beginPath();cx.moveTo(this.finishX,0);cx.lineTo(this.finishX,H);cx.stroke();cx.setLineDash([]);
    cx.fillStyle='rgba(255,255,255,.1)';cx.fillRect(this.finishX,0,W-this.finishX,H);
    cx.fillStyle='white';cx.font='bold 20px Fredoka One';cx.textAlign='center';cx.fillText('🏁',this.finishX+20,H/2);
    // Obstacles
    this.obstacles.forEach(o=>{cx.fillStyle='#444';cx.shadowColor='#888';cx.shadowBlur=6;cx.beginPath();cx.arc(o.x,o.y,o.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      cx.fillStyle='#888';cx.font='16px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('🪨',o.x,o.y);});
    // Players
    this.ps.forEach((s)=>{
      cx.shadowColor=s.p.color;cx.shadowBlur=12;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;cx.fillStyle='white';cx.font='bold 12px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
      if(s.finished){cx.fillStyle='#ffd32a';cx.font='bold 14px Fredoka One';cx.fillText('#'+s.rank,s.x,s.y-s.r-10);}
    });
  }
}

// ══════════════════════════════════════════════════
// GAME 5: LAST STAND — dodge bullets
// ══════════════════════════════════════════════════
class LastStand extends BaseGame{
  init(){
    this.maxTime=50;
    this.ps=this.pl.map((p,i)=>({x:this.W*(0.15+i*(0.7/(this.pl.length-1||1))),y:this.H/2,vx:0,vy:0,r:18,alive:true,p}));
    this.bullets=[];this.bTimer=0;this.bInterval=1.4;
    this.pts=this.ps.map(()=>0);
    this.deathRank=this.ps.map(()=>0); // 0=not dead, 1=first to die, 2=second, etc.
    this.deathCount=0;
  }
  spawnBullet(){
    const side=Math.floor(Math.random()*4);
    let x,y,vx,vy,spd=160+this.timer*3;
    if(side===0){x=Math.random()*this.W;y=-10;vx=(Math.random()-.5)*spd*.4;vy=spd;}
    else if(side===1){x=this.W+10;y=Math.random()*this.H;vx=-spd;vy=(Math.random()-.5)*spd*.4;}
    else if(side===2){x=Math.random()*this.W;y=this.H+10;vx=(Math.random()-.5)*spd*.4;vy=-spd;}
    else{x=-10;y=Math.random()*this.H;vx=spd;vy=(Math.random()-.5)*spd*.4;}
    // aim at a random alive player sometimes
    const alive=this.ps.filter(p=>p.alive);
    if(alive.length&&Math.random()<.6){const t=alive[Math.floor(Math.random()*alive.length)];const dx=t.x-x,dy=t.y-y,d=Math.hypot(dx,dy)||1;vx=dx/d*spd;vy=dy/d*spd;}
    this.bullets.push({x,y,vx,vy,r:7,c:['#ff4757','#ffd32a','#ff6b81'][Math.floor(Math.random()*3)]});
  }
  update(dt){
    super.update(dt);this.setTimer();
    this.bTimer+=dt;if(this.bTimer>this.bInterval){this.spawnBullet();this.bTimer=0;this.bInterval=Math.max(.4,this.bInterval-.05);}
    // spawn extra at high time
    if(this.timer>20&&Math.random()<.03)this.spawnBullet();
    const spd=591,fric=0.60;
    this.ps.forEach((s,i)=>{
      if(!s.alive)return;
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));s.y=Math.max(s.r,Math.min(this.H-s.r,s.y));
      this.pts[i]+=dt;
    });
    this.bullets=this.bullets.filter(b=>{b.x+=b.vx*dt;b.y+=b.vy*dt;
      let hit=false;this.ps.forEach((s,i)=>{if(!s.alive||hit)return;if(Math.hypot(s.x-b.x,s.y-b.y)<s.r+b.r){s.alive=false;hit=true;this.deathCount++;this.deathRank[i]=this.deathCount;}});if(hit)this.checkWin();
      return b.x>-20&&b.x<this.W+20&&b.y>-20&&b.y<this.H+20;});
  }
  checkWin(){
    if(this._over)return;
    const aliveList=this.ps.filter(s=>s.alive);
    if(aliveList.length>1)return;
    const n=this.ps.length;
    // Assign rank to survivor (they outlasted everyone)
    if(aliveList.length===1){
      const wi=this.ps.indexOf(aliveList[0]);
      this.deathRank[wi]=n; // survivor gets highest rank
    }
    // Points: higher rank = more points. First to die gets 1pt, last gets 8pts.
    const pts=this.deathRank.map(r=>r===0?1:Math.round(r/n*8));
    const wi=this.deathRank.indexOf(n); // survivor = rank n
    this.endGame(wi<0?this.deathRank.indexOf(Math.max(...this.deathRank)):wi,pts);
  }
  timeUp(){
    // On timeout, all alive players share the win
    const n=this.ps.length;
    this.ps.forEach((_,i)=>{if(this.deathRank[i]===0)this.deathRank[i]=n;});
    const maxRank=Math.max(...this.deathRank);
    const wi=this.deathRank.indexOf(maxRank);
    const pts=this.deathRank.map(r=>Math.round(r/n*8));
    this.endGame(wi,pts);
  }
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#0d0d0d';cx.fillRect(0,0,W,H);
    cx.strokeStyle='rgba(255,0,50,.05)';cx.lineWidth=1;
    for(let x=0;x<W;x+=40){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(let y=0;y<H;y+=40){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    this.bullets.forEach(b=>{cx.shadowColor=b.c;cx.shadowBlur=10;cx.fillStyle=b.c;cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;});
    this.ps.forEach((s,i)=>{
      if(!s.alive){cx.globalAlpha=.25;cx.fillStyle=s.p.color;cx.font='28px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('💀',s.x,s.y);cx.globalAlpha=1;return;}
      cx.shadowColor=s.p.color;cx.shadowBlur=16;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;cx.fillStyle='white';cx.font='bold 12px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
      cx.fillStyle='rgba(255,255,255,.5)';cx.font='11px Nunito';cx.fillText(Math.round(this.pts[i])+'s',s.x,s.y+s.r+12);
    });
  }
}

// ══════════════════════════════════════════════════
// GAME 6: ICE RINK — slippery arena
// ══════════════════════════════════════════════════
class IceRink extends BaseGame{
  init(){
    this.maxTime=40;this.R=Math.min(this.W,this.H)*.38;
    this.cx2=this.W/2;this.cy2=this.H/2;
    this.ps=this.pl.map((p,i)=>{const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;return{x:this.cx2+Math.cos(a)*this.R*.5,y:this.cy2+Math.sin(a)*this.R*.5,vx:0,vy:0,r:18,alive:true,lives:3,respawn:0,p};});
  }
  update(dt){
    super.update(dt);this.setTimer();
    const spd=584,fric=0.978; // VERY slippery
    this.ps.forEach((s,i)=>{
      if(!s.alive){s.respawn-=dt;if(s.respawn<=0&&s.lives>0){const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;s.x=this.cx2+Math.cos(a)*this.R*.4;s.y=this.cy2+Math.sin(a)*this.R*.4;s.vx=0;s.vy=0;s.alive=true;}return;}
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      // ICE: almost no friction
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      const maxSpd=300;const sp=Math.hypot(s.vx,s.vy);if(sp>maxSpd){s.vx=s.vx/sp*maxSpd;s.vy=s.vy/sp*maxSpd;}
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      const dx=s.x-this.cx2,dy=s.y-this.cy2,d=Math.hypot(dx,dy);
      if(d+s.r>this.R){s.lives--;s.alive=false;s.vx=0;s.vy=0;s.respawn=s.lives>0?2:999;this.checkWin();}
    });
    for(let i=0;i<this.ps.length;i++)for(let j=i+1;j<this.ps.length;j++){
      const a=this.ps[i],b=this.ps[j];if(!a.alive||!b.alive)continue;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy),md=a.r+b.r;
      if(d<md&&d>0){const nx=dx/d,ny=dy/d,ov=(md-d)/2;a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;
        const rv=0.7;const relV=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny;
        a.vx-=nx*relV*rv;a.vy-=ny*relV*rv;b.vx+=nx*relV*rv;b.vy+=ny*relV*rv;}
    }
  }
  checkWin(){const alive=this.ps.filter((s,i)=>this.ps[i].lives>0);if(alive.length<=1){const wi=this.ps.findIndex((s,i)=>this.ps[i].lives>0);this.endGame(wi,this.ps.map((_,i)=>Math.max(0,this.ps[i].lives)));}
  }
  timeUp(){const maxL=Math.max(...this.ps.map((_,i)=>this.ps[i].lives));const wi=this.ps.findIndex((_,i)=>this.ps[i].lives===maxL);this.endGame(wi,this.ps.map((_,i)=>Math.max(0,this.ps[i].lives)));}
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#0a1a2a';cx.fillRect(0,0,W,H);
    // Ice ring
    const ig=cx.createRadialGradient(this.cx2,this.cy2,0,this.cx2,this.cy2,this.R);
    ig.addColorStop(0,'#c8eeff');ig.addColorStop(.7,'#a0d8ef');ig.addColorStop(1,'#6ab0d4');
    cx.fillStyle=ig;cx.beginPath();cx.arc(this.cx2,this.cy2,this.R,0,Math.PI*2);cx.fill();
    cx.strokeStyle='rgba(255,255,255,.6)';cx.lineWidth=5;cx.beginPath();cx.arc(this.cx2,this.cy2,this.R,0,Math.PI*2);cx.stroke();
    // Ice lines
    cx.strokeStyle='rgba(255,255,255,.15)';cx.lineWidth=1;
    for(let i=0;i<8;i++){const a=i*Math.PI/4;cx.beginPath();cx.moveTo(this.cx2,this.cy2);cx.lineTo(this.cx2+Math.cos(a)*this.R,this.cy2+Math.sin(a)*this.R);cx.stroke();}
    // Players
    this.ps.forEach((s,i)=>{
      if(!s.alive)return;
      cx.shadowColor=s.p.color;cx.shadowBlur=14;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;cx.fillStyle='white';cx.font='bold 12px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
      for(let l=0;l<this.ps[i].lives;l++){cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x-10+l*11,s.y-s.r-10,4,0,Math.PI*2);cx.fill();}
    });
  }
}

// ══════════════════════════════════════════════════
// GAME 7: TUG OF WAR
// ══════════════════════════════════════════════════
class TugOfWar extends BaseGame{
  init(){
    this.maxTime=30;
    this.pos=0.5; // 0=left wins, 1=right wins
    this.presses=[0,0,0,0];
    this.lastAction=[false,false,false,false];
    this.team0=[]; this.team1=[];
    this.pl.forEach((p,i)=>{if(i%2===0)this.team0.push({p,i});else this.team1.push({p,i});});
    this.shake=0;
  }
  update(dt){
    super.update(dt);this.setTimer();
    let f=0;
    this.pl.forEach((p,i)=>{
      const pressing=key(p,'action')||key(p,'up');
      if(pressing&&!this.lastAction[i]){f+=i%2===0?-0.025:0.025;this.shake=.3;}
      this.lastAction[i]=pressing;
    });
    this.pos=Math.max(0,Math.min(1,this.pos+f));
    this.shake=Math.max(0,this.shake-dt);
    if(this.pos<=0){this.endGame(this.team0.length?this.team0[0].i:0,this.pl.map((_,i)=>i%2===0?3:0));}
    if(this.pos>=1){this.endGame(this.team1.length?this.team1[0].i:1,this.pl.map((_,i)=>i%2===1?3:0));}
  }
  timeUp(){const wi=this.pos<.5?this.team0[0]?.i:this.team1[0]?.i;const isT0=this.pos<.5;this.endGame(wi??-1,this.pl.map((_,i)=>isT0?(i%2===0?2:0):(i%2===1?2:0)));}
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#1a0d05';cx.fillRect(0,0,W,H);
    const shake=this.shake>0?(Math.random()-.5)*6:0;
    cx.save();cx.translate(shake,0);
    // Ground
    cx.fillStyle='#3d2005';cx.fillRect(0,H*.65,W,H*.35);
    cx.fillStyle='#5a3410';cx.fillRect(0,H*.62,W,H*.06);
    // Rope
    const ry=H*.55;const rx=W*.1,rw=W*.8;
    const knotX=rx+rw*this.pos;
    cx.strokeStyle='#c8a85a';cx.lineWidth=10;cx.lineCap='round';
    cx.beginPath();cx.moveTo(rx,ry);cx.lineTo(rx+rw,ry);cx.stroke();
    cx.strokeStyle='#a07840';cx.lineWidth=6;cx.setLineDash([20,15]);
    cx.beginPath();cx.moveTo(rx,ry);cx.lineTo(rx+rw,ry);cx.stroke();cx.setLineDash([]);
    // Center marker
    cx.strokeStyle='rgba(255,255,255,.4)';cx.lineWidth=3;cx.setLineDash([8,8]);
    cx.beginPath();cx.moveTo(W/2,ry-40);cx.lineTo(W/2,ry+40);cx.stroke();cx.setLineDash([]);
    // Knot
    cx.shadowColor='#ffd32a';cx.shadowBlur=15;
    cx.fillStyle='#ffd32a';cx.beginPath();cx.arc(knotX,ry,18,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
    cx.fillStyle='#000';cx.font='bold 14px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('⚡',knotX,ry);
    // Players
    this.team0.forEach((t,idx)=>{const y=H*.7+idx*50;cx.fillStyle=t.p.color;cx.beginPath();cx.arc(W*.15+idx*30,y,22,0,Math.PI*2);cx.fill();
      cx.fillStyle='white';cx.font='bold 12px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(t.p.name,W*.15+idx*30,y);
      cx.fillStyle='rgba(255,255,255,.5)';cx.font='11px Nunito';cx.fillText(key(t.p,'action')||key(t.p,'up')?'PUXANDO!':'← AÇÃO',W*.15+idx*30,y+32);});
    this.team1.forEach((t,idx)=>{const y=H*.7+idx*50;cx.fillStyle=t.p.color;cx.beginPath();cx.arc(W*.85-idx*30,y,22,0,Math.PI*2);cx.fill();
      cx.fillStyle='white';cx.font='bold 12px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(t.p.name,W*.85-idx*30,y);
      cx.fillStyle='rgba(255,255,255,.5)';cx.font='11px Nunito';cx.fillText(key(t.p,'action')||key(t.p,'up')?'PUXANDO!':'AÇÃO →',W*.85-idx*30,y+32);});
    // Progress bar
    const bw=300,bx=W/2-bw/2,by=H*.12;
    cx.fillStyle='rgba(0,0,0,.5)';cx.fillRect(bx,by,bw,20);
    cx.fillStyle='#e63946';cx.fillRect(bx,by,bw*(1-this.pos),20);
    cx.fillStyle='#2ed573';cx.fillRect(bx+bw*(1-this.pos),by,bw*this.pos,20);
    cx.strokeStyle='rgba(255,255,255,.3)';cx.lineWidth=2;cx.strokeRect(bx,by,bw,20);
    cx.fillStyle='white';cx.font='bold 12px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('CABO DE GUERRA',W/2,by-14);
    cx.restore();
  }
}

// ══════════════════════════════════════════════════
// GAME 8: MINI SOCCER
// ══════════════════════════════════════════════════
class MiniSoccer extends BaseGame{
  init(){
    this.maxTime=60;this.score=[0,0];
    const n=this.pl.length;
    this.ps=this.pl.map((p,i)=>({x:i<Math.ceil(n/2)?this.W*.28:this.W*.72,y:this.H*(0.25+(i%Math.ceil(n/2))*0.5/(Math.ceil(n/2))),vx:0,vy:0,r:18,team:i<Math.ceil(n/2)?0:1,p}));
    this.ball={x:this.W/2,y:this.H/2,vx:0,vy:0,r:12};
    this.GH=this.H*.3;this.GW=15;this.goalFlash=null;this.gfTimer=0;
    this.FX=this.W*.08;this.FW=this.W*.84;this.FY=this.H*.08;this.FH=this.H*.84;
    this.kicked=[false,false,false,false];
  }
  update(dt){
    this.timer+=dt;this.setTimer();
    document.getElementById('gameTimer').textContent=`${this.score[0]}-${this.score[1]} | ${Math.ceil(Math.max(0,this.maxTime-this.timer))}s`;
    if(this.gfTimer>0){this.gfTimer-=dt;if(this.gfTimer<=0)this.goalFlash=null;}
    if(this.score[0]>=5||this.score[1]>=5){setTimeout(()=>this.endSoccer(),800);return;}
    const spd=591,fric=0.60,bfric=0.972;
    this.ps.forEach((s,i)=>{
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      s.x=Math.max(this.FX+s.r,Math.min(this.FX+this.FW-s.r,s.x));
      s.y=Math.max(this.FY+s.r,Math.min(this.FY+this.FH-s.r,s.y));
      // kick
      const kp=key(s.p,'action');
      if(kp&&!this.kicked[i]){
        const dx=this.ball.x-s.x,dy=this.ball.y-s.y,d=Math.hypot(dx,dy);
        if(d<s.r+this.ball.r+18){const nx=dx/d||1,ny=dy/d;this.ball.vx=nx*11;this.ball.vy=ny*11;}
      }
      this.kicked[i]=kp;
      // push ball
      const dx=this.ball.x-s.x,dy=this.ball.y-s.y,d=Math.hypot(dx,dy),md=s.r+this.ball.r;
      if(d<md&&d>0){const nx=dx/d,ny=dy/d,ov=md-d;this.ball.x+=nx*ov*.7;this.ball.y+=ny*ov*.7;s.x-=nx*ov*.3;s.y-=ny*ov*.3;const rel=s.vx*nx+s.vy*ny;if(rel>0){this.ball.vx+=nx*rel*.6;this.ball.vy+=ny*rel*.6;}}
    });
    this.ball.vx*=Math.pow(bfric,dt*60);this.ball.vy*=Math.pow(bfric,dt*60);
    this.ball.x+=this.ball.vx*dt*60;this.ball.y+=this.ball.vy*dt*60;
    const gT=this.H/2-this.GH/2,gB=this.H/2+this.GH/2;
    if(this.ball.x-this.ball.r<this.FX&&this.ball.y>gT&&this.ball.y<gB){this.score[1]++;this.goalFlash='right';this.gfTimer=1.5;this.resetBall();}
    else if(this.ball.x+this.ball.r>this.FX+this.FW&&this.ball.y>gT&&this.ball.y<gB){this.score[0]++;this.goalFlash='left';this.gfTimer=1.5;this.resetBall();}
    if(this.ball.x<this.FX+this.ball.r){this.ball.x=this.FX+this.ball.r;this.ball.vx*=-.6;}
    if(this.ball.x>this.FX+this.FW-this.ball.r){this.ball.x=this.FX+this.FW-this.ball.r;this.ball.vx*=-.6;}
    if(this.ball.y<this.FY+this.ball.r){this.ball.y=this.FY+this.ball.r;this.ball.vy*=-.6;}
    if(this.ball.y>this.FY+this.FH-this.ball.r){this.ball.y=this.FY+this.FH-this.ball.r;this.ball.vy*=-.6;}
    if(this.timer>=this.maxTime)this.endSoccer();
  }
  resetBall(){this.ball.x=this.W/2;this.ball.y=this.H/2;this.ball.vx=0;this.ball.vy=0;}
  endSoccer(){const wi=this.score[0]>=this.score[1]?0:Math.ceil(this.pl.length/2);const pts=this.pl.map((_,i)=>i<Math.ceil(this.pl.length/2)?this.score[0]:this.score[1]);this.endGame(wi,pts);}
  timeUp(){this.endSoccer();}
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#1a3a1a';cx.fillRect(0,0,W,H);
    for(let i=0;i<6;i++){cx.fillStyle=i%2?'rgba(0,0,0,.06)':'rgba(255,255,255,.03)';cx.fillRect(this.FX+i*this.FW/6,this.FY,this.FW/6,this.FH);}
    cx.strokeStyle='rgba(255,255,255,.7)';cx.lineWidth=2;
    cx.strokeRect(this.FX,this.FY,this.FW,this.FH);
    cx.beginPath();cx.moveTo(W/2,this.FY);cx.lineTo(W/2,this.FY+this.FH);cx.stroke();
    cx.beginPath();cx.arc(W/2,H/2,this.FH*.18,0,Math.PI*2);cx.stroke();
    const gT=H/2-this.GH/2;
    cx.fillStyle='rgba(255,80,80,.1)';cx.fillRect(this.FX-this.GW,gT,this.GW,this.GH);
    cx.strokeStyle='#e63946';cx.lineWidth=3;cx.strokeRect(this.FX-this.GW,gT,this.GW,this.GH);
    cx.fillStyle='rgba(80,160,255,.1)';cx.fillRect(this.FX+this.FW,gT,this.GW,this.GH);
    cx.strokeStyle='#2ed573';cx.lineWidth=3;cx.strokeRect(this.FX+this.FW,gT,this.GW,this.GH);
    if(this.goalFlash){cx.fillStyle=this.goalFlash==='left'?'rgba(46,213,115,.15)':'rgba(230,57,70,.15)';cx.fillRect(0,0,W,H);}
    // Ball
    const b=this.ball;const bspd=Math.hypot(b.vx,b.vy);
    if(bspd>2){cx.shadowColor='rgba(255,255,255,.5)';cx.shadowBlur=8+bspd;}
    cx.fillStyle='white';cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
    cx.fillStyle='rgba(0,0,0,.3)';
    const ba=Date.now()*.003*bspd*.1;
    for(let i=0;i<5;i++){const a=ba+i*Math.PI*2/5;cx.beginPath();cx.arc(b.x+Math.cos(a)*b.r*.5,b.y+Math.sin(a)*b.r*.5,b.r*.2,0,Math.PI*2);cx.fill();}
    // Players
    this.ps.forEach(s=>{cx.shadowColor=s.p.color;cx.shadowBlur=12;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;cx.fillStyle='white';cx.font='bold 11px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);});
  }
}


// ══════════════════════════════════════════════════
// GAME 9: PAINT WAR — cover the most floor
// ══════════════════════════════════════════════════
class PaintWar extends BaseGame{
  init(){
    this.maxTime=35;
    this.cols=this.pl.map(p=>p.color);
    this.tileW=20;this.tileH=20;
    this.cols_grid=Math.ceil(this.W/this.tileW);
    this.rows_grid=Math.ceil(this.H/this.tileH);
    this.grid=new Array(this.cols_grid*this.rows_grid).fill(-1);
    this.ps=this.pl.map((p,i)=>({
      x:this.W*(0.15+i*(0.7/(this.pl.length-1||1))),
      y:this.H/2,vx:0,vy:0,r:16,p,idx:i
    }));
    this.paintCount=this.pl.map(()=>0);
  }
  paintAt(x,y,pi){
    const tx=Math.floor(x/this.tileW),ty=Math.floor(y/this.tileH);
    if(tx<0||tx>=this.cols_grid||ty<0||ty>=this.rows_grid)return;
    const idx=ty*this.cols_grid+tx;
    if(this.grid[idx]!==pi){
      if(this.grid[idx]>=0)this.paintCount[this.grid[idx]]--;
      this.grid[idx]=pi;
      this.paintCount[pi]++;
    }
  }
  update(dt){
    super.update(dt);this.setTimer();
    const spd=591,fric=0.60;
    this.ps.forEach((s,i)=>{
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));s.y=Math.max(s.r,Math.min(this.H-s.r,s.y));
      // Paint under player
      for(let ox=-1;ox<=1;ox++)for(let oy=-1;oy<=1;oy++)this.paintAt(s.x+ox*14,s.y+oy*14,i);
    });
    // Player collisions
    for(let i=0;i<this.ps.length;i++)for(let j=i+1;j<this.ps.length;j++){
      const a=this.ps[i],b=this.ps[j];
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy),md=a.r+b.r;
      if(d<md&&d>0){const nx=dx/d,ny=dy/d,ov=(md-d)/2;a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;}
    }
  }
  timeUp(){
    const max=Math.max(...this.paintCount);
    const wi=this.paintCount.indexOf(max);
    const total=this.cols_grid*this.rows_grid;
    const pts=this.paintCount.map(c=>Math.round(c/total*5));
    this.endGame(wi,pts);
  }
  draw(){
    const{W,H,cx}=this;
    // Draw grid
    for(let ty=0;ty<this.rows_grid;ty++)for(let tx=0;tx<this.cols_grid;tx++){
      const p=this.grid[ty*this.cols_grid+tx];
      cx.fillStyle=p>=0?this.cols[p]+'55':'#111';
      cx.fillRect(tx*this.tileW,ty*this.tileH,this.tileW-1,this.tileH-1);
    }
    // Players
    this.ps.forEach((s,i)=>{
      cx.shadowColor=s.p.color;cx.shadowBlur=14;
      cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;cx.fillStyle='white';cx.font='bold 11px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
    });
    // HUD scores
    const total=this.cols_grid*this.rows_grid;
    this.ps.forEach((s,i)=>{
      const pct=this.paintCount[i]/total;
      const bw=80,bh=12,bx=10+i*(bw+8),by=8;
      cx.fillStyle='rgba(0,0,0,.5)';cx.fillRect(bx,by,bw,bh);
      cx.fillStyle=s.p.color;cx.fillRect(bx,by,bw*pct,bh);
      cx.strokeStyle='rgba(255,255,255,.3)';cx.lineWidth=1;cx.strokeRect(bx,by,bw,bh);
      cx.fillStyle='white';cx.font='bold 10px Nunito';cx.textAlign='left';cx.fillText(s.p.name+' '+Math.round(pct*100)+'%',bx+2,by+bh+12);
    });
  }
}

// ══════════════════════════════════════════════════
// GAME 10: KING OF THE HILL
// ══════════════════════════════════════════════════
class KingOfHill extends BaseGame{
  init(){
    this.maxTime=40;this.zoneR=Math.min(this.W,this.H)*.14;
    this.zx=this.W/2;this.zy=this.H/2;
    this.zonePts=this.pl.map(()=>0);
    this.ps=this.pl.map((p,i)=>{
      const a=(i/this.pl.length)*Math.PI*2;
      return{x:this.W/2+Math.cos(a)*this.W*.3,y:this.H/2+Math.sin(a)*this.H*.3,vx:0,vy:0,r:18,p,idx:i};
    });
  }
  update(dt){
    super.update(dt);this.setTimer();
    const spd=591,fric=0.60;
    this.ps.forEach((s,i)=>{
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));s.y=Math.max(s.r,Math.min(this.H-s.r,s.y));
      if(Math.hypot(s.x-this.zx,s.y-this.zy)<this.zoneR)this.zonePts[i]+=dt;
    });
    // Player collisions with push
    for(let i=0;i<this.ps.length;i++)for(let j=i+1;j<this.ps.length;j++){
      const a=this.ps[i],b=this.ps[j];
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy),md=a.r+b.r;
      if(d<md&&d>0){const nx=dx/d,ny=dy/d,ov=(md-d)/2;
        a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;
        const f=300*dt;a.vx-=nx*f;a.vy-=ny*f;b.vx+=nx*f;b.vy+=ny*f;}
    }
  }
  timeUp(){
    const max=Math.max(...this.zonePts);
    const wi=this.zonePts.indexOf(max);
    const pts=this.zonePts.map(t=>Math.round(t*.2));
    this.endGame(wi,pts);
  }
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#0d1a0d';cx.fillRect(0,0,W,H);
    // Grid
    cx.strokeStyle='rgba(255,255,255,.04)';cx.lineWidth=1;
    for(let x=0;x<W;x+=48){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(let y=0;y<H;y+=48){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    // Zone
    const king=this.zonePts.indexOf(Math.max(...this.zonePts));
    const kCol=king>=0&&this.zonePts[king]>0?this.pl[king].color:'rgba(255,255,255,.3)';
    const pulse=Math.sin(Date.now()*.003)*.15+.85;
    cx.shadowColor=kCol;cx.shadowBlur=30*pulse;
    cx.strokeStyle=kCol;cx.lineWidth=4;cx.beginPath();cx.arc(this.zx,this.zy,this.zoneR,0,Math.PI*2);cx.stroke();
    cx.fillStyle=kCol.replace(')',',0.12)').replace('rgb','rgba').replace('#','')||kCol+'22';
    // simpler fill:
    cx.globalAlpha=.12;cx.fillStyle=kCol;cx.beginPath();cx.arc(this.zx,this.zy,this.zoneR,0,Math.PI*2);cx.fill();cx.globalAlpha=1;
    cx.shadowBlur=0;
    cx.fillStyle='rgba(255,255,255,.6)';cx.font='bold 18px Fredoka One';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('👑',this.zx,this.zy);
    // Players
    this.ps.forEach((s,i)=>{
      const inZone=Math.hypot(s.x-this.zx,s.y-this.zy)<this.zoneR;
      if(inZone){cx.shadowColor=s.p.color;cx.shadowBlur=20;}
      cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      cx.fillStyle='white';cx.font='bold 11px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
      const pct=this.zonePts[i]/this.maxTime;
      const bw=50,bx=s.x-25,by=s.y-s.r-14;
      cx.fillStyle='rgba(0,0,0,.4)';cx.fillRect(bx,by,bw,7);
      cx.fillStyle=s.p.color;cx.fillRect(bx,by,bw*pct,7);
    });
  }
}

// ══════════════════════════════════════════════════
// GAME 11: VOLLEY — don\'t let ball drop on your side
// ══════════════════════════════════════════════════
class Volley extends BaseGame{
  init(){
    this.maxTime=60;this.lives=[3,3,3,3].slice(0,this.pl.length);
    this.balls=[{x:this.W/2,y:this.H*.3,vx:(Math.random()-.5)*300,vy:100,r:14}];
    this.ballTimer=0;
    // Split into 2 teams, assign court zones
    this.team0=this.pl.filter((_,i)=>i%2===0);
    this.team1=this.pl.filter((_,i)=>i%2===1);
    this.ps=this.pl.map((p,i)=>({x:i%2===0?this.W*.25:this.W*.75,y:this.H*.75,vx:0,vy:0,r:18,p,team:i%2}));
    this.netX=this.W/2;this.floor=this.H*.9;
    this.flashes=[];
  }
  update(dt){
    this.timer+=dt;this.setTimer();
    this.ballTimer+=dt;
    if(this.ballTimer>12&&this.balls.length<3){this.balls.push({x:this.W/2,y:this.H*.2,vx:(Math.random()-.5)*250,vy:80,r:14});this.ballTimer=0;}
    const spd=601,fric=0.60;
    this.ps.forEach((s,i)=>{
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      // Constrain to own side
      const minX=s.team===0?s.r:this.netX+s.r+5;
      const maxX=s.team===0?this.netX-s.r-5:this.W-s.r;
      s.x=Math.max(minX,Math.min(maxX,s.x));
      s.y=Math.max(s.r,Math.min(this.floor-s.r,s.y));
    });
    // Ball physics
    this.balls.forEach((b,bi)=>{
      b.vy+=550*dt; // gravity
      b.x+=b.vx*dt;b.y+=b.vy*dt;
      // Wall bounces
      if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx)*.8;}
      if(b.x+b.r>this.W){b.x=this.W-b.r;b.vx=-Math.abs(b.vx)*.8;}
      if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy)*.7;}
      // Net collision
      if(b.x>this.netX-8&&b.x<this.netX+8&&b.y>this.H*.4){b.vx*=-.85;b.x=b.vx>0?this.netX+8:this.netX-8;}
      // Player hit
      this.ps.forEach(s=>{
        const d=Math.hypot(s.x-b.x,s.y-b.y);
        if(d<s.r+b.r){
          const nx=(b.x-s.x)/d,ny=(b.y-s.y)/d;
          const spd2=Math.hypot(b.vx,b.vy);
          b.vx=nx*Math.max(spd2,300)+s.vx*0.5;
          b.vy=ny*Math.max(spd2,300)-180+s.vy*0.3;
          b.x=s.x+nx*(s.r+b.r+2);b.y=s.y+ny*(s.r+b.r+2);
        }
      });
      // Floor — ball drops
      if(b.y+b.r>this.floor){
        const losingSide=b.x<this.netX?0:1;
        this.flashes.push({x:b.x,y:b.y,c:this.pl[losingSide]?.color||'#ff4757',t:.6});
        // Deduct from all players on that side
        this.pl.forEach((_,i)=>{if(i%2===losingSide&&this.lives[i]>0)this.lives[i]--;});
        b.y=this.H*.2;b.x=this.W/2;b.vx=(Math.random()-.5)*250;b.vy=100;
        if(this.lives.filter((_,i)=>i%2===losingSide).every(l=>l<=0)){
          const wi=this.pl.findIndex((_,i)=>i%2!==losingSide);this.endGame(wi,this.lives.map(l=>Math.max(0,l)));
        }
      }
    });
    this.flashes=this.flashes.filter(f=>{f.t-=dt;return f.t>0;});
  }
  timeUp(){
    const t0=this.lives.filter((_,i)=>i%2===0).reduce((a,b)=>a+b,0);
    const t1=this.lives.filter((_,i)=>i%2===1).reduce((a,b)=>a+b,0);
    const wi=t0>=t1?this.pl.findIndex((_,i)=>i%2===0):this.pl.findIndex((_,i)=>i%2===1);
    this.endGame(wi,this.lives.map(l=>Math.max(0,l)));
  }
  draw(){
    const{W,H,cx}=this;
    // Background sides
    cx.fillStyle='#0d0a20';cx.fillRect(0,0,W/2,H);
    cx.fillStyle='#0a200d';cx.fillRect(W/2,0,W/2,H);
    // Floor
    cx.fillStyle='#2a1a0a';cx.fillRect(0,this.floor,W,H-this.floor);
    cx.strokeStyle='rgba(255,255,255,.3)';cx.lineWidth=3;cx.beginPath();cx.moveTo(0,this.floor);cx.lineTo(W,this.floor);cx.stroke();
    // Net
    cx.strokeStyle='rgba(255,255,255,.5)';cx.lineWidth=5;
    cx.beginPath();cx.moveTo(this.netX,this.H*.4);cx.lineTo(this.netX,this.floor);cx.stroke();
    cx.strokeStyle='rgba(255,255,255,.15)';cx.lineWidth=1;
    for(let y=this.H*.4;y<this.floor;y+=20){cx.beginPath();cx.moveTo(this.netX-15,y);cx.lineTo(this.netX+15,y);cx.stroke();}
    // Flashes
    this.flashes.forEach(f=>{const r=40*(1-f.t/.6)*2;cx.globalAlpha=f.t/.6*.6;cx.fillStyle=f.c;cx.beginPath();cx.arc(f.x,f.y,r,0,Math.PI*2);cx.fill();cx.globalAlpha=1;});
    // Balls
    this.balls.forEach(b=>{
      cx.shadowColor='#fff';cx.shadowBlur=12;cx.fillStyle='white';cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      cx.fillStyle='rgba(0,0,0,.3)';cx.beginPath();cx.arc(b.x,b.y,b.r*.5,0,Math.PI*2);cx.fill();
    });
    // Players
    this.ps.forEach((s,i)=>{
      cx.shadowColor=s.p.color;cx.shadowBlur=12;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;cx.fillStyle='white';cx.font='bold 11px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
      for(let l=0;l<this.lives[i];l++){cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x-10+l*11,s.y-s.r-12,4,0,Math.PI*2);cx.fill();}
    });
  }
}
