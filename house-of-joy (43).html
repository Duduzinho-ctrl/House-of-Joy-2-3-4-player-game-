// GAME 13: PONG CHAOS — bounce balls to enemy side
// ══════════════════════════════════════════════════
class PongChaos extends BaseGame{
  init(){
    this.maxTime=50;this.lives=[5,5,5,5].slice(0,this.pl.length);
    const n=this.pl.length;
    // Paddles on 4 walls: top, bottom, left, right
    const wallDefs=[
      {wall:'bottom',axis:'x',fix:H=>H*.94,range:(W)=>[W*.1,W*.9],color:null},
      {wall:'top',   axis:'x',fix:()=>H*.06,range:(W)=>[W*.1,W*.9],color:null},
      {wall:'left',  axis:'y',fix:()=>W*.06,range:(H)=>[H*.1,H*.9],color:null},
      {wall:'right', axis:'y',fix:(W)=>W*.94,range:(H)=>[H*.1,H*.9],color:null},
    ];
    this.paddles=this.pl.map((p,i)=>{
      const wd=wallDefs[i%4];
      return{p,wall:wd.wall,pos:0.5,len:120,thick:12,color:p.color,lives:this.lives[i],idx:i};
    });
    this.balls=[
      {x:this.W/2,y:this.H/2,vx:220*(Math.random()>.5?1:-1),vy:220*(Math.random()>.5?1:-1),r:10,c:'#fff'},
    ];
    this.bTimer=0;this.W2=this.W;this.H2=this.H;
  }
  update(dt){
    this.timer+=dt;this.setTimer();
    this.bTimer+=dt;
    if(this.bTimer>10&&this.balls.length<4){this.balls.push({x:this.W/2+((Math.random()-.5)*100),y:this.H/2+((Math.random()-.5)*100),vx:200*(Math.random()>.5?1:-1),vy:200*(Math.random()>.5?1:-1),r:10,c:['#ff4757','#ffd32a','#2ed573','#1e90ff'][this.balls.length%4]});this.bTimer=0;}
    // Move paddles
    this.paddles.forEach((pd,i)=>{
      const horiz=(pd.wall==='top'||pd.wall==='bottom');
      if(horiz){if(key(pd.p,'left'))pd.pos=Math.max(0.05,pd.pos-.5*dt*2.2);if(key(pd.p,'right'))pd.pos=Math.min(0.95,pd.pos+.5*dt*2.2);}
      else{if(key(pd.p,'up'))pd.pos=Math.max(0.05,pd.pos-.5*dt*2.2);if(key(pd.p,'down'))pd.pos=Math.min(0.95,pd.pos+.5*dt*2.2);}
    });
    // Ball physics
    const W=this.W,H=this.H;
    this.balls.forEach(b=>{
      b.x+=b.vx*dt;b.y+=b.vy*dt;
      const spd2=Math.hypot(b.vx,b.vy);
      // Cap and grow speed slightly
      const targetSpd=Math.min(600,spd2*1.001+.5);
      b.vx=b.vx/spd2*targetSpd;b.vy=b.vy/spd2*targetSpd;
      // Paddle collisions
      this.paddles.forEach((pd,pi)=>{
        const hw=pd.wall==='top'||pd.wall==='bottom';
        let px,py,pw,ph;
        if(hw){px=(pd.pos-0.5)*W*.8+W/2;py=pd.wall==='bottom'?H*.94:H*.06;pw=pd.len;ph=pd.thick;}
        else{py=(pd.pos-0.5)*H*.8+H/2;px=pd.wall==='right'?W*.94:W*.06;ph=pd.len;pw=pd.thick;}
        if(b.x+b.r>px-pw/2&&b.x-b.r<px+pw/2&&b.y+b.r>py-ph/2&&b.y-b.r<py+ph/2){
          if(hw){b.vy=-b.vy;b.y=pd.wall==='bottom'?py-ph/2-b.r:py+ph/2+b.r;b.vx+=(b.x-px)/pd.len*200;}
          else{b.vx=-b.vx;b.x=pd.wall==='right'?px-pw/2-b.r:px+pw/2+b.r;b.vy+=(b.y-py)/pd.len*200;}
        }
      });
      // Wall score
      const margin=20;
      let scored=-1;
      if(b.y>H-margin)scored=0;else if(b.y<margin)scored=1;else if(b.x<margin)scored=2;else if(b.x>W-margin)scored=3;
      if(scored>=0&&scored<this.pl.length){
        this.lives[scored]--;this.paddles[scored].lives=this.lives[scored];
        b.x=W/2;b.y=H/2;b.vx=220*(Math.random()>.5?1:-1);b.vy=220*(Math.random()>.5?1:-1);
        if(this.lives[scored]<=0){this.checkWin();}
      }
    });
  }
  checkWin(){
    const alive=this.paddles.filter((_,i)=>this.lives[i]>0);
    if(alive.length<=1)this.endGame(alive.length?alive[0].idx:this.lives.indexOf(Math.max(...this.lives)),this.lives.map(l=>Math.max(0,l)));
  }
  timeUp(){const max=Math.max(...this.lives);const wi=this.lives.indexOf(max);this.endGame(wi,this.lives.map(l=>Math.max(0,l)));}
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#070718';cx.fillRect(0,0,W,H);
    cx.strokeStyle='rgba(255,255,255,.06)';cx.lineWidth=1;
    for(let x=0;x<W;x+=50){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(let y=0;y<H;y+=50){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    cx.strokeStyle='rgba(255,255,255,.08)';cx.lineWidth=2;cx.setLineDash([12,12]);
    cx.beginPath();cx.moveTo(W/2,0);cx.lineTo(W/2,H);cx.stroke();
    cx.beginPath();cx.moveTo(0,H/2);cx.lineTo(W,H/2);cx.stroke();cx.setLineDash([]);
    // Paddles
    this.paddles.forEach((pd,i)=>{
      if(i>=this.pl.length)return;
      const hw=pd.wall==='top'||pd.wall==='bottom';
      let px,py;
      if(hw){px=(pd.pos-0.5)*W*.8+W/2;py=pd.wall==='bottom'?H*.94:H*.06;}
      else{py=(pd.pos-0.5)*H*.8+H/2;px=pd.wall==='right'?W*.94:W*.06;}
      const pw=hw?pd.len:pd.thick,ph=hw?pd.thick:pd.len;
      cx.shadowColor=pd.color;cx.shadowBlur=12;cx.fillStyle=pd.color;
      cx.beginPath();cx.roundRect(px-pw/2,py-ph/2,pw,ph,6);cx.fill();cx.shadowBlur=0;
      cx.fillStyle='white';cx.font='bold 10px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(pd.p.name,px,py);
      // Lives
      for(let l=0;l<this.lives[i];l++){cx.fillStyle=pd.color;cx.beginPath();cx.arc(hw?px-pd.len/2+l*14:px+(pd.wall==='left'?24:-(24)),hw?py+(pd.wall==='bottom'?-22:22):py-pd.len/2+l*14,4,0,Math.PI*2);cx.fill();}
    });
    // Balls
    this.balls.forEach(b=>{cx.shadowColor=b.c;cx.shadowBlur=14;cx.fillStyle=b.c;cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;});
  }
}


// ══════════════════════════════════════════════════
// GAME 14: ZOMBIE — infected chase
// ══════════════════════════════════════════════════
class Zombie extends BaseGame{
  init(){
    this.maxTime=45;
    this.ps=this.pl.map((p,i)=>({x:this.W*(0.15+i*(0.7/(this.pl.length-1||1))),y:this.H/2,vx:0,vy:0,r:18,p,zombie:false,infectedAt:-1}));
    // Random first zombie
    this._firstZombie=Math.floor(Math.random()*this.ps.length);
    this.ps[this._firstZombie].zombie=true;
    this.infectedCount=1;this.flashTimer=[];this.ps.forEach(()=>this.flashTimer.push(0));
  }
  update(dt){
    super.update(dt);this.setTimer();
    const spdH=600,spdZ=440,fric=0.60;
    this.ps.forEach((s,i)=>{
      this.flashTimer[i]=Math.max(0,this.flashTimer[i]-dt);
      const spd=s.zombie?spdZ:spdH;
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));s.y=Math.max(s.r,Math.min(this.H-s.r,s.y));
    });
    // Infection spread
    this.ps.forEach((a,i)=>{if(!a.zombie)return;
      this.ps.forEach((b,j)=>{if(b.zombie)return;
        if(Math.hypot(a.x-b.x,a.y-b.y)<a.r+b.r+4){b.zombie=true;this.infectedCount++;this.flashTimer[j]=.5;this.checkWin();}
      });
    });
    // AI: zombies chase nearest human (for fun even if player controlled)
    // (players control themselves; AI assist not needed, they choose direction)
  }
  checkWin(){
    const humans=this.ps.filter(s=>!s.zombie);
    if(humans.length===0){// First zombie (original) wins when all infected
const firstZombie=this.ps.findIndex((_,i)=>i===this._firstZombie);this.endGame(firstZombie>=0?firstZombie:0,this.ps.map((_,i)=>i===this._firstZombie?3:1));return;}
    if(this.infectedCount>=this.ps.length-1&&humans.length===1){
      setTimeout(()=>this.endGame(this.ps.indexOf(humans[0]),this.ps.map(s=>s.zombie?0:3)),800);
    }
  }
  timeUp(){
    const humans=this.ps.filter(s=>!s.zombie);
    const pts=this.ps.map(s=>s.zombie?0:3);
    if(humans.length===1)this.endGame(this.ps.indexOf(humans[0]),pts);
    else if(humans.length>1)this.endGame(this._firstZombie>=0?this._firstZombie:0,pts);
    else this.endGame(this._firstZombie>=0?this._firstZombie:0,pts);
  }
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#0a1a08';cx.fillRect(0,0,W,H);
    // Fog/grid
    cx.strokeStyle='rgba(0,255,0,.03)';cx.lineWidth=1;
    for(let x=0;x<W;x+=44){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(let y=0;y<H;y+=44){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    this.ps.forEach((s,i)=>{
      if(this.flashTimer[i]>0){cx.fillStyle='rgba(255,0,0,.3)';cx.fillRect(0,0,W,H);}
      const c=s.zombie?'#44ff44':s.p.color;
      cx.shadowColor=c;cx.shadowBlur=s.zombie?20:10;
      cx.fillStyle=c;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      cx.fillStyle=s.zombie?'#000':'white';cx.font=`bold ${s.zombie?'18':'12'}px Nunito`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(s.zombie?'🧟':s.p.name,s.x,s.y);
      if(!s.zombie){cx.fillStyle='rgba(255,255,255,.4)';cx.font='10px Nunito';cx.fillText('🏃',s.x,s.y+s.r+12);}
    });
    // Status
    const humans=this.ps.filter(s=>!s.zombie).length;
    cx.fillStyle='rgba(0,0,0,.5)';cx.fillRect(8,8,160,28);
    cx.fillStyle='#44ff44';cx.font='bold 13px Fredoka One';cx.textAlign='left';cx.fillText(`🧟 ${this.infectedCount}   🏃 ${humans}`,14,27);
  }
}

// ══════════════════════════════════════════════════
// GAME 15: ASTEROID — shoot & collect
// ══════════════════════════════════════════════════
class Asteroid extends BaseGame{
  init(){
    this.maxTime=40;
    this.ps=this.pl.map((p,i)=>{const a=(i/this.pl.length)*Math.PI*2;return{x:this.W/2+Math.cos(a)*this.W*.25,y:this.H/2+Math.sin(a)*this.H*.25,vx:0,vy:0,r:14,angle:a,p,pts:0,shotCD:0};});
    this.bullets=[];this.rocks=[];this.frags=[];
    for(let i=0;i<7;i++)this.spawnRock();
  }
  spawnRock(x,y,r){
    const rr=r||40+Math.random()*30;
    this.rocks.push({x:x||Math.random()*this.W,y:y||Math.random()*this.H,vx:(Math.random()-.5)*80,vy:(Math.random()-.5)*80,r:rr,ang:0,spin:.01+Math.random()*.03,hp:rr>50?3:rr>30?2:1,maxhp:rr>50?3:rr>30?2:1});
  }
  update(dt){
    super.update(dt);this.setTimer();
    const thrust=380,fric=0.988;
    this.ps.forEach((s,i)=>{
      if(key(s.p,'left'))s.angle-=3*dt;if(key(s.p,'right'))s.angle+=3*dt;
      if(key(s.p,'up')){s.vx+=Math.cos(s.angle)*thrust*dt;s.vy+=Math.sin(s.angle)*thrust*dt;}
      const spd=Math.hypot(s.vx,s.vy);if(spd>700){s.vx=s.vx/spd*700;s.vy=s.vy/spd*500;}
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      s.x=(s.x+s.vx*dt+this.W)%this.W;s.y=(s.y+s.vy*dt+this.H)%this.H;
      s.shotCD-=dt;
      if(key(s.p,'action')&&s.shotCD<=0){
        this.bullets.push({x:s.x,y:s.y,vx:Math.cos(s.angle)*400+s.vx,vy:Math.sin(s.angle)*400+s.vy,r:4,life:1.2,pi:i,c:s.p.color});
        s.shotCD=0.25;
      }
    });
    this.rocks.forEach(r=>{r.x=(r.x+r.vx*dt+this.W)%this.W;r.y=(r.y+r.vy*dt+this.H)%this.H;r.ang+=r.spin;});
    this.frags=this.frags.filter(f=>{f.x+=f.vx*dt;f.y+=f.vy*dt;f.life-=dt;return f.life>0;});
    this.bullets=this.bullets.filter(b=>{
      b.x=(b.x+b.vx*dt+this.W)%this.W;b.y=(b.y+b.vy*dt+this.H)%this.H;b.life-=dt;
      let hit=false;
      this.rocks=this.rocks.filter(r=>{
        if(hit)return true;
        if(Math.hypot(b.x-r.x,b.y-r.y)<b.r+r.r){
          r.hp--;this.ps[b.pi].pts+=1;
          if(r.hp<=0){
            if(r.r>25){this.spawnRock(r.x,r.y,r.r*.55);this.spawnRock(r.x,r.y,r.r*.45);}
            for(let k=0;k<6;k++)this.frags.push({x:r.x,y:r.y,vx:(Math.random()-.5)*150,vy:(Math.random()-.5)*150,life:.6,c:this.pl[b.pi].color});
            hit=true;return false;
          }
          hit=true;return true;
        }
        return true;
      });
      return !hit&&b.life>0;
    });
    if(this.rocks.length<3)this.spawnRock();
  }
  timeUp(){const mx=Math.max(...this.ps.map(p=>p.pts));const wi=this.ps.findIndex(p=>p.pts===mx);this.endGame(wi,this.ps.map(p=>Math.round(p.pts/2)));}
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#020208';cx.fillRect(0,0,W,H);
    // Stars bg
    cx.fillStyle='rgba(255,255,255,.4)';for(let i=0;i<60;i++){const sx=(i*137+23)%W,sy=(i*89+47)%H;cx.fillRect(sx,sy,1,1);}
    // Rocks
    this.rocks.forEach(r=>{
      cx.save();cx.translate(r.x,r.y);cx.rotate(r.ang);
      cx.strokeStyle=`rgba(180,160,120,${.5+r.hp/r.maxhp*.5})`;cx.lineWidth=2;cx.fillStyle='rgba(80,60,40,.7)';
      cx.beginPath();const sides=7;
      for(let i=0;i<sides;i++){const a=i/sides*Math.PI*2,rr=r.r*(0.8+Math.sin(i*2.3)*.2);i===0?cx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr):cx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}
      cx.closePath();cx.fill();cx.stroke();cx.restore();
    });
    // Fragments
    this.frags.forEach(f=>{cx.globalAlpha=f.life/.6;cx.fillStyle=f.c;cx.fillRect(f.x-2,f.y-2,4,4);});cx.globalAlpha=1;
    // Bullets
    this.bullets.forEach(b=>{cx.shadowColor=b.c;cx.shadowBlur=8;cx.fillStyle=b.c;cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;});
    // Ships
    this.ps.forEach(s=>{
      cx.save();cx.translate(s.x,s.y);cx.rotate(s.angle);
      cx.shadowColor=s.p.color;cx.shadowBlur=12;
      cx.fillStyle=s.p.color;cx.beginPath();cx.moveTo(14,0);cx.lineTo(-10,8);cx.lineTo(-6,0);cx.lineTo(-10,-8);cx.closePath();cx.fill();
      if(key(s.p,'up')){cx.fillStyle='#ff8800';cx.beginPath();cx.moveTo(-8,0);cx.lineTo(-16+Math.random()*6,4);cx.lineTo(-16+Math.random()*6,-4);cx.closePath();cx.fill();}
      cx.shadowBlur=0;cx.restore();
      cx.fillStyle='white';cx.font='bold 10px Nunito';cx.textAlign='center';cx.fillText(s.p.name,s.x,s.y-s.r-8);
      cx.fillStyle=s.p.color;cx.font='bold 12px Fredoka One';cx.fillText(s.pts+'★',s.x,s.y+s.r+14);
    });
  }
}

// GAME 16: SNAKE — grow and trap
// ══════════════════════════════════════════════════
class SnakeGame extends BaseGame{
  init(){
    this.maxTime=50;this.cell=20;
    this.cols2=Math.floor(this.W/this.cell);this.rows2=Math.floor(this.H/this.cell);
    const starts=[[2,2],[this.cols2-3,this.rows2-3],[this.cols2-3,2],[2,this.rows2-3]];
    const dirs=[[1,0],[-1,0],[1,0],[-1,0]];
    this.snakes=this.pl.map((p,i)=>{const[sx,sy]=starts[i%4];return{p,segs:[{x:sx,y:sy}],dir:dirs[i%4],nextDir:dirs[i%4],moveTimer:0,moveInterval:.07,alive:true,pts:0};});
    this.food=[];for(let i=0;i<5;i++)this.spawnFood();
    this.inputCd=this.snakes.map(()=>false);
  }
  spawnFood(){this.food.push({x:Math.floor(Math.random()*this.cols2),y:Math.floor(Math.random()*this.rows2),type:Math.random()<.2?'super':'normal'});}
  update(dt){
    super.update(dt);this.setTimer();
    this.snakes.forEach((s,i)=>{
      if(!s.alive)return;
      const[dx,dy]=s.dir;
      if(key(s.p,'up')&&dy===0)s.nextDir=[0,-1];
      else if(key(s.p,'down')&&dy===0)s.nextDir=[0,1];
      else if(key(s.p,'left')&&dx===0)s.nextDir=[-1,0];
      else if(key(s.p,'right')&&dx===0)s.nextDir=[1,0];
      s.moveTimer+=dt;
      if(s.moveTimer>=s.moveInterval){
        s.moveTimer=0;s.dir=s.nextDir;
        const head={x:(s.segs[0].x+s.dir[0]+this.cols2)%this.cols2,y:(s.segs[0].y+s.dir[1]+this.rows2)%this.rows2};
        // Self collision
        if(s.segs.some(seg=>seg.x===head.x&&seg.y===head.y)){s.alive=false;this.checkSnakeWin();return;}
        // Other snake collision
        let crashed=false;
        this.snakes.forEach((o,j)=>{if(j===i||!o.alive)return;if(o.segs.some(seg=>seg.x===head.x&&seg.y===head.y)){s.alive=false;crashed=true;this.checkSnakeWin();}});
        if(crashed)return;
        s.segs.unshift(head);
        // Food
        const fi=this.food.findIndex(f=>f.x===head.x&&f.y===head.y);
        if(fi>=0){const f=this.food.splice(fi,1)[0];s.pts+=f.type==='super'?5:1;if(f.type!=='super')s.segs.pop();this.spawnFood();}
        else s.segs.pop();
      }
    });
  }
  checkSnakeWin(){
    const alive=this.snakes.filter(s=>s.alive);
    if(alive.length<=1){const wi=alive.length===1?this.snakes.indexOf(alive[0]):this.snakes.map(s=>s.pts).indexOf(Math.max(...this.snakes.map(s=>s.pts)));const pts=this.snakes.map(s=>Math.round(s.pts));this.endGame(wi,pts);}
  }
  timeUp(){const mx=Math.max(...this.snakes.map(s=>s.segs.length));const wi=this.snakes.findIndex(s=>s.segs.length===mx);this.endGame(wi,this.snakes.map(s=>Math.round(s.pts)));}
  draw(){
    const{W,H,cx,cell}=this;cx.fillStyle='#060f06';cx.fillRect(0,0,W,H);
    cx.strokeStyle='rgba(255,255,255,.03)';cx.lineWidth=.5;
    for(let x=0;x<W;x+=cell){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(let y=0;y<H;y+=cell){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    this.food.forEach(f=>{
      cx.fillStyle=f.type==='super'?'#ff4757':'#ffd32a';cx.shadowColor=cx.fillStyle;cx.shadowBlur=8;
      cx.fillRect(f.x*cell+3,f.y*cell+3,cell-6,cell-6);cx.shadowBlur=0;
    });
    this.snakes.forEach(s=>{
      if(!s.alive){cx.globalAlpha=.25;}
      s.segs.forEach((seg,si)=>{
        const alpha=1-si/s.segs.length*.5;
        cx.fillStyle=s.p.color;cx.globalAlpha=s.alive?alpha:.15;
        cx.fillRect(seg.x*cell+1,seg.y*cell+1,cell-2,cell-2);
      });
      cx.globalAlpha=1;
      if(s.alive&&s.segs.length>0){
        cx.fillStyle='white';cx.font='bold 9px Nunito';cx.textAlign='center';cx.textBaseline='middle';
        cx.fillText(s.p.name,s.segs[0].x*cell+cell/2,s.segs[0].y*cell+cell/2);
      }
    });
    // scores
    this.snakes.forEach((s,i)=>{
      cx.fillStyle=s.p.color;cx.font='bold 11px Fredoka One';cx.textAlign='left';
      cx.fillText(`${s.p.name}: ${s.pts}★ len:${s.segs.length}`,8,18+i*16);
    });
  }
}

// GAME 17: GRAVITY ZERO — thrust & capture flag
// ══════════════════════════════════════════════════
class GravityZero extends BaseGame{
  init(){
    this.maxTime=40;
    this.ps=this.pl.map((p,i)=>{const a=(i/this.pl.length)*Math.PI*2;return{x:this.W/2+Math.cos(a)*this.W*.3,y:this.H/2+Math.sin(a)*this.H*.3,vx:0,vy:0,r:14,angle:a,p,pts:0,hasFlag:false};});
    this.flag={x:this.W/2,y:this.H/2,holder:-1};this.flagTimer=0;
    // Asteroids as obstacles
    this.rocks=[];for(let i=0;i<5;i++)this.rocks.push({x:100+Math.random()*(this.W-200),y:100+Math.random()*(this.H-200),r:20+Math.random()*25,vx:(Math.random()-.5)*40,vy:(Math.random()-.5)*40});
  }
  update(dt){
    super.update(dt);this.setTimer();
    const thrust=350,fric=0.990;
    this.ps.forEach((s,i)=>{
      if(key(s.p,'left'))s.angle-=2.8*dt;if(key(s.p,'right'))s.angle+=2.8*dt;
      if(key(s.p,'up')){s.vx+=Math.cos(s.angle)*thrust*dt;s.vy+=Math.sin(s.angle)*thrust*dt;}
      const spd=Math.hypot(s.vx,s.vy);if(spd>650){s.vx=s.vx/spd*650;s.vy=s.vy/spd*490;}
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      s.x=(s.x+s.vx*dt+this.W)%this.W;s.y=(s.y+s.vy*dt+this.H)%this.H;
      // Pick up flag
      if(this.flag.holder<0&&Math.hypot(s.x-this.flag.x,s.y-this.flag.y)<s.r+18){this.flag.holder=i;s.hasFlag=true;}
    });
    // Flag holder scores
    if(this.flag.holder>=0){
      this.flagTimer+=dt;
      if(this.flagTimer>=1){this.ps[this.flag.holder].pts+=1;this.flagTimer=0;}
      const holder=this.ps[this.flag.holder];
      this.flag.x=holder.x;this.flag.y=holder.y;
      // Other players can steal
      this.ps.forEach((s,i)=>{if(i===this.flag.holder)return;if(Math.hypot(s.x-holder.x,s.y-holder.y)<s.r+holder.r+2){holder.hasFlag=false;s.hasFlag=true;this.flag.holder=i;}});
    }
    // Rocks drift
    this.rocks.forEach(r=>{r.x=(r.x+r.vx*dt+this.W)%this.W;r.y=(r.y+r.vy*dt+this.H)%this.H;});
  }
  timeUp(){const mx=Math.max(...this.ps.map(p=>p.pts));const wi=this.ps.findIndex(p=>p.pts===mx);this.endGame(wi,this.ps.map(p=>Math.round(p.pts/5)));}
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#010110';cx.fillRect(0,0,W,H);
    cx.fillStyle='rgba(255,255,255,.35)';for(let i=0;i<80;i++){cx.fillRect((i*97+13)%W,(i*71+31)%H,1+(i%3===0?1:0),1);}
    // Rocks
    this.rocks.forEach(r=>{cx.fillStyle='rgba(80,70,60,.7)';cx.strokeStyle='rgba(150,130,100,.4)';cx.lineWidth=2;cx.beginPath();cx.arc(r.x,r.y,r.r,0,Math.PI*2);cx.fill();cx.stroke();});
    // Flag
    if(this.flag.holder<0){
      const pulse=Math.sin(Date.now()*.006)*.4+.6;cx.shadowColor='#ffd32a';cx.shadowBlur=20*pulse;
      cx.fillStyle='#ffd32a';cx.beginPath();cx.arc(this.flag.x,this.flag.y,14,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      cx.fillStyle='#000';cx.font='16px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('🚩',this.flag.x,this.flag.y);
    }
    // Ships
    this.ps.forEach(s=>{
      cx.save();cx.translate(s.x,s.y);cx.rotate(s.angle);
      cx.shadowColor=s.p.color;cx.shadowBlur=s.hasFlag?24:10;
      cx.fillStyle=s.p.color;cx.beginPath();cx.moveTo(14,0);cx.lineTo(-9,7);cx.lineTo(-5,0);cx.lineTo(-9,-7);cx.closePath();cx.fill();
      if(s.hasFlag){cx.fillStyle='#ffd32a';cx.font='14px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('🚩',4,-14);}
      if(key(s.p,'up')){cx.fillStyle='rgba(255,140,0,.8)';cx.beginPath();cx.moveTo(-7,0);cx.lineTo(-14+Math.random()*5,4);cx.lineTo(-14+Math.random()*5,-4);cx.closePath();cx.fill();}
      cx.shadowBlur=0;cx.restore();
      cx.fillStyle=s.p.color;cx.font='bold 10px Nunito';cx.textAlign='center';cx.fillText(s.p.name+' '+s.pts+'★',s.x,s.y-22);
    });
  }
}

// GAME 18: HOT FLOOR — lava rising
// ══════════════════════════════════════════════════
class HotFloor extends BaseGame{
  init(){
    this.maxTime=50;
    this.platforms=[];
    const rows=4,pW=this.W*.16,pH=14,gap=this.W*.04;
    for(let r=0;r<rows;r++){
      const y=this.H*(0.2+r*.18);
      const count=3+Math.floor(Math.random()*2);
      for(let c=0;c<count;c++){this.platforms.push({x:this.W*.1+c*(pW+gap)+Math.random()*20,y,w:pW,h:pH,moving:Math.random()<.4,vx:(Math.random()-.5)*50});}
    }
    this.ps=this.pl.map((p,i)=>({x:this.W*(0.15+i*(0.7/(this.pl.length-1||1))),y:this.H*.25,vx:0,vy:0,r:14,p,onGround:false,alive:true,jumpCD:0}));
    this.lavaY=this.H;this.lavaRise=18;this.bubbleTimer=0;this.bubbles=[];this.lives=this.ps.map(()=>3);this.respawn=this.ps.map(()=>0);
  }
  update(dt){
    super.update(dt);this.setTimer();
    this.lavaY-=this.lavaRise*dt;this.lavaRise+=.5*dt;
    this.bubbleTimer+=dt;if(this.bubbleTimer>.15){this.bubbles.push({x:Math.random()*this.W,y:this.lavaY,vy:-30-Math.random()*40,r:4+Math.random()*8,life:1});this.bubbleTimer=0;}
    this.bubbles=this.bubbles.filter(b=>{b.y+=b.vy*dt;b.life-=dt;return b.life>0&&b.y>this.lavaY-40;});
    this.platforms.forEach(pl=>{if(pl.moving){pl.x+=pl.vx*dt;if(pl.x<10||pl.x+pl.w>this.W-10)pl.vx*=-1;}});
    const spd=584,fric=0.60,grav=720,jumpPow=-580;
    this.ps.forEach((s,i)=>{
      if(!s.alive){this.respawn[i]-=dt;if(this.respawn[i]<=0&&this.lives[i]>0){s.x=this.W/2+(Math.random()-.5)*100;s.y=Math.min(this.H*.15,this.lavaY-60);s.vx=0;s.vy=0;s.alive=true;}return;}
      s.jumpCD-=dt;s.onGround=false;
      let ax=0;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      s.vx+=ax*spd*dt;s.vx*=Math.pow(fric,dt*60);s.vy+=grav*dt;
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));
      // Platform collision
      this.platforms.forEach(pl=>{
        if(s.vy>=0&&s.y+s.r>pl.y&&s.y+s.r<pl.y+pl.h+s.vy*dt+4&&s.x+s.r>pl.x&&s.x-s.r<pl.x+pl.w){s.y=pl.y-s.r;s.vy=0;s.onGround=true;s.x+=pl.vx?pl.vx*dt:0;}
      });
      if((key(s.p,'up')||key(s.p,'action'))&&s.onGround&&s.jumpCD<=0){s.vy=jumpPow;s.jumpCD=.15;}
      // Lava death
      if(s.y+s.r>this.lavaY){this.lives[i]--;s.alive=false;s.vx=0;s.vy=0;this.respawn[i]=this.lives[i]>0?1.5:999;if(this.lives[i]<=0)this.checkWin();}
    });
  }
  checkWin(){const alive=this.ps.filter((_,i)=>this.lives[i]>0);if(alive.length<=1){this.endGame(alive.length>=1?this.ps.indexOf(alive[0]):this.lives.indexOf(Math.max(...this.lives)),this.lives.map(l=>Math.max(0,l)));}}
  timeUp(){const mx=Math.max(...this.lives);const wi=this.lives.indexOf(mx);this.endGame(wi,this.lives.map(l=>Math.max(0,l)));}
  draw(){
    const{W,H,cx}=this;
    // Sky gradient
    const grad=cx.createLinearGradient(0,0,0,H);grad.addColorStop(0,'#1a0520');grad.addColorStop(1,'#3a0a05');
    cx.fillStyle=grad;cx.fillRect(0,0,W,H);
    // Platforms
    this.platforms.forEach(pl=>{
      const pg=cx.createLinearGradient(pl.x,pl.y,pl.x,pl.y+pl.h);pg.addColorStop(0,'#8B6914');pg.addColorStop(1,'#5a3f0a');
      cx.fillStyle=pg;cx.fillRect(pl.x,pl.y,pl.w,pl.h);
      cx.fillStyle='rgba(255,200,100,.3)';cx.fillRect(pl.x,pl.y,pl.w,3);
    });
    // Players
    this.ps.forEach((s,i)=>{
      if(!s.alive){if(this.lives[i]>0){cx.globalAlpha=.3;cx.fillStyle=s.p.color;cx.font='24px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('💀',s.x||W/2,Math.min(this.lavaY-20,H*.5));cx.globalAlpha=1;}return;}
      cx.shadowColor=s.p.color;cx.shadowBlur=10;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      cx.fillStyle='white';cx.font='bold 10px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
      for(let l=0;l<this.lives[i];l++){cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x-8+l*9,s.y-s.r-10,3.5,0,Math.PI*2);cx.fill();}
    });
    // Lava
    const lavaGrad=cx.createLinearGradient(0,this.lavaY,0,H);lavaGrad.addColorStop(0,'#ff6600');lavaGrad.addColorStop(.3,'#ff2200');lavaGrad.addColorStop(1,'#800000');
    cx.fillStyle=lavaGrad;cx.fillRect(0,this.lavaY,W,H-this.lavaY);
    // Lava top wave
    cx.fillStyle='#ff8800';cx.beginPath();cx.moveTo(0,this.lavaY);
    for(let x=0;x<=W;x+=30){cx.lineTo(x,this.lavaY+Math.sin(x*.05+Date.now()*.003)*6);}
    cx.lineTo(W,H);cx.lineTo(0,H);cx.closePath();cx.fill();
    // Bubbles
    this.bubbles.forEach(b=>{cx.globalAlpha=b.life*.6;cx.strokeStyle='#ff8800';cx.lineWidth=2;cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.stroke();});cx.globalAlpha=1;
  }
}

// ══════════════════════════════════════════════════
// GAME 19: DUEL — aim and shoot
// ══════════════════════════════════════════════════
class Duel extends BaseGame{
  init(){
    this.maxTime=30;
    const n=this.pl.length;
    this.ps=this.pl.map((p,i)=>{const a=(i/n)*Math.PI*2-Math.PI/2;return{x:this.W/2+Math.cos(a)*this.W*.28,y:this.H/2+Math.sin(a)*this.H*.28,vx:0,vy:0,r:18,angle:a,p,bullets:3,reloadT:0,alive:true,pts:0};});
    this.projectiles=[];this.flashes=[];
  }
  update(dt){
    this.timer+=dt;this.setTimer();
    const spd=584,fric=0.60;
    this.ps.forEach((s,i)=>{
      if(!s.alive)return;
      if(key(s.p,'left'))s.angle-=2.5*dt;if(key(s.p,'right'))s.angle+=2.5*dt;
      let ax=0,ay=0;if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));s.y=Math.max(s.r,Math.min(this.H-s.r,s.y));
      s.reloadT-=dt;
      if(key(s.p,'action')&&s.bullets>0&&s.reloadT<=0){
        s.bullets--;s.reloadT=.4;
        this.projectiles.push({x:s.x+Math.cos(s.angle)*22,y:s.y+Math.sin(s.angle)*22,vx:Math.cos(s.angle)*500,vy:Math.sin(s.angle)*500,r:5,life:1.5,owner:i,c:s.p.color});
        if(s.bullets===0)s.reloadT=3;
      }
      if(s.bullets===0&&s.reloadT<=0)s.bullets=3;
    });
    this.flashes=this.flashes.filter(f=>{f.t-=dt;return f.t>0;});
    this.projectiles=this.projectiles.filter(b=>{
      b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
      // Wall bounce
      if(b.x<b.r||b.x>this.W-b.r)b.vx*=-1;if(b.y<b.r||b.y>this.H-b.r)b.vy*=-1;
      let hit=false;
      this.ps.forEach((s,i)=>{
        if(!s.alive||i===b.owner||hit)return;
        if(Math.hypot(s.x-b.x,s.y-b.y)<s.r+b.r){
          s.alive=false;this.ps[b.owner].pts+=3;
          this.flashes.push({x:s.x,y:s.y,c:s.p.color,t:.8,r:40});hit=true;this.checkWin();
        }
      });
      return !hit&&b.life>0;
    });
    if(this.timer>=this.maxTime)this.timeUp();
  }
  checkWin(){
    const alive=this.ps.filter(s=>s.alive);
    if(alive.length<=1){this.endGame(alive.length?this.ps.indexOf(alive[0]):this.ps.indexOf(this.ps.reduce((a,b)=>a.pts>=b.pts?a:b)),this.ps.map(s=>Math.round(s.pts)));}
  }
  timeUp(){const mx=Math.max(...this.ps.map(s=>s.pts));const wi=this.ps.findIndex(s=>s.pts===mx);this.endGame(wi,this.ps.map(s=>s.pts));}
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#0d0818';cx.fillRect(0,0,W,H);
    // Arena circles
    cx.strokeStyle='rgba(255,255,255,.06)';cx.lineWidth=1;
    [.15,.3,.45].forEach(r=>{cx.beginPath();cx.arc(W/2,H/2,Math.min(W,H)*r,0,Math.PI*2);cx.stroke();});
    // Flashes
    this.flashes.forEach(f=>{cx.globalAlpha=f.t/.8*.6;cx.fillStyle=f.c;cx.beginPath();cx.arc(f.x,f.y,f.r*(1-f.t/.8)*2+10,0,Math.PI*2);cx.fill();cx.globalAlpha=1;});
    // Projectiles
    this.projectiles.forEach(b=>{cx.shadowColor=b.c;cx.shadowBlur=12;cx.fillStyle=b.c;cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;});
    // Players
    this.ps.forEach(s=>{
      if(!s.alive){cx.globalAlpha=.2;cx.fillStyle=s.p.color;cx.font='28px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('💀',s.x,s.y);cx.globalAlpha=1;return;}
      cx.save();cx.translate(s.x,s.y);cx.rotate(s.angle);
      cx.shadowColor=s.p.color;cx.shadowBlur=14;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(0,0,s.r,0,Math.PI*2);cx.fill();
      // Gun barrel
      cx.fillStyle='rgba(255,255,255,.7)';cx.fillRect(s.r-2,-3,14,6);
      cx.shadowBlur=0;cx.restore();
      cx.fillStyle='white';cx.font='bold 11px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
      // Bullets display
      for(let b=0;b<3;b++){cx.fillStyle=b<s.bullets?s.p.color:'rgba(255,255,255,.15)';cx.beginPath();cx.arc(s.x-10+b*10,s.y-s.r-12,4,0,Math.PI*2);cx.fill();}
      if(s.reloadT>0&&s.bullets===0){cx.fillStyle='rgba(255,255,255,.6)';cx.font='9px Nunito';cx.textAlign='center';cx.fillText('RELOAD',s.x,s.y+s.r+14);}
    });
  }
}

// ══════════════════════════════════════════════════
// GAME 20: BALLOON — protect yours, pop theirs
// ══════════════════════════════════════════════════
class Balloon extends BaseGame{
  init(){
    this.maxTime=45;
    this.ps=this.pl.map((p,i)=>{const a=(i/this.pl.length)*Math.PI*2;return{x:this.W/2+Math.cos(a)*this.W*.3,y:this.H/2+Math.sin(a)*this.H*.3,vx:0,vy:0,r:16,p,out:false,pts:0};});
    this.balloons=this.ps.map((s,i)=>({x:s.x,y:s.y-44,r:18,owner:i,alive:true}));
    this.needles=[];this.particles=[];this.needleCD=this.ps.map(()=>0);
  }
  update(dt){
    super.update(dt);this.setTimer();
    const spd=601,fric=0.60;
    this.ps.forEach((s,i)=>{
      if(s.out)return;
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));s.y=Math.max(s.r,Math.min(this.H-s.r,s.y));
      this.needleCD[i]-=dt;
      if(key(s.p,'action')&&this.needleCD[i]<=0&&this.balloons[i].alive){
        const ang=Math.atan2((ay||-1),(ax||0));
        this.needles.push({x:s.x,y:s.y,vx:Math.cos(ang)*380,vy:Math.sin(ang)*380,life:1.0,owner:i,c:s.p.color});
        this.needleCD[i]=.45;
      }
    });
    // Balloons follow owners
    this.balloons.forEach((b,i)=>{
      if(!b.alive)return;
      const owner=this.ps[b.owner];
      const tx=owner.x+(Math.sin(Date.now()*.002+i)*18),ty=owner.y-50;
      b.x+=(tx-b.x)*5*dt;b.y+=(ty-b.y)*5*dt;
    });
    // Needles
    this.needles=this.needles.filter(n=>{
      n.x+=n.vx*dt;n.y+=n.vy*dt;n.life-=dt;
      let hit=false;
      this.balloons.forEach((b,bi)=>{
        if(!b.alive||bi===n.owner||hit)return;
        if(Math.hypot(n.x-b.x,n.y-b.y)<b.r+6){
          b.alive=false;this.ps[n.owner].pts+=3;hit=true;
          this.ps[bi].out=true;
          for(let k=0;k<14;k++)this.particles.push({x:b.x,y:b.y,vx:(Math.random()-.5)*280,vy:(Math.random()-.5)*280-100,life:.9,c:this.ps[bi].p.color,r:4+Math.random()*6});
          this.checkWin();
        }
      });
      return !hit&&n.life>0&&n.x>0&&n.x<this.W&&n.y>0&&n.y<this.H;
    });
    this.particles=this.particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=150*dt;p.life-=dt;return p.life>0;});
  }
  checkWin(){const alive=this.balloons.filter(b=>b.alive);if(alive.length<=1){const wi=alive.length===1?alive[0].owner:-1;this.endGame(wi,this.ps.map(s=>Math.round(s.pts)));}
  }
  timeUp(){const mx=Math.max(...this.ps.map(s=>s.pts));const wi=this.ps.findIndex(s=>s.pts===mx);this.endGame(wi,this.ps.map(s=>Math.round(s.pts)));}
  draw(){
    const{W,H,cx}=this;
    const sg=cx.createLinearGradient(0,0,0,H);sg.addColorStop(0,'#0a1a3a');sg.addColorStop(1,'#1a3a1a');cx.fillStyle=sg;cx.fillRect(0,0,W,H);
    // Particles
    this.particles.forEach(p=>{cx.globalAlpha=p.life/.8;cx.fillStyle=p.c;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;
    // Needles
    this.needles.forEach(n=>{cx.strokeStyle=n.c;cx.lineWidth=2;cx.shadowColor=n.c;cx.shadowBlur=6;cx.beginPath();cx.moveTo(n.x,n.y);cx.lineTo(n.x-n.vx*.06,n.y-n.vy*.06);cx.stroke();cx.shadowBlur=0;});
    // Balloons + strings
    this.balloons.forEach((b,i)=>{
      if(!b.alive)return;
      const owner=this.ps[b.owner];if(!owner.alive)return;
      // String
      cx.strokeStyle=`${owner.p.color}66`;cx.lineWidth=1.5;cx.beginPath();cx.moveTo(owner.x,owner.y-owner.r);cx.quadraticCurveTo((owner.x+b.x)/2+Math.sin(Date.now()*.003+i)*12,(owner.y+b.y)/2,b.x,b.y+b.r);cx.stroke();
      // Balloon
      cx.shadowColor=owner.p.color;cx.shadowBlur=16;
      const bg=cx.createRadialGradient(b.x-b.r*.3,b.y-b.r*.3,2,b.x,b.y,b.r);
      bg.addColorStop(0,owner.p.color+'ff');bg.addColorStop(1,owner.p.color+'88');
      cx.fillStyle=bg;cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      // Shine
      cx.fillStyle='rgba(255,255,255,.3)';cx.beginPath();cx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.25,0,Math.PI*2);cx.fill();
    });
    // Players
    this.ps.forEach((s,i)=>{
      const hasBalloon=this.balloons[i].alive;
      if(s.out){cx.globalAlpha=.2;cx.fillStyle=s.p.color;cx.font='24px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('💀',s.x,s.y);cx.globalAlpha=1;return;}
      cx.shadowColor=s.p.color;cx.shadowBlur=hasBalloon?10:4;cx.fillStyle=s.p.color;cx.globalAlpha=hasBalloon?1:.6;
      cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;cx.globalAlpha=1;
      cx.fillStyle='white';cx.font='bold 11px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
    });
  }
}


// ══════════════════════════════════════════════════
// GAME: DASH ATTACK — [Ação] para dar dash
// ══════════════════════════════════════════════════
class DashAttack extends BaseGame{
  init(){
    this.maxTime=40;
    this.ps=this.pl.map((p,i)=>{
      const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;
      return{x:this.W/2+Math.cos(a)*this.W*.3,y:this.H/2+Math.sin(a)*this.H*.28,
             vx:0,vy:0,r:18,p,lives:3,dashCD:0,dashTimer:0,dashing:false,
             dashVx:0,dashVy:0,stunTimer:0,respawn:0,alive:true,pts:0};
    });
    this.sparks=[];this.lives=this.ps.map(()=>3);
  }
  update(dt){
    super.update(dt);this.setTimer();
    const spd=591,fric=0.60,dashSpd=1100,dashDur=0.15,dashCooldown=0.9;
    this.ps.forEach((s,i)=>{
      if(!s.alive){s.respawn-=dt;if(s.respawn<=0&&this.lives[i]>0){const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;s.x=this.W/2+Math.cos(a)*this.W*.3;s.y=this.H/2+Math.sin(a)*this.H*.28;s.vx=0;s.vy=0;s.alive=true;s.dashing=false;}return;}
      s.dashCD=Math.max(0,s.dashCD-dt);
      s.stunTimer=Math.max(0,s.stunTimer-dt);
      if(s.stunTimer>0){s.vx*=Math.pow(0.88,dt*60);s.vy*=Math.pow(0.88,dt*60);s.x+=s.vx*dt;s.y+=s.vy*dt;s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));s.y=Math.max(s.r,Math.min(this.H-s.r,s.y));return;}
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      // DASH on action
      if(key(s.p,'action')&&s.dashCD<=0&&!s.dashing){
        const l=Math.sqrt(ax*ax+ay*ay)||1;
        const dx=ax/l||(s.vx>0?1:-1)||1, dy=ay/l;
        s.dashVx=dx*dashSpd;s.dashVy=dy*dashSpd;
        s.dashing=true;s.dashTimer=dashDur;s.dashCD=dashCooldown;
        for(let k=0;k<8;k++)this.sparks.push({x:s.x,y:s.y,vx:(Math.random()-.5)*300-s.dashVx*.2,vy:(Math.random()-.5)*300-s.dashVy*.2,life:.35,c:s.p.color});
      }
      if(s.dashing){
        s.dashTimer-=dt;
        s.vx=s.dashVx;s.vy=s.dashVy;
        if(s.dashTimer<=0){s.dashing=false;s.vx*=.3;s.vy*=.3;}
      } else {
        const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
        s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      }
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));s.y=Math.max(s.r,Math.min(this.H-s.r,s.y));
    });
    // Dash collision — dasher knocks out hit player
    for(let i=0;i<this.ps.length;i++){
      const a=this.ps[i];if(!a.alive||!a.dashing)continue;
      for(let j=0;j<this.ps.length;j++){
        if(i===j)continue;
        const b=this.ps[j];if(!b.alive)continue;
        if(Math.hypot(a.x-b.x,a.y-b.y)<a.r+b.r+4){
          b.stunTimer=.8;b.vx=a.dashVx*.55;b.vy=a.dashVy*.55;
          a.pts++;
          for(let k=0;k<10;k++)this.sparks.push({x:b.x,y:b.y,vx:(Math.random()-.5)*400,vy:(Math.random()-.5)*400-100,life:.5,c:b.p.color});
          this.lives[j]--;
          if(this.lives[j]<=0){b.alive=false;b.respawn=999;this.checkWin();}
          else{b.alive=false;b.respawn=1.5;}
          a.dashing=false;a.vx*=.2;a.vy*=.2;
        }
      }
    }
    this.sparks=this.sparks.filter(sp=>{sp.x+=sp.vx*dt;sp.y+=sp.vy*dt;sp.life-=dt;return sp.life>0;});
  }
  checkWin(){const al=this.ps.filter((_,i)=>this.lives[i]>0);if(al.length<=1){this.endGame(al.length?this.ps.indexOf(al[0]):this.ps.indexOf(this.ps.reduce((a,b)=>a.pts>=b.pts?a:b)),this.ps.map(s=>Math.round(s.pts)));}}
  timeUp(){const mx=Math.max(...this.ps.map(s=>s.pts));const wi=this.ps.findIndex(s=>s.pts===mx);this.endGame(wi,this.ps.map(s=>Math.round(s.pts)));}
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#0d0520';cx.fillRect(0,0,W,H);
    for(let x=0;x<W;x+=60){cx.strokeStyle='rgba(120,0,255,.06)';cx.lineWidth=1;cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(let y=0;y<H;y+=60){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    this.sparks.forEach(sp=>{cx.globalAlpha=sp.life/.5;cx.fillStyle=sp.c;cx.beginPath();cx.arc(sp.x,sp.y,3+sp.life*4,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;
    this.ps.forEach((s,i)=>{
      if(!s.alive){if(this.lives[i]>0){cx.globalAlpha=.25;cx.fillStyle=s.p.color;cx.font='22px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('💀',s.x||W/2,s.y||H/2);cx.globalAlpha=1;}return;}
      if(s.dashing){cx.shadowColor=s.p.color;cx.shadowBlur=30;cx.globalAlpha=.85;}
      else if(s.stunTimer>0){cx.globalAlpha=.5+Math.sin(Date.now()*.02)*.3;}
      cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r*(s.dashing?1.35:1),0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;cx.globalAlpha=1;
      cx.fillStyle='white';cx.font='bold 11px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.dashing?'⚡':s.p.name,s.x,s.y);
      // Cooldown arc
      if(s.dashCD>0){const pct=1-s.dashCD/1.2;cx.strokeStyle=s.p.color+'99';cx.lineWidth=3;cx.beginPath();cx.arc(s.x,s.y,s.r+6,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);cx.stroke();}
      for(let l=0;l<this.lives[i];l++){cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x-10+l*11,s.y-s.r-12,4,0,Math.PI*2);cx.fill();}
    });
    // instructions
    cx.fillStyle='rgba(255,255,255,.2)';cx.font='11px Nunito';cx.textAlign='center';cx.fillText('[ACAO] = DASH  •  Atropele os outros!',W/2,H-12);
  }
}

// ══════════════════════════════════════════════════
// GAME: CONSTRUTOR — build walls with [Ação]
// ══════════════════════════════════════════════════
class Builder extends BaseGame{
  init(){
    this.maxTime=45;
    this.cell=32;
    this.cols2=Math.floor(this.W/this.cell);
    this.rows2=Math.floor(this.H/this.cell);
    this.grid=new Array(this.cols2*this.rows2).fill(-1); // -1=empty, 0-3=player wall
    this.ps=this.pl.map((p,i)=>{
      const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;
      return{x:this.W/2+Math.cos(a)*this.W*.28,y:this.H/2+Math.sin(a)*this.H*.25,vx:0,vy:0,r:14,p,alive:true,blocks:10,buildCD:0,lives:3,respawn:0,pts:0};
    });
    this.wallColors=this.pl.map(p=>p.color);this.lives=this.ps.map(()=>3);
  }
  tileIdx(x,y){const tx=Math.floor(x/this.cell),ty=Math.floor(y/this.cell);if(tx<0||tx>=this.cols2||ty<0||ty>=this.rows2)return -1;return ty*this.cols2+tx;}
  wallAt(x,y){const idx=this.tileIdx(x,y);return idx>=0&&this.grid[idx]>=0;}
  update(dt){
    super.update(dt);this.setTimer();
    const spd=591,fric=0.60;
    this.ps.forEach((s,i)=>{
      if(!s.alive){s.respawn-=dt;if(s.respawn<=0&&s.lives>0){const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;s.x=this.W/2+Math.cos(a)*this.W*.25;s.y=this.H/2+Math.sin(a)*this.H*.2;s.vx=0;s.vy=0;s.alive=true;s.blocks=5;}return;}
      s.buildCD=Math.max(0,s.buildCD-dt);
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      // Wall sliding
      const nx=s.x+s.vx*dt, ny=s.y+s.vy*dt;
      if(!this.wallAt(nx,s.y)&&!this.wallAt(nx,s.y-s.r+2)&&!this.wallAt(nx,s.y+s.r-2))s.x=nx; else{s.vx*=-.2;}
      if(!this.wallAt(s.x,ny)&&!this.wallAt(s.x-s.r+2,ny)&&!this.wallAt(s.x+s.r-2,ny))s.y=ny; else{s.vy*=-.2;}
      s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));s.y=Math.max(s.r,Math.min(this.H-s.r,s.y));
      // BUILD on action: place block behind player
      if(key(s.p,'action')&&s.buildCD<=0&&s.blocks>0){
        const bx=s.x-(ax||0)*this.cell, by=s.y-(ay||0)*this.cell;
        const idx=this.tileIdx(bx,by);
        if(idx>=0&&this.grid[idx]<0){this.grid[idx]=i;s.blocks--;s.buildCD=.3;s.pts++;}
      }
    });
    // Player-player collision: if wall player hits other player → lives
    for(let i=0;i<this.ps.length;i++)for(let j=i+1;j<this.ps.length;j++){
      const a=this.ps[i],b=this.ps[j];if(!a.alive||!b.alive)continue;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy),md=a.r+b.r;
      if(d<md&&d>0){const nx=dx/d,ny=dy/d,ov=(md-d)/2;a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;}
    }
    // Check trapped: if player is surrounded by walls on all 4 sides
    this.ps.forEach((s,i)=>{
      if(!s.alive)return;
      const surrounded=['up','down','left','right'].filter(dir=>{
        const ox=dir==='left'?-this.cell:dir==='right'?this.cell:0;
        const oy=dir==='up'?-this.cell:dir==='down'?this.cell:0;
        const idx=this.tileIdx(s.x+ox,s.y+oy);
        return idx>=0&&this.grid[idx]>=0&&this.grid[idx]!==i;
      });
      if(surrounded.length>=3){this.lives[i]--;s.alive=false;s.respawn=this.lives[i]>0?2:999;// destroy nearby walls
        this.grid=this.grid.map((v,idx)=>v===i&&Math.random()<.7?-1:v);
        if(this.lives[i]<=0)this.checkWin();}
    });
  }
  checkWin(){const al=this.ps.filter((_,i)=>this.lives[i]>0);if(al.length<=1){this.endGame(al.length?this.ps.indexOf(al[0]):this.ps.indexOf(this.ps.reduce((a,b)=>a.pts>=b.pts?a:b)),this.ps.map(s=>Math.round(s.pts)));}}
  timeUp(){const mx=Math.max(...this.ps.map(s=>s.pts));const wi=this.ps.findIndex(s=>s.pts===mx);this.endGame(wi,this.ps.map(s=>Math.round(s.pts)));}
  draw(){
    const{W,H,cx,cell}=this;cx.fillStyle='#0a0a1a';cx.fillRect(0,0,W,H);
    // Draw walls
    for(let ty=0;ty<this.rows2;ty++)for(let tx=0;tx<this.cols2;tx++){
      const v=this.grid[ty*this.cols2+tx];if(v<0)continue;
      const c=this.wallColors[v];
      cx.fillStyle=c+'cc';cx.fillRect(tx*cell+1,ty*cell+1,cell-2,cell-2);
      cx.fillStyle=c+'44';cx.fillRect(tx*cell+1,ty*cell+1,cell-2,4);
      cx.strokeStyle=c+'88';cx.lineWidth=1;cx.strokeRect(tx*cell+1,ty*cell+1,cell-2,cell-2);
    }
    // Grid lines faint
    cx.strokeStyle='rgba(255,255,255,.03)';cx.lineWidth=.5;
    for(let x=0;x<W;x+=cell){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(let y=0;y<H;y+=cell){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    // Players
    this.ps.forEach((s,i)=>{
      if(!s.alive)return;
      cx.shadowColor=s.p.color;cx.shadowBlur=12;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      cx.fillStyle='white';cx.font='bold 11px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
      // Block count
      cx.fillStyle=s.p.color;cx.font='bold 10px Fredoka One';cx.fillText('🧱'+s.blocks,s.x,s.y+s.r+14);
      for(let l=0;l<this.lives[i];l++){cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x-8+l*9,s.y-s.r-11,3.5,0,Math.PI*2);cx.fill();}
    });
    cx.fillStyle='rgba(255,255,255,.2)';cx.font='11px Nunito';cx.textAlign='center';cx.fillText('[ACAO] = Construir muro  •  Cerque os inimigos!',W/2,H-12);
  }
}

// ══════════════════════════════════════════════════
// GAME: SOCO — carrega poder e solta
// ══════════════════════════════════════════════════
class PunchOut extends BaseGame{
  init(){
    this.maxTime=40;
    this.ps=this.pl.map((p,i)=>{
      const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;
      return{x:this.W/2+Math.cos(a)*this.W*.3,y:this.H/2+Math.sin(a)*this.H*.28,vx:0,vy:0,r:18,p,
             lives:3,charge:0,charging:false,punchCD:0,stunTimer:0,alive:true,respawn:0,pts:0,shockwave:null};
    });
    this.particles=[];
    this.lives=this.ps.map(()=>3);
  }
  update(dt){
    super.update(dt);this.setTimer();
    const spd=601,fric=0.60;
    this.ps.forEach((s,i)=>{
      if(!s.alive){s.respawn-=dt;if(s.respawn<=0&&this.lives[i]>0){const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;s.x=this.W/2+Math.cos(a)*this.W*.3;s.y=this.H/2+Math.sin(a)*this.H*.28;s.vx=0;s.vy=0;s.alive=true;s.charge=0;}return;}
      s.punchCD=Math.max(0,s.punchCD-dt);
      s.stunTimer=Math.max(0,s.stunTimer-dt);
      if(s.shockwave){s.shockwave.r+=dt*500;s.shockwave.life-=dt;if(s.shockwave.life<=0)s.shockwave=null;}
      if(s.stunTimer>0){s.vx*=Math.pow(0.85,dt*60);s.vy*=Math.pow(0.85,dt*60);}
      else{
        let ax=0,ay=0;
        if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
        // Hold action = charge
        if(key(s.p,'action')){s.charging=true;s.charge=Math.min(1,s.charge+dt*1.1);s.vx*=Math.pow(0.6,dt*60);s.vy*=Math.pow(0.6,dt*60);}
        else if(s.charging){
          // Release punch!
          const punchR=40+s.charge*80, punchF=600+s.charge*1400;
          s.shockwave={x:s.x,y:s.y,r:s.r,maxR:punchR,life:.25,c:s.p.color,charge:s.charge};
          this.ps.forEach((b,j)=>{if(j===i||!b.alive)return;
            const d=Math.hypot(s.x-b.x,s.y-b.y);
            if(d<punchR+b.r){
              const nx=(b.x-s.x)/d||1,ny=(b.y-s.y)/d;
              b.vx=nx*punchF*(1-d/punchR*.5);b.vy=ny*punchF*(1-d/punchR*.5);
              b.stunTimer=.4+s.charge*.6;
              if(s.charge>.6){this.lives[j]--;s.pts+=s.charge>.8?2:1;
                for(let k=0;k<12;k++)this.particles.push({x:b.x,y:b.y,vx:(Math.random()-.5)*500,vy:(Math.random()-.5)*500-150,life:.6,c:b.p.color});
                if(this.lives[j]<=0){b.alive=false;b.respawn=999;this.checkWin();}
                else{b.alive=false;b.respawn=1.5;}
              }
            }
          });
          s.charging=false;s.charge=0;s.punchCD=.5;
          for(let k=0;k<16;k++)this.particles.push({x:s.x,y:s.y,vx:(Math.random()-.5)*600,vy:(Math.random()-.5)*600,life:.45,c:s.p.color});
        }
        const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay&&!s.charging){s.vx+=ax/l*spd*dt;s.vy+=ay/l*spd*dt;}
        s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      }
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));s.y=Math.max(s.r,Math.min(this.H-s.r,s.y));
    });
    this.particles=this.particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=200*dt;p.life-=dt;return p.life>0;});
  }
  checkWin(){const al=this.ps.filter((_,i)=>this.lives[i]>0);if(al.length<=1){this.endGame(al.length?this.ps.indexOf(al[0]):this.ps.indexOf(this.ps.reduce((a,b)=>a.pts>=b.pts?a:b)),this.ps.map(s=>Math.round(s.pts)));}}
  timeUp(){const mx=Math.max(...this.ps.map(s=>s.pts));const wi=this.ps.findIndex(s=>s.pts===mx);this.endGame(wi,this.ps.map(s=>Math.round(s.pts)));}
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#100820';cx.fillRect(0,0,W,H);
    cx.strokeStyle='rgba(200,0,255,.05)';cx.lineWidth=1;
    for(let x=0;x<W;x+=55){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(let y=0;y<H;y+=55){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    this.particles.forEach(p=>{cx.globalAlpha=p.life/.6*.9;cx.fillStyle=p.c;cx.beginPath();cx.arc(p.x,p.y,4,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;
    this.ps.forEach((s,i)=>{
      // Shockwave
      if(s.shockwave){const sw=s.shockwave;cx.globalAlpha=sw.life/.25*.6;cx.strokeStyle=sw.c;cx.lineWidth=3+sw.charge*5;cx.beginPath();cx.arc(sw.x,sw.y,sw.r,0,Math.PI*2);cx.stroke();cx.globalAlpha=1;}
      if(!s.alive)return;
      // Charge aura
      if(s.charging&&s.charge>0){
        const ca=s.charge;cx.shadowColor=s.p.color;cx.shadowBlur=30*ca;
        cx.strokeStyle=s.p.color;cx.lineWidth=3;cx.globalAlpha=ca*.8;
        cx.beginPath();cx.arc(s.x,s.y,s.r+8+ca*30,0,Math.PI*2);cx.stroke();cx.globalAlpha=1;
      }
      if(s.stunTimer>0)cx.globalAlpha=.4+Math.sin(Date.now()*.025)*.3;
      cx.shadowColor=s.p.color;cx.shadowBlur=s.charging?20:10;
      cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r*(s.charging?1+s.charge*.2:1),0,Math.PI*2);cx.fill();
      cx.shadowBlur=0;cx.globalAlpha=1;
      cx.fillStyle='white';cx.font='bold 11px Nunito';cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(s.charging?'💢':s.stunTimer>0?'😵':s.p.name,s.x,s.y);
      // Charge bar
      if(s.charging){
        cx.fillStyle='rgba(0,0,0,.5)';cx.fillRect(s.x-28,s.y-s.r-16,56,8);
        const bc=s.charge>.7?'#ff2200':s.charge>.4?'#ffaa00':'#2ed573';
        cx.fillStyle=bc;cx.fillRect(s.x-28,s.y-s.r-16,56*s.charge,8);
        cx.strokeStyle='rgba(255,255,255,.3)';cx.lineWidth=1;cx.strokeRect(s.x-28,s.y-s.r-16,56,8);
      }
      for(let l=0;l<this.lives[i];l++){cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x-10+l*11,s.y+s.r+10,4,0,Math.PI*2);cx.fill();}
    });
    cx.fillStyle='rgba(255,255,255,.2)';cx.font='11px Nunito';cx.textAlign='center';cx.fillText('Segure [ACAO] para carregar  •  Solte para socar!',W/2,H-12);
  }
}

// ICEBLOCK — push ice cubes onto enemies
// ══════════════════════════════════════════════════
class IceBlock extends BaseGame{
  init(){
    this.maxTime=40;
    this.ps=this.pl.map((p,i)=>{const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;return{x:this.W/2+Math.cos(a)*this.W*.32,y:this.H/2+Math.sin(a)*this.H*.28,vx:0,vy:0,r:16,p,alive:true,lives:3,respawn:0,pts:0,pushCD:0};});
    // Spawn ice blocks in a grid
    this.blocks=[];
    for(let bx=2;bx<7;bx++)for(let by=2;by<5;by++){
      if(Math.random()<.6)this.blocks.push({x:bx*(this.W/8),y:by*(this.H/6),vx:0,vy:0,r:20,sliding:0});
    }
    this.particles=[];
    this.lives=this.ps.map(()=>3);
  }
  update(dt){
    super.update(dt);this.setTimer();
    const spd=612,fric=0.60;
    this.ps.forEach((s,i)=>{
      if(!s.alive){s.respawn-=dt;if(s.respawn<=0&&s.lives>0){const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;s.x=this.W/2+Math.cos(a)*this.W*.32;s.y=this.H/2+Math.sin(a)*this.H*.28;s.vx=0;s.vy=0;s.alive=true;}return;}
      s.pushCD=Math.max(0,s.pushCD-dt);
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));s.y=Math.max(s.r,Math.min(this.H-s.r,s.y));
      // Push nearby blocks
      if(key(s.p,'action')&&s.pushCD<=0){
        this.blocks.forEach(b=>{const d=Math.hypot(s.x-b.x,s.y-b.y);if(d<s.r+b.r+12){b.vx=s.vx*.8+(s.x<b.x?300:-300);b.vy=s.vy*.8+(s.y<b.y?300:-300);s.pushCD=.3;}});
      }
    });
    // Slide blocks
    this.blocks.forEach(b=>{
      b.vx*=Math.pow(0.96,dt*60);b.vy*=Math.pow(0.96,dt*60);
      b.x+=b.vx*dt;b.y+=b.vy*dt;
      if(b.x<b.r){b.x=b.r;b.vx=Math.abs(b.vx)*.6;}if(b.x>this.W-b.r){b.x=this.W-b.r;b.vx=-Math.abs(b.vx)*.6;}
      if(b.y<b.r){b.y=b.r;b.vy=Math.abs(b.vy)*.6;}if(b.y>this.H-b.r){b.y=this.H-b.r;b.vy=-Math.abs(b.vy)*.6;}
      // Hit players
      this.ps.forEach((s,i)=>{
        if(!s.alive)return;
        const spd2=Math.hypot(b.vx,b.vy);
        if(spd2>200&&Math.hypot(s.x-b.x,s.y-b.y)<s.r+b.r){
          for(let k=0;k<8;k++)this.particles.push({x:s.x,y:s.y,vx:(Math.random()-.5)*400,vy:(Math.random()-.5)*400,life:.5,c:'#a8d8f0'});
          this.lives[i]--;s.pts-=1;
          if(this.lives[i]<=0){s.alive=false;s.respawn=999;this.checkWin();}
          else{s.alive=false;s.respawn=1.5;}
          b.vx*=.3;b.vy*=.3;
        }
      });
    });
    // Player-player push
    for(let i=0;i<this.ps.length;i++)for(let j=i+1;j<this.ps.length;j++){
      const a=this.ps[i],b=this.ps[j];if(!a.alive||!b.alive)continue;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy),md=a.r+b.r;
      if(d<md&&d>0){const nx=dx/d,ny=dy/d,ov=(md-d)/2;a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;}
    }
    this.particles=this.particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;return p.life>0;});
  }
  checkWin(){const al=this.ps.filter((_,i)=>this.lives[i]>0);if(al.length<=1)this.endGame(al.length?this.ps.indexOf(al[0]):this.lives.indexOf(Math.max(...this.lives)),this.lives.map(l=>Math.max(0,l)));}
  timeUp(){const mx=Math.max(...this.ps.map((s,i)=>this.lives[i]));const wi=this.lives.indexOf(mx);this.endGame(wi,this.lives.map(l=>Math.max(0,l)));}
  draw(){
    const{W,H,cx}=this;
    const g=cx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#0a1a2e');g.addColorStop(1,'#0a2a1a');cx.fillStyle=g;cx.fillRect(0,0,W,H);
    this.particles.forEach(p=>{cx.globalAlpha=p.life/.5;cx.fillStyle=p.c;cx.fillRect(p.x-2,p.y-2,4,4);});cx.globalAlpha=1;
    this.blocks.forEach(b=>{
      const spd2=Math.hypot(b.vx,b.vy);
      cx.shadowColor=spd2>200?'#ff4444':'#88ccff';cx.shadowBlur=spd2>200?14:6;
      const ig=cx.createLinearGradient(b.x-b.r,b.y-b.r,b.x+b.r,b.y+b.r);ig.addColorStop(0,'rgba(180,220,255,.9)');ig.addColorStop(1,'rgba(100,180,255,.7)');
      cx.fillStyle=ig;cx.beginPath();cx.roundRect(b.x-b.r,b.y-b.r,b.r*2,b.r*2,6);cx.fill();cx.shadowBlur=0;
      cx.fillStyle='rgba(255,255,255,.4)';cx.fillRect(b.x-b.r+3,b.y-b.r+3,b.r*.6,b.r*.3);
    });
    this.ps.forEach((s,i)=>{
      if(!s.alive)return;
      cx.shadowColor=s.p.color;cx.shadowBlur=10;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      cx.fillStyle='white';cx.font='bold 10px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
      for(let l=0;l<this.lives[i];l++){cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x-8+l*9,s.y-s.r-10,3.5,0,Math.PI*2);cx.fill();}
    });
    cx.fillStyle='rgba(255,255,255,.2)';cx.font='11px Nunito';cx.textAlign='center';cx.fillText('[AÇÃO] = Empurrar bloco',W/2,H-12);
  }
}

// ══════════════════════════════════════════════════
// CHICKEN — shrinking platform, last standing wins
// ══════════════════════════════════════════════════
class Chicken extends BaseGame{
  init(){
    this.maxTime=50;
    this.platW=this.W*.7;this.platH=this.H*.55;
    this.platX=this.W/2;this.platY=this.H/2;
    this.shrinkRate=12;
    this.ps=this.pl.map((p,i)=>{const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;return{x:this.platX+Math.cos(a)*this.platW*.3,y:this.platY+Math.sin(a)*this.platH*.25,vx:0,vy:0,r:16,p,alive:true,lives:3,respawn:0};});
    this.sparks=[];this.lives=this.ps.map(()=>3);
  }
  update(dt){
    super.update(dt);this.setTimer();
    this.platW=Math.max(120,this.platW-this.shrinkRate*dt);
    this.platH=Math.max(80,this.platH-this.shrinkRate*dt*.7);
    const half_w=this.platW/2,half_h=this.platH/2;
    const spd=612,fric=0.60;
    this.ps.forEach((s,i)=>{
      if(!s.alive){s.respawn-=dt;if(s.respawn<=0&&s.lives>0){s.x=this.platX+(Math.random()-.5)*this.platW*.5;s.y=this.platY+(Math.random()-.5)*this.platH*.5;s.vx=0;s.vy=0;s.alive=true;}return;}
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      // Fall off platform
      if(Math.abs(s.x-this.platX)>half_w+s.r||Math.abs(s.y-this.platY)>half_h+s.r){
        for(let k=0;k<10;k++)this.sparks.push({x:s.x,y:s.y,vx:(Math.random()-.5)*500,vy:(Math.random()-.5)*500-200,life:.6,c:s.p.color});
        this.lives[i]--;s.alive=false;s.respawn=this.lives[i]>0?1.5:999;
        if(this.lives[i]<=0)this.checkWin();
      }
    });
    // Player collisions
    for(let i=0;i<this.ps.length;i++)for(let j=i+1;j<this.ps.length;j++){
      const a=this.ps[i],b=this.ps[j];if(!a.alive||!b.alive)continue;
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy),md=a.r+b.r;
      if(d<md&&d>0){const nx=dx/d,ny=dy/d,ov=(md-d)/2,f=600*dt;
        a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;
        a.vx-=nx*f;a.vy-=ny*f;b.vx+=nx*f;b.vy+=ny*f;}
    }
    this.sparks=this.sparks.filter(s=>{s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=300*dt;s.life-=dt;return s.life>0;});
  }
  checkWin(){const al=this.ps.filter((_,i)=>this.lives[i]>0);if(al.length<=1)this.endGame(al.length?this.ps.indexOf(al[0]):this.lives.indexOf(Math.max(...this.lives)),this.lives.map(l=>Math.max(0,l)));}
  timeUp(){const mx=Math.max(...this.lives);this.endGame(this.lives.indexOf(mx),this.lives.map(l=>Math.max(0,l)));}
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#0a0a2e';cx.fillRect(0,0,W,H);
    // Abyss glow
    cx.fillStyle='rgba(255,50,0,.04)';cx.fillRect(0,0,W,H);
    this.sparks.forEach(s=>{cx.globalAlpha=s.life/.6;cx.fillStyle=s.c;cx.beginPath();cx.arc(s.x,s.y,4,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;
    // Platform
    const hw=this.platW/2,hh=this.platH/2;
    const dangerPct=1-this.platW/(this.W*.7);
    const platColor=dangerPct>.7?'#ff3300':dangerPct>.4?'#ff8800':'#2a5a2a';
    cx.fillStyle=platColor+'aa';cx.beginPath();cx.roundRect(this.platX-hw,this.platY-hh,this.platW,this.platH,10);cx.fill();
    cx.strokeStyle=platColor;cx.lineWidth=3;cx.beginPath();cx.roundRect(this.platX-hw,this.platY-hh,this.platW,this.platH,10);cx.stroke();
    // Edge warning lines
    if(dangerPct>.3){
      cx.strokeStyle='rgba(255,100,0,.4)';cx.lineWidth=1;cx.setLineDash([8,8]);
      cx.beginPath();cx.roundRect(this.platX-hw-8,this.platY-hh-8,this.platW+16,this.platH+16,14);cx.stroke();cx.setLineDash([]);
    }
    // Players
    this.ps.forEach((s,i)=>{
      if(!s.alive)return;
      cx.shadowColor=s.p.color;cx.shadowBlur=10;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      cx.fillStyle='white';cx.font='bold 10px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
      for(let l=0;l<this.lives[i];l++){cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x-8+l*9,s.y-s.r-10,3.5,0,Math.PI*2);cx.fill();}
    });
    // Shrink warning
    if(dangerPct>.5){const flash=Math.sin(Date.now()*.008)>.3;if(flash){cx.fillStyle='rgba(255,80,0,.15)';cx.fillRect(0,0,W,H);}}
  }
}

// ══════════════════════════════════════════════════
// MAGNET — attract/repel with action
// ══════════════════════════════════════════════════
class Magnet extends BaseGame{
  init(){
    this.maxTime=40;
    this.R=Math.min(this.W,this.H)*.38;
    this.cx2=this.W/2;this.cy2=this.H/2;
    this.ps=this.pl.map((p,i)=>{const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;return{x:this.cx2+Math.cos(a)*this.R*.5,y:this.cy2+Math.sin(a)*this.R*.5,vx:0,vy:0,r:18,p,lives:3,respawn:0,alive:true,polarity:1,cooldown:0};});
    // Floating metal balls
    this.balls=[];this.lives=this.ps.map(()=>3);
    for(let i=0;i<8;i++)this.balls.push({x:this.cx2+(Math.random()-.5)*this.R,y:this.cy2+(Math.random()-.5)*this.R,vx:(Math.random()-.5)*100,vy:(Math.random()-.5)*100,r:10});
  }
  update(dt){
    super.update(dt);this.setTimer();
    const spd=612,fric=0.60;
    this.ps.forEach((s,i)=>{
      if(!s.alive){s.respawn-=dt;if(s.respawn<=0&&s.lives>0){const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;s.x=this.cx2+Math.cos(a)*this.R*.4;s.y=this.cy2+Math.sin(a)*this.R*.4;s.vx=0;s.vy=0;s.alive=true;}return;}
      s.cooldown=Math.max(0,s.cooldown-dt);
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      // Toggle polarity with action
      if(key(s.p,'action')&&s.cooldown<=0){s.polarity*=-1;s.cooldown=.4;}
      // Apply magnetic force to balls
      this.balls.forEach(b=>{
        const dx=b.x-s.x,dy=b.y-s.y,d=Math.hypot(dx,dy);
        if(d<150&&d>1){const f=s.polarity*-1500/Math.max(d*d,400)*dt;b.vx+=dx/d*f;b.vy+=dy/d*f;}
      });
      // Apply force to other players
      this.ps.forEach((t,j)=>{if(j===i||!t.alive)return;const dx=t.x-s.x,dy=t.y-s.y,d=Math.hypot(dx,dy);if(d<180&&d>1){const f=s.polarity*-800/Math.max(d*d,300)*dt;t.vx+=dx/d*f;t.vy+=dy/d*f;}});
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      const dx=s.x-this.cx2,dy=s.y-this.cy2,dist=Math.hypot(dx,dy);
      if(dist+s.r>this.R){this.lives[i]--;s.alive=false;s.respawn=this.lives[i]>0?1.5:999;if(this.lives[i]<=0)this.checkWin();}
    });
    this.balls.forEach(b=>{b.vx*=Math.pow(0.93,dt*60);b.vy*=Math.pow(0.93,dt*60);b.x+=b.vx*dt;b.y+=b.vy*dt;
      const d=Math.hypot(b.x-this.cx2,b.y-this.cy2);if(d+b.r>this.R){const nx=(b.x-this.cx2)/d,ny=(b.y-this.cy2)/d;b.vx-=nx*Math.abs(b.vx)*1.2;b.vy-=ny*Math.abs(b.vy)*1.2;}
      // balls hit players
      this.ps.forEach((s,i)=>{if(!s.alive)return;if(Math.hypot(s.x-b.x,s.y-b.y)<s.r+b.r&&Math.hypot(b.vx,b.vy)>200){this.lives[i]--;s.alive=false;s.respawn=this.lives[i]>0?1.5:999;if(this.lives[i]<=0)this.checkWin();b.vx*=.3;b.vy*=.3;}});
    });
  }
  checkWin(){const al=this.ps.filter((_,i)=>this.lives[i]>0);if(al.length<=1)this.endGame(al.length?this.ps.indexOf(al[0]):this.lives.indexOf(Math.max(...this.lives)),this.lives.map(l=>Math.max(0,l)));}
  timeUp(){const mx=Math.max(...this.lives);this.endGame(this.lives.indexOf(mx),this.lives.map(l=>Math.max(0,l)));}
  draw(){
    const{W,H,cx}=this;cx.fillStyle='#0a0a1e';cx.fillRect(0,0,W,H);
    const grad=cx.createRadialGradient(this.cx2,this.cy2,0,this.cx2,this.cy2,this.R);
    grad.addColorStop(0,'#1a1a3a');grad.addColorStop(1,'#0a0a1e');
    cx.fillStyle=grad;cx.beginPath();cx.arc(this.cx2,this.cy2,this.R,0,Math.PI*2);cx.fill();
    cx.strokeStyle='rgba(255,255,255,.2)';cx.lineWidth=3;cx.beginPath();cx.arc(this.cx2,this.cy2,this.R,0,Math.PI*2);cx.stroke();
    // Field lines
    this.ps.forEach(s=>{if(!s.alive)return;const col=s.polarity>0?'#ff4757':'#2ed573';
      cx.strokeStyle=col+'22';cx.lineWidth=1;
      for(let a=0;a<Math.PI*2;a+=Math.PI/4){for(let r=30;r<160;r+=20){cx.beginPath();cx.arc(s.x+Math.cos(a)*r,s.y+Math.sin(a)*r,3,0,Math.PI*2);cx.stroke();}}
    });
    this.balls.forEach(b=>{cx.shadowColor='#aaa';cx.shadowBlur=8;cx.fillStyle='#888';cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;cx.fillStyle='#ccc';cx.beginPath();cx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.3,0,Math.PI*2);cx.fill();});
    this.ps.forEach((s,i)=>{
      if(!s.alive)return;
      const col=s.polarity>0?'#ff4757':'#2ed573';
      cx.shadowColor=col;cx.shadowBlur=16;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      cx.strokeStyle=col;cx.lineWidth=3;cx.beginPath();cx.arc(s.x,s.y,s.r+5,0,Math.PI*2);cx.stroke();
      cx.fillStyle='white';cx.font='bold 10px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
      cx.fillStyle=col;cx.font='bold 14px Fredoka One';cx.fillText(s.polarity>0?'N':'S',s.x,s.y-s.r-12);
      for(let l=0;l<this.lives[i];l++){cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x-8+l*9,s.y+s.r+10,3.5,0,Math.PI*2);cx.fill();}
    });
    cx.fillStyle='rgba(255,255,255,.2)';cx.font='11px Nunito';cx.textAlign='center';cx.fillText('[AÇÃO] = Trocar N/S  •  N=atrai S=repele',W/2,H-12);
  }
}

// ══════════════════════════════════════════════════
// DRILL — dig holes to trap enemies
// ══════════════════════════════════════════════════
class Drill extends BaseGame{
  init(){
    this.maxTime=45;
    this.cell=36;
    this.cols2=Math.floor(this.W/this.cell);
    this.rows2=Math.floor(this.H/this.cell);
    this.floor=new Uint8Array(this.cols2*this.rows2).fill(1); // 1=solid
    this.holes=new Float32Array(this.cols2*this.rows2).fill(0); // 0-1 depth, 1=full hole
    this.ps=this.pl.map((p,i)=>{const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;return{x:this.W/2+Math.cos(a)*this.W*.3,y:this.H/2+Math.sin(a)*this.H*.25,vx:0,vy:0,r:14,p,alive:true,lives:3,respawn:0,drillCD:0,falling:false,fallTimer:0};});
    this.debris=[];this.lives=this.ps.map(()=>3);
  }
  tileAt(x,y){const tx=Math.floor(x/this.cell),ty=Math.floor(y/this.cell);if(tx<0||tx>=this.cols2||ty<0||ty>=this.rows2)return 99;return ty*this.cols2+tx;}
  update(dt){
    super.update(dt);this.setTimer();
    const spd=612,fric=0.60;
    this.ps.forEach((s,i)=>{
      if(!s.alive){s.respawn-=dt;if(s.respawn<=0&&s.lives>0){
          // Find safe spawn spot (not on a hole)
          let sx=this.W/2,sy=this.H/2;
          for(let attempt=0;attempt<10;attempt++){
            const a=(i/this.pl.length)*Math.PI*2-Math.PI/2+attempt*0.5;
            sx=this.W/2+Math.cos(a)*this.W*.28;sy=this.H/2+Math.sin(a)*this.H*.22;
            const idx=this.tileAt(sx,sy);
            if(idx>=0&&this.floor[idx]===1)break;
          }
          s.x=sx;s.y=sy;s.vx=0;s.vy=0;s.alive=true;s.falling=false;}return;}
      s.drillCD=Math.max(0,s.drillCD-dt);
      let ax=0,ay=0;
      if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));s.y=Math.max(s.r,Math.min(this.H-s.r,s.y));
      // DRILL on action
      if(key(s.p,'action')&&s.drillCD<=0){
        const dirX=ax||0,dirY=ay||0;
        const tx=Math.floor((s.x+dirX*this.cell)/this.cell),ty2=Math.floor((s.y+dirY*this.cell)/this.cell);
        const idx=ty2*this.cols2+tx;
        if(idx>=0&&idx<this.holes.length){
          this.holes[idx]=Math.min(1,this.holes[idx]+1.0);
          if(this.holes[idx]>=1)this.floor[idx]=0;
          s.drillCD=.25;
          for(let k=0;k<5;k++)this.debris.push({x:tx*this.cell+this.cell/2,y:ty2*this.cell+this.cell/2,vx:(Math.random()-.5)*250,vy:-Math.random()*200-50,life:.5,c:'#8B6914'});
        }
      }
      // Check if standing on a hole
      const idx2=this.tileAt(s.x,s.y);
      if(idx2>=0&&this.floor[idx2]===0&&!s.falling){
        s.falling=true;s.fallTimer=.5;
        for(let k=0;k<8;k++)this.debris.push({x:s.x,y:s.y,vx:(Math.random()-.5)*300,vy:(Math.random()-.5)*300,life:.6,c:s.p.color});
      }
      if(s.falling){s.fallTimer-=dt;if(s.fallTimer<=0){this.lives[i]--;s.alive=false;s.falling=false;s.respawn=this.lives[i]>0?1.5:999;if(this.lives[i]<=0)this.checkWin();}}
    });
    this.debris=this.debris.filter(d=>{d.x+=d.vx*dt;d.y+=d.vy*dt;d.vy+=200*dt;d.life-=dt;return d.life>0;});
  }
  checkWin(){const al=this.ps.filter((_,i)=>this.lives[i]>0);if(al.length<=1)this.endGame(al.length?this.ps.indexOf(al[0]):this.lives.indexOf(Math.max(...this.lives)),this.lives.map(l=>Math.max(0,l)));}
  timeUp(){const mx=Math.max(...this.lives);this.endGame(this.lives.indexOf(mx),this.lives.map(l=>Math.max(0,l)));}
  draw(){
    const{W,H,cx,cell}=this;cx.fillStyle='#1a0d05';cx.fillRect(0,0,W,H);
    // Draw tiles
    for(let ty=0;ty<this.rows2;ty++)for(let tx=0;tx<this.cols2;tx++){
      const idx=ty*this.cols2+tx;
      if(this.floor[idx]){
        const d=this.holes[idx];
        cx.fillStyle=d>.5?'#5a3010':'#8B6030';cx.fillRect(tx*cell,ty*cell,cell,cell);
        cx.fillStyle='rgba(0,0,0,.15)';cx.fillRect(tx*cell,ty*cell+cell-4,cell,4);
        if(d>0){cx.fillStyle=`rgba(0,0,0,${d*.6})`;cx.fillRect(tx*cell+1,ty*cell+1,cell-2,cell-2);}
      } else {
        cx.fillStyle='#000';cx.fillRect(tx*cell+1,ty*cell+1,cell-2,cell-2);
        const hg=cx.createRadialGradient(tx*cell+cell/2,ty*cell+cell/2,0,tx*cell+cell/2,ty*cell+cell/2,cell);
        hg.addColorStop(0,'rgba(255,60,0,.3)');hg.addColorStop(1,'transparent');
        cx.fillStyle=hg;cx.fillRect(tx*cell,ty*cell,cell,cell);
      }
    }
    this.debris.forEach(d=>{cx.globalAlpha=d.life/.6;cx.fillStyle=d.c;cx.fillRect(d.x-3,d.y-3,6,6);});cx.globalAlpha=1;
    this.ps.forEach((s,i)=>{
      if(!s.alive)return;
      if(s.falling){cx.globalAlpha=.3+Math.sin(Date.now()*.03)*.3;}
      cx.shadowColor=s.p.color;cx.shadowBlur=10;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;cx.globalAlpha=1;
      cx.fillStyle='white';cx.font='bold 10px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
      for(let l=0;l<this.lives[i];l++){cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x-8+l*9,s.y-s.r-10,3.5,0,Math.PI*2);cx.fill();}
    });
    cx.fillStyle='rgba(255,255,255,.2)';cx.font='11px Nunito';cx.textAlign='center';cx.fillText(tc('drill_hint'),W/2,H-12);
  }
}


// ══════════════════════════════════════════════════
// GAME: RELÂMPAGO — dodge falling lightning bolts
// ══════════════════════════════════════════════════
class Thunder extends BaseGame{
  init(){
    this.maxTime=45;
    this.ps=this.pl.map((p,i)=>{
      const x=this.W*(0.15+i*(0.7/(this.pl.length-1||1)));
      return{x,y:this.H*.82,vx:0,vy:0,r:16,p,alive:true,pts:0};
    });
    this.lives=this.ps.map(()=>3);
    this.respawn=this.ps.map(()=>0);
    this.bolts=[];this.warnings=[];this.spawnT=0;this.spawnRate=1.6;
    this.particles=[];this.shakeT=0;
  }
  update(dt){
    super.update(dt);this.setTimer();
    this.shakeT=Math.max(0,this.shakeT-dt);
    // Speed up over time
    const progress=this.timer/this.maxTime;
    this.spawnRate=Math.max(0.35,1.6-progress*1.2);
    this.spawnT+=dt;
    if(this.spawnT>=this.spawnRate){
      this.spawnT=0;
      const count=1+Math.floor(progress*3);
      for(let c=0;c<count;c++){
        const wx=Math.random()*this.W*.9+this.W*.05;
        this.warnings.push({x:wx,life:0.55,maxLife:0.55});
      }
    }
    // Warnings -> bolts
    this.warnings=this.warnings.filter(w=>{
      w.life-=dt;
      if(w.life<=0){
        this.bolts.push({x:w.x,y:0,w:22+Math.random()*14,spd:this.H*3.5,life:0.22,maxLife:0.22});
        this.shakeT=0.12;
        return false;
      }
      return true;
    });
    // Move bolts + collision
    const spd=602,fric=0.60;
    this.bolts=this.bolts.filter(b=>{
      b.y+=b.spd*dt;b.life-=dt;
      this.ps.forEach((s,i)=>{
        if(!s.alive)return;
        const dx=s.x-b.x;
        if(Math.abs(dx)<b.w/2+s.r&&b.y>this.H*.3){
          this.lives[i]--;
          for(let k=0;k<14;k++)this.particles.push({x:s.x,y:s.y,vx:(Math.random()-.5)*250,vy:(Math.random()-.5)*250-80,life:.7,c:s.p.color,r:4+Math.random()*4});
          s.alive=false;s.pts=Math.max(0,s.pts-1);
          this.respawn[i]=this.lives[i]>0?1.2:999;
          if(this.lives[i]<=0)this.checkWin();
        }
      });
      return b.life>0&&b.y<this.H*1.2;
    });
    // Player movement
    this.ps.forEach((s,i)=>{
      if(!s.alive){this.respawn[i]-=dt;if(this.respawn[i]<=0&&this.lives[i]>0){s.x=this.W*(0.15+i*(0.7/(this.pl.length-1||1)));s.y=this.H*.82;s.vx=0;s.vy=0;s.alive=true;}return;}
      let ax=0;
      if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      if(ax){s.vx=ax*spd;}else{s.vx*=0.10;}
      s.vx*=Math.pow(fric,dt*60);
      s.x+=s.vx*dt;s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));
      s.pts+=dt*.8;
    });
    this.particles=this.particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=200*dt;p.life-=dt;return p.life>0;});
  }
  checkWin(){const al=this.ps.filter((_,i)=>this.lives[i]>0);if(al.length<=1){this.endGame(al.length?this.ps.indexOf(al[0]):this.ps.indexOf(this.ps.reduce((a,b)=>a.pts>=b.pts?a:b)),this.ps.map(s=>Math.round(s.pts/5)));}}
  timeUp(){const mx=Math.max(...this.ps.map(s=>s.pts));const wi=this.ps.findIndex(s=>s.pts===mx);this.endGame(wi,this.ps.map(s=>Math.round(s.pts/5)));}
  draw(){
    const{W,H,cx}=this;
    const shake=this.shakeT>0?(Math.random()-.5)*8:0;
    cx.save();if(shake){cx.translate(shake,Math.random()*4);}
    const bg=cx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#0a0520');bg.addColorStop(1,'#1a0a30');
    cx.fillStyle=bg;cx.fillRect(0,0,W,H);
    // Ground
    const gg=cx.createLinearGradient(0,H*.88,0,H);gg.addColorStop(0,'#2a1a40');gg.addColorStop(1,'#1a0a25');
    cx.fillStyle=gg;cx.fillRect(0,H*.88,W,H*.12);
    cx.strokeStyle='rgba(200,150,255,.3)';cx.lineWidth=2;cx.beginPath();cx.moveTo(0,H*.88);cx.lineTo(W,H*.88);cx.stroke();
    // Warning indicators
    this.warnings.forEach(w=>{
      const pct=1-w.life/w.maxLife;
      cx.strokeStyle=`rgba(255,${200-pct*200},0,${0.4+pct*.5})`;cx.lineWidth=2+pct*3;
      cx.setLineDash([6,4]);cx.beginPath();cx.moveTo(w.x,0);cx.lineTo(w.x,H);cx.stroke();cx.setLineDash([]);
      cx.fillStyle=`rgba(255,${200-pct*200},0,${0.5+pct*.4})`;cx.font=`${14+pct*10}px serif`;cx.textAlign='center';cx.fillText('⚠',w.x,H*.1);
    });
    // Bolts
    this.bolts.forEach(b=>{
      const alpha=b.life/b.maxLife;
      cx.shadowColor='#ffffa0';cx.shadowBlur=28;
      // Zigzag bolt
      const segs=6;cx.strokeStyle=`rgba(255,255,160,${alpha})`;cx.lineWidth=b.w*.35;
      cx.beginPath();cx.moveTo(b.x,0);
      for(let s2=1;s2<=segs;s2++){const sy=H*s2/segs;const off=(s2%2===0?1:-1)*(b.w*.5+Math.random()*8);cx.lineTo(b.x+off,sy);}
      cx.stroke();
      cx.lineWidth=b.w*.15;cx.strokeStyle=`rgba(255,255,255,${alpha*.9})`;cx.beginPath();cx.moveTo(b.x,0);
      for(let s2=1;s2<=segs;s2++){const sy=H*s2/segs;const off=(s2%2===0?1:-1)*(b.w*.3);cx.lineTo(b.x+off,sy);}
      cx.stroke();cx.shadowBlur=0;
    });
    // Particles
