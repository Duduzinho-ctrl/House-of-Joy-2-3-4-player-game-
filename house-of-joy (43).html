// GAME: CORREDOR — infinite side-scroll dodge
// ══════════════════════════════════════════════════
class Runner extends BaseGame{
  init(){
    this.maxTime=50;
    const n=this.pl.length;
    this.laneH=this.H/n;
    this.ps=this.pl.map((p,i)=>({x:this.W*.12,y:i*this.laneH+this.laneH/2,vx:0,vy:0,r:14,p,alive:true,pts:0,jumpCD:0,jumping:false,jumpVy:0}));
    this.lives=this.ps.map(()=>3);
    this.respawn=this.ps.map(()=>0);
    this.obstacles=[];this.spawnT=0;this.scrollSpd=320;this.bgX=0;this.particles=[];
    // Pre-spawn some obstacles
    for(let i=0;i<6;i++){this.spawnObs();}
  }
  spawnObs(){
    const n=this.pl.length;
    for(let lane=0;lane<n;lane++){
      if(Math.random()<0.45)return; // don't always spawn
      const type=['low','high','gap'][Math.floor(Math.random()*3)];
      const w=type==='gap'?this.W*.22:(30+Math.random()*50);
      const h2=type==='low'?35:type==='high'?60:12;
      const y=type==='low'?lane*this.laneH+this.laneH*.5:type==='high'?lane*this.laneH+this.laneH*.2:lane*this.laneH+this.laneH*.75;
      this.obstacles.push({x:this.W*(1.1+Math.random()*.5),y,w,h:h2,type,lane});
    }
  }
  update(dt){
    super.update(dt);this.setTimer();
    const prog=Math.min(1,this.timer/this.maxTime);
    this.scrollSpd=320+prog*300;
    this.bgX-=this.scrollSpd*dt;
    const spd=520,jumpPow=-650,grav=1800;
    this.spawnT+=dt;
    if(this.spawnT>0.8-prog*.3){this.spawnT=0;this.spawnObs();}
    this.obstacles.forEach(o=>o.x-=this.scrollSpd*dt);
    this.obstacles=this.obstacles.filter(o=>o.x+o.w>-20);
    this.ps.forEach((s,i)=>{
      if(!s.alive){this.respawn[i]-=dt;if(this.respawn[i]<=0&&this.lives[i]>0){s.x=this.W*.12;s.y=i*this.laneH+this.laneH/2;s.vy=0;s.jumping=false;s.alive=true;}return;}
      // Jump
      const onGround=!s.jumping;
      if((key(s.p,'up')||key(s.p,'action'))&&onGround&&s.jumpCD<=0){s.jumpVy=jumpPow;s.jumping=true;s.jumpCD=0.2;}
      s.jumpCD=Math.max(0,s.jumpCD-dt);
      if(s.jumping){s.jumpVy+=grav*dt;s.y+=s.jumpVy*dt;const floor=i*this.laneH+this.laneH/2;if(s.y>=floor){s.y=floor;s.jumping=false;s.jumpVy=0;}}
      // Horizontal drift
      let ax=0;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      if(ax){s.vx=ax*spd;}else{s.vx*=0.12;}s.vx*=Math.pow(0.60,dt*60);
      s.x+=s.vx*dt;s.x=Math.max(s.r,Math.min(this.W*.4,s.x));
      // Collision with obstacles
      this.obstacles.filter(o=>o.lane===i).forEach(o=>{
        const overlap=s.x+s.r>o.x&&s.x-s.r<o.x+o.w&&s.y+s.r>o.y-o.h/2&&s.y-s.r<o.y+o.h/2;
        if(overlap){
          this.lives[i]--;s.alive=false;s.x=this.W*.12;
          for(let k=0;k<12;k++)this.particles.push({x:s.x,y:s.y,vx:(Math.random()-.5)*200,vy:(Math.random()-.5)*200-100,life:.65,c:s.p.color,r:4+Math.random()*4});
          this.respawn[i]=this.lives[i]>0?1.0:999;
          if(this.lives[i]<=0)this.checkWin();
        }
      });
      if(s.alive)s.pts+=dt*this.scrollSpd*.003;
    });
    this.particles=this.particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=200*dt;p.life-=dt;return p.life>0;});
  }
  checkWin(){const al=this.ps.filter((_,i)=>this.lives[i]>0);if(al.length<=1)this.endGame(al.length?this.ps.indexOf(al[0]):this.ps.indexOf(this.ps.reduce((a,b)=>a.pts>=b.pts?a:b)),this.ps.map(s=>Math.round(s.pts/8)));}
  timeUp(){const mx=Math.max(...this.ps.map(s=>s.pts));const wi=this.ps.findIndex(s=>s.pts===mx);this.endGame(wi,this.ps.map(s=>Math.round(s.pts/8)));}
  draw(){
    const{W,H,cx}=this;const n=this.pl.length;
    cx.fillStyle='#0a1a0a';cx.fillRect(0,0,W,H);
    // Scrolling BG grid
    const gx=((this.bgX%60)+60)%60;cx.strokeStyle='rgba(255,255,255,.04)';cx.lineWidth=1;
    for(let x=gx-60;x<W+60;x+=60){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(let y=0;y<H;y+=40){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    // Lane separators
    for(let i=1;i<n;i++){cx.strokeStyle='rgba(255,255,255,.1)';cx.lineWidth=2;cx.setLineDash([12,8]);cx.beginPath();cx.moveTo(0,i*H/n);cx.lineTo(W,i*H/n);cx.stroke();cx.setLineDash([]);}
    // Floor lines per lane
    for(let i=0;i<n;i++){cx.fillStyle='rgba(255,255,255,.06)';cx.fillRect(0,i*H/n+H/n*.6,W,3);}
    // Obstacles
    this.obstacles.forEach(o=>{
      if(o.type==='gap'){cx.fillStyle='rgba(255,80,0,.35)';cx.fillRect(o.x,o.y-8,o.w,16);cx.fillStyle='rgba(255,80,0,.5)';cx.font='16px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('🕳',o.x+o.w/2,o.y);}
      else{
        const c=o.type==='high'?'#2a8a6a':'#8a5a2a';
        cx.fillStyle=c;cx.fillRect(o.x,o.y-o.h/2,o.w,o.h);
        cx.fillStyle='rgba(255,255,255,.15)';cx.fillRect(o.x,o.y-o.h/2,o.w,4);
        cx.strokeStyle='rgba(255,255,255,.2)';cx.lineWidth=1;cx.strokeRect(o.x,o.y-o.h/2,o.w,o.h);
        cx.font='14px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(o.type==='high'?'🌵':'🪨',o.x+o.w/2,o.y);
      }
    });
    // Particles
    this.particles.forEach(p=>{cx.globalAlpha=p.life/.65;cx.fillStyle=p.c;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;
    // Players
    this.ps.forEach((s,i)=>{
      if(!s.alive)return;
      cx.shadowColor=s.p.color;cx.shadowBlur=10;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      if(s.jumping){cx.fillStyle='rgba(255,255,255,.3)';cx.beginPath();cx.arc(s.x,s.y,s.r+6,0,Math.PI*2);cx.stroke();}
      cx.fillStyle='white';cx.font='bold 9px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
      for(let l=0;l<this.lives[i];l++){cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x-7+l*8,s.y-s.r-10,3,0,Math.PI*2);cx.fill();}
    });
    // Speed indicator
    const pct=Math.min(1,this.timer/this.maxTime);
    cx.fillStyle='rgba(0,0,0,.4)';cx.fillRect(W-80,8,72,10);cx.fillStyle='rgba(255,200,0,.7)';cx.fillRect(W-80,8,72*pct,10);
    cx.fillStyle='rgba(255,255,255,.4)';cx.font='9px Nunito';cx.textAlign='right';cx.fillText('VELOC.',W-4,22);
  }
}

// GAME: TURBO BOOST — lane dodge race with boost
// ══════════════════════════════════════════════════
class BoostRace extends BaseGame{
  init(){
    this.maxTime=40;const n=this.pl.length;
    const laneCount=4;const laneW=this.H/laneCount;
    const lanes=[Math.floor(laneCount*.15),Math.floor(laneCount*.38),Math.floor(laneCount*.62),Math.floor(laneCount*.85)];
    this.ps=this.pl.map((p,i)=>({x:80,y:this.H*(0.12+i*(0.76/(n-1||1))),vx:200,vy:0,r:16,lane:Math.round(lanes[i%4]*(this.H/(laneCount*laneW))),p,boost:0,boostCD:0,alive:true,pts:0,dist:0}));
    this.lives=this.ps.map(()=>3);this.respawn=this.ps.map(()=>0);
    this.obstacles=[];this.collectibles=[];this.bgX=0;this.spawnT=0;this.particles=[];
    for(let i=0;i<8;i++){this.spawnObs(this.W*.5+i*180);}
  }
  spawnObs(atX){
    const n=this.pl.length,slots=4,lh=this.H/slots;
    // Leave at least one slot free
    const blocked=new Set();while(blocked.size<Math.min(2+Math.floor(this.timer*.05),slots-1)){blocked.add(Math.floor(Math.random()*slots));}
    blocked.forEach(sl=>{
      const type=Math.random()<.3?'boost':'obstacle';
      if(type==='boost'){this.collectibles.push({x:(atX||this.W*1.1)+Math.random()*60,y:sl*lh+lh/2,r:14,alive:true});}
      else{this.obstacles.push({x:(atX||this.W*1.1)+Math.random()*30,y:sl*lh,w:28+Math.random()*24,h:lh,alive:true});}
    });
  }
  update(dt){
    super.update(dt);this.setTimer();
    const baseSpd=280+this.timer*7,boostSpd=700;
    this.bgX-=baseSpd*dt;
    this.spawnT+=dt;if(this.spawnT>0.9){this.spawnT=0;this.spawnObs();}
    const scrollDt=baseSpd*dt;
    this.obstacles.forEach(o=>o.x-=scrollDt);
    this.collectibles.forEach(c=>c.x-=scrollDt);
    this.obstacles=this.obstacles.filter(o=>o.x+o.w>-10);
    this.collectibles=this.collectibles.filter(c=>c.x>-10&&c.alive);
    const spd=380,fric=0.60;
    this.ps.forEach((s,i)=>{
      if(!s.alive){this.respawn[i]-=dt;if(this.respawn[i]<=0&&this.lives[i]>0){s.x=80;s.vx=baseSpd;s.alive=true;}return;}
      s.boostCD=Math.max(0,s.boostCD-dt);s.boost=Math.max(0,s.boost-dt);
      let ay=0;if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;
      if(ay){s.vy=ay*spd;}else{s.vy*=0.12;}s.vy*=Math.pow(fric,dt*60);
      s.y+=s.vy*dt;s.y=Math.max(s.r,Math.min(this.H-s.r,s.y));
      // Boost
      if(key(s.p,'action')&&s.boostCD<=0){s.boost=0.55;s.boostCD=2.8;for(let k=0;k<8;k++)this.particles.push({x:s.x-s.r,y:s.y,vx:-(Math.random()*200+100),vy:(Math.random()-.5)*100,life:.35,c:s.p.color,r:3+Math.random()*4});}
      const curSpd=s.boost>0?boostSpd:baseSpd+80;
      s.x+=curSpd*dt*0.22;// relative motion
      s.dist+=curSpd*dt;
      // Collide obstacles
      this.obstacles.forEach(o=>{
        if(!o.alive)return;
        if(s.x+s.r>o.x&&s.x-s.r<o.x+o.w&&s.y+s.r>o.y&&s.y-s.r<o.y+o.h){
          this.lives[i]--;s.boost=0;
          for(let k=0;k<12;k++)this.particles.push({x:s.x,y:s.y,vx:(Math.random()-.5)*220,vy:(Math.random()-.5)*220-60,life:.6,c:s.p.color,r:4+Math.random()*4});
          s.alive=false;this.respawn[i]=this.lives[i]>0?1.0:999;
          if(this.lives[i]<=0)this.checkWin();
        }
      });
      // Collect boosts
      this.collectibles.forEach(c=>{if(c.alive&&Math.hypot(s.x-c.x,s.y-c.y)<s.r+c.r){c.alive=false;s.boost=0.7;s.boostCD=.5;for(let k=0;k<8;k++)this.particles.push({x:c.x,y:c.y,vx:(Math.random()-.5)*160,vy:(Math.random()-.5)*160,life:.5,c:'#ffd32a',r:3+Math.random()*4});}});
      s.pts=s.dist*.001;
    });
    this.particles=this.particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=180*dt;p.life-=dt;return p.life>0;});
  }
  checkWin(){const al=this.ps.filter((_,i)=>this.lives[i]>0);if(al.length<=1)this.endGame(al.length?this.ps.indexOf(al[0]):this.ps.indexOf(this.ps.reduce((a,b)=>a.pts>=b.pts?a:b)),this.ps.map(s=>Math.round(s.pts)));}
  timeUp(){const mx=Math.max(...this.ps.map(s=>s.pts));const wi=this.ps.findIndex(s=>s.pts===mx);this.endGame(wi,this.ps.map(s=>Math.round(s.pts)));}
  draw(){
    const{W,H,cx}=this;
    // BG gradient
    const bg=cx.createLinearGradient(0,0,W,0);bg.addColorStop(0,'#050510');bg.addColorStop(1,'#101a10');
    cx.fillStyle=bg;cx.fillRect(0,0,W,H);
    const gx=((this.bgX%80)+80)%80;
    cx.strokeStyle='rgba(255,255,255,.04)';cx.lineWidth=1;
    for(let x=gx-80;x<W+80;x+=80){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(let y=0;y<H;y+=40){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    // Lane dividers
    const slots=4,lh=H/slots;
    for(let i=1;i<slots;i++){cx.strokeStyle='rgba(255,255,255,.08)';cx.lineWidth=1;cx.setLineDash([16,8]);cx.beginPath();cx.moveTo(0,i*lh);cx.lineTo(W,i*lh);cx.stroke();cx.setLineDash([]);}
    // Obstacles
    this.obstacles.forEach(o=>{
      if(!o.alive)return;
      const gr=cx.createLinearGradient(o.x,o.y,o.x+o.w,o.y+o.h);gr.addColorStop(0,'#8a2020');gr.addColorStop(1,'#4a0808');
      cx.fillStyle=gr;cx.beginPath();cx.roundRect(o.x,o.y+4,o.w,o.h-8,5);cx.fill();
      cx.fillStyle='rgba(255,100,100,.2)';cx.fillRect(o.x,o.y+4,o.w,6);
      cx.font='18px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('🚧',o.x+o.w/2,o.y+o.h/2);
    });
    // Collectibles
    this.collectibles.forEach(c=>{
      if(!c.alive)return;
      const pulse=Math.sin(Date.now()*.005)*.15+.85;
      cx.shadowColor='#ffd32a';cx.shadowBlur=12*pulse;cx.fillStyle='#ffd32a';cx.beginPath();cx.arc(c.x,c.y,c.r*pulse,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      cx.font='14px serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('⚡',c.x,c.y);
    });
    this.particles.forEach(p=>{cx.globalAlpha=p.life/.6;cx.fillStyle=p.c;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;
    // Players
    this.ps.forEach((s,i)=>{
      if(!s.alive)return;
      const boosting=s.boost>0;
      if(boosting){for(let k=5;k>0;k--){cx.globalAlpha=.06*k;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x-k*14,s.y,s.r-k*1.5,0,Math.PI*2);cx.fill();}cx.globalAlpha=1;}
      cx.shadowColor=boosting?'#ffd32a':s.p.color;cx.shadowBlur=boosting?24:10;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r*(boosting?1.18:1),0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      cx.fillStyle='white';cx.font='bold 10px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(boosting?'⚡':s.p.name,s.x,s.y);
      // Boost cooldown arc
      if(s.boostCD>0&&!boosting){const pct=1-s.boostCD/2.8;cx.strokeStyle=s.p.color+'88';cx.lineWidth=2.5;cx.beginPath();cx.arc(s.x,s.y,s.r+5,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);cx.stroke();}
      for(let l=0;l<this.lives[i];l++){cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x-7+l*8,s.y-s.r-10,3,0,Math.PI*2);cx.fill();}
    });
  }
}

// ══════════════════════════════════════════════════
// GAME: CHUVA DE BALAS — dodge bullet swarms
// ══════════════════════════════════════════════════
class BulletHell extends BaseGame{
  init(){
    this.maxTime=45;
    this.ps=this.pl.map((p,i)=>{
      const a=(i/this.pl.length)*Math.PI*2-Math.PI/2;
      return{x:this.W/2+Math.cos(a)*this.W*.28,y:this.H/2+Math.sin(a)*this.H*.28,vx:0,vy:0,r:14,p,alive:true,pts:0,invTimer:0};
    });
    this.lives=this.ps.map(()=>3);this.respawn=this.ps.map(()=>0);
    this.bullets=[];this.spawnT=0;this.waveT=0;this.wave=0;this.particles=[];
    this.patterns=['spiral','cross','rain','expand','random'];
    this.curPattern=0;
  }
  spawnWave(){
    const p=this.patterns[this.curPattern%this.patterns.length];
    this.curPattern++;const cx2=this.W/2,cy2=this.H/2;const spd=260+this.wave*22;
    if(p==='spiral'){for(let i=0;i<12;i++){const a=i/12*Math.PI*2+this.waveT*.8;this.bullets.push({x:cx2+Math.cos(a)*40,y:cy2+Math.sin(a)*40,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,r:7,life:3,c:'#ff4757'});}}
    else if(p==='cross'){const dirs=[[1,0],[-1,0],[0,1],[0,-1],[.7,.7],[-.7,.7],[.7,-.7],[-.7,-.7]];dirs.forEach(([dx,dy])=>{for(let k=0;k<3;k++){this.bullets.push({x:cx2+dx*20,y:cy2+dy*20,vx:dx*(spd+k*30),vy:dy*(spd+k*30),r:7,life:2.5,c:'#ffa502'});}});}
    else if(p==='rain'){for(let i=0;i<16;i++){this.bullets.push({x:Math.random()*this.W*.9+this.W*.05,y:-15,vx:(Math.random()-.5)*80,vy:spd+Math.random()*100,r:7,life:3,c:'#2ed573'});}}
    else if(p==='expand'){for(let i=0;i<20;i++){const a=i/20*Math.PI*2;this.bullets.push({x:cx2,y:cy2,vx:Math.cos(a)*spd*.6,vy:Math.sin(a)*spd*.6,r:6,life:2.8,c:'#74b9ff'});}}
    else{for(let i=0;i<10;i++){const a=Math.random()*Math.PI*2;this.bullets.push({x:cx2+Math.cos(a)*this.W*.45,y:cy2+Math.sin(a)*this.H*.45,vx:-Math.cos(a)*(spd+Math.random()*80),vy:-Math.sin(a)*(spd+Math.random()*80),r:7,life:2.5,c:'#a29bfe'});}}
  }
  update(dt){
    super.update(dt);this.setTimer();
    this.waveT+=dt;this.spawnT+=dt;
    const interval=Math.max(0.55,1.5-this.timer*.02);
    if(this.spawnT>=interval){this.spawnT=0;this.wave++;this.spawnWave();}
    // Move bullets + bounds wrap
    this.bullets=this.bullets.filter(b=>{
      b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
      if(b.x<-20)b.x=this.W+15;if(b.x>this.W+20)b.x=-15;
      if(b.y<-20)b.y=this.H+15;if(b.y>this.H+20)b.y=-15;
      // Hit players
      this.ps.forEach((s,i)=>{
        if(!s.alive||s.invTimer>0)return;
        if(Math.hypot(b.x-s.x,b.y-s.y)<s.r+b.r+2){
          this.lives[i]--;s.invTimer=1.2;b.life=-1;
          for(let k=0;k<12;k++)this.particles.push({x:s.x,y:s.y,vx:(Math.random()-.5)*200,vy:(Math.random()-.5)*200-60,life:.7,c:s.p.color,r:4+Math.random()*4});
          if(this.lives[i]<=0){s.alive=false;s.respawn=999;this.checkWin();}
        }
      });
      return b.life>0;
    });
    // Player movement
    const spd=618,fric=0.60;
    this.ps.forEach((s,i)=>{
      if(!s.alive)return;
      s.invTimer=Math.max(0,s.invTimer-dt);
      let ax=0,ay=0;if(key(s.p,'up'))ay-=1;if(key(s.p,'down'))ay+=1;if(key(s.p,'left'))ax-=1;if(key(s.p,'right'))ax+=1;
      const l=Math.sqrt(ax*ax+ay*ay)||1;if(ax||ay){s.vx=ax/l*spd;s.vy=ay/l*spd;}else{s.vx*=0.12;s.vy*=0.12;}
      s.vx*=Math.pow(fric,dt*60);s.vy*=Math.pow(fric,dt*60);
      s.x+=s.vx*dt;s.y+=s.vy*dt;
      s.x=Math.max(s.r,Math.min(this.W-s.r,s.x));s.y=Math.max(s.r,Math.min(this.H-s.r,s.y));
      s.pts+=dt*.8;
    });
    this.particles=this.particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=180*dt;p.life-=dt;return p.life>0;});
  }
  checkWin(){const al=this.ps.filter(s=>s.alive);if(al.length<=1)this.endGame(al.length?this.ps.indexOf(al[0]):this.ps.indexOf(this.ps.reduce((a,b)=>a.pts>=b.pts?a:b)),this.ps.map(s=>Math.round(s.pts/5)));}
  timeUp(){const mx=Math.max(...this.ps.map(s=>s.pts));const wi=this.ps.findIndex(s=>s.pts===mx);this.endGame(wi,this.ps.map(s=>Math.round(s.pts/5)));}
  draw(){
    const{W,H,cx}=this;
    cx.fillStyle='#060610';cx.fillRect(0,0,W,H);
    // Subtle grid
    cx.strokeStyle='rgba(255,255,255,.03)';cx.lineWidth=1;
    for(let x=0;x<W;x+=50){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(let y=0;y<H;y+=50){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    // Bullets
    this.bullets.forEach(b=>{
      cx.shadowColor=b.c;cx.shadowBlur=10;cx.fillStyle=b.c;cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
    });
    // Particles
    this.particles.forEach(p=>{cx.globalAlpha=p.life/.7;cx.fillStyle=p.c;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;
    // Players
    this.ps.forEach((s,i)=>{
      if(!s.alive)return;
      const inv=s.invTimer>0&&Math.floor(s.invTimer*8)%2===0;
      if(inv){cx.globalAlpha=.35;}
      cx.shadowColor=s.p.color;cx.shadowBlur=12;cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
      if(s.invTimer>0){cx.strokeStyle=s.p.color+'88';cx.lineWidth=2;cx.beginPath();cx.arc(s.x,s.y,s.r+7,0,Math.PI*2);cx.stroke();}
      cx.globalAlpha=1;
      cx.fillStyle='white';cx.font='bold 9px Nunito';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(s.p.name,s.x,s.y);
      for(let l=0;l<this.lives[i];l++){cx.fillStyle=s.p.color;cx.beginPath();cx.arc(s.x-7+l*8,s.y-s.r-10,3.5,0,Math.PI*2);cx.fill();}
    });
  }
}

class FlappyBird extends BaseGame{
  init(){
    this.maxTime=40;
    const sw=this.W,sh=this.H;
    // Each player has a bird
    // Start all birds vertically distributed INSIDE the pipe gap (35%-67%)
    this.birds=this.pl.map((_,i)=>{
      const n=this.pl.length;
      const y=sh*(0.38+i*(0.22/(Math.max(n-1,1))));
      return{y,vy:0,x:sw*0.22,alive:true,score:0};
    });
    this.pipes=[];this.pipeTimer=0;this.pipeGap=sh*0.36;
    this.spd=220;this.grav=900;this.flapV=-310;
    // map action key press to flap
    this.flapped=this.pl.map(()=>false);
  }
  timeUp(){const mx=Math.max(...this.birds.map(b=>b.score));const wi=this.birds.findIndex(b=>b.score===mx);this.endGame(wi>=0?wi:0,this.birds.map(b=>b.score));}
  update(dt){
    super.update(dt);
    this.spd=220+this.timer*4;
    // spawn pipes
    this.pipeTimer+=dt;
    if(this.pipeTimer>1.4){
      this.pipeTimer=0;
      const topH=this.H*(0.18+Math.random()*0.42);
      this.pipes.push({x:this.W+20,topH,scored:[]});
    }
    // move pipes
    this.pipes.forEach(p=>{p.x-=this.spd*dt;});
    this.pipes=this.pipes.filter(p=>p.x>-80);
    // birds
    this.pl.forEach((_,i)=>{
      const b=this.birds[i];if(!b.alive)return;
      const aDown=KD[this.pl[i].keys.action]||KD[this.pl[i].keys.up];
      if(aDown&&!this.flapped[i]){b.vy=this.flapV;this.flapped[i]=true;}
      if(!aDown)this.flapped[i]=false;
      b.vy+=this.grav*dt;b.y+=b.vy*dt;
      // ceiling/floor
      if(b.y<12||b.y>this.H-12){b.alive=false;}
      // pipe collision
      const bx=b.x,by=b.y,br=12;
      this.pipes.forEach(p=>{
        if(bx+br>p.x&&bx-br<p.x+52){
          if(by-br<p.topH||by+br>p.topH+this.pipeGap)b.alive=false;
        }
        // score
        if(!p.scored.includes(i)&&p.x+52<bx){p.scored.push(i);b.score++;}
      });
    });
    if(this.birds.every(b=>!b.alive)){
      const mx=Math.max(...this.birds.map(b=>b.score));
      const wi=this.birds.findIndex(b=>b.score===mx);
      this.endGame(wi,this.birds.map(b=>b.score));
    }
  }
  timeUp(){
    const mx=Math.max(...this.birds.map(b=>b.score));
    const wi=this.birds.findIndex(b=>b.score===mx);
    this.endGame(wi>=0?wi:0,this.birds.map(b=>Math.round(b.score)));
  }
  draw(){
    const{cx,W,H}=this;
    cx.fillStyle='#87CEEB';cx.fillRect(0,0,W,H);
    // clouds
    cx.fillStyle='rgba(255,255,255,0.6)';
    [0.15,0.45,0.75].forEach((xf,i)=>{
      const cx2=W*((xf+(this.timer*0.03))%1),cy=H*0.15;
      cx.beginPath();cx.arc(cx2,cy,30,0,Math.PI*2);cx.arc(cx2+22,cy-8,22,0,Math.PI*2);cx.arc(cx2+40,cy,26,0,Math.PI*2);cx.fill();
    });
    // ground
    cx.fillStyle='#5d8a3c';cx.fillRect(0,H-20,W,20);
    // pipes
    this.pipes.forEach(p=>{
      cx.fillStyle='#2ecc71';
      cx.fillRect(p.x,0,52,p.topH);
      cx.fillRect(p.x,p.topH+this.pipeGap,52,H);
      cx.fillStyle='#27ae60';
      cx.fillRect(p.x-4,p.topH-18,60,18);
      cx.fillRect(p.x-4,p.topH+this.pipeGap,60,18);
    });
    // birds
    const PCOLS=['#ff4757','#2ed573','#ffa502','#1e90ff'];
    this.birds.forEach((b,i)=>{
      if(!b.alive)return;
      cx.save();cx.translate(b.x,b.y);
      cx.rotate(Math.max(-0.5,Math.min(0.8,b.vy*0.002)));
      cx.fillStyle=PCOLS[i];
      cx.beginPath();cx.ellipse(0,0,14,10,0,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';cx.beginPath();cx.arc(6,-2,4,0,Math.PI*2);cx.fill();
      cx.fillStyle='#222';cx.beginPath();cx.arc(8,-2,2,0,Math.PI*2);cx.fill();
      cx.fillStyle='#ffa500';cx.beginPath();cx.moveTo(14,-2);cx.lineTo(20,0);cx.lineTo(14,2);cx.closePath();cx.fill();
      cx.restore();
      // score
      cx.fillStyle=PCOLS[i];cx.font='bold 13px Nunito';cx.textAlign='left';
      cx.fillText('P'+(i+1)+' '+b.score,8,18+i*18);
    });
    cx.textAlign='center';
    this.setTimer(null);
    const t=Math.ceil(Math.max(0,this.maxTime-this.timer));
    const el=document.getElementById('gameTimer');if(el)el.textContent=t+'s';
  }
}

class AirHockey extends BaseGame{
  init(){
    this.maxTime=45;
    this.puck={x:this.W/2,y:this.H/2,vx:280,vy:180,r:14};
    // paddles at fixed x positions
    // Paddles: left side (P1,P3) at x=10%, right side (P2,P4) at x=90%
    // With 2p: 1 paddle each side. With 4p: 2 paddles per side, spread vertically
    const sideCount=[0,0];
    this.paddles=this.pl.map((_,i)=>{
      const side=i%2;const sideIdx=sideCount[side]++;const total=Math.ceil(this.pl.length/2);
      const yFrac=(sideIdx+1)/(total+1);
      return{x:this.W*(side===0?0.1:0.9),y:this.H*yFrac,r:26,score:0,side:side===0?'left':'right'};
    });
    this.score=[0,0];// left/right
    this.lastScorer=-1;
  }
  update(dt){
    super.update(dt);
    const{W,H}=this;
    // move paddles (only up/down, confined to their side)
    this.pl.forEach((_,i)=>{
      const p=this.paddles[i];const k=this.pl[i].keys;
      const sp=320;
      if(KD[k.up])p.y-=sp*dt;
      if(KD[k.down])p.y+=sp*dt;
      // constrain x to their half
      if(p.side==='left'){p.x=Math.max(p.r,Math.min(W*0.45-p.r,p.x));}
      else{p.x=Math.max(W*0.55+p.r,Math.min(W-p.r,p.x));}
      p.y=Math.max(p.r,Math.min(H-p.r,p.y));
    });
    // puck physics
    const pk=this.puck;
    pk.x+=pk.vx*dt;pk.y+=pk.vy*dt;
    // walls
    if(pk.y-pk.r<0){pk.y=pk.r;pk.vy=Math.abs(pk.vy);}
    if(pk.y+pk.r>H){pk.y=H-pk.r;pk.vy=-Math.abs(pk.vy);}
    // goal detection
    const gH=H*0.35,gY=H/2;
    if(pk.x-pk.r<0){
      if(pk.y>gY-gH/2&&pk.y<gY+gH/2){this.score[1]++;this.resetPuck(1);}
      else{pk.x=pk.r;pk.vx=Math.abs(pk.vx);}
    }
    if(pk.x+pk.r>W){
      if(pk.y>gY-gH/2&&pk.y<gY+gH/2){this.score[0]++;this.resetPuck(0);}
      else{pk.x=W-pk.r;pk.vx=-Math.abs(pk.vx);}
    }
    // paddle collisions
    this.paddles.forEach(p=>{
      const dx=pk.x-p.x,dy=pk.y-p.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<pk.r+p.r){
        const nx=dx/dist,ny=dy/dist;
        const spd=Math.sqrt(pk.vx*pk.vx+pk.vy*pk.vy);
        pk.vx=nx*Math.max(spd,350)*1.1;pk.vy=ny*Math.max(spd,350)*1.1;
        pk.x=p.x+nx*(pk.r+p.r+1);pk.y=p.y+ny*(pk.r+p.r+1);
      }
    });
    // cap speed
    const spd=Math.sqrt(pk.vx*pk.vx+pk.vy*pk.vy);
    if(spd>700){pk.vx=pk.vx/spd*700;pk.vy=pk.vy/spd*700;}
    // score display
    const el=document.getElementById('gameTimer');
    if(el)el.textContent=`${this.score[0]}-${this.score[1]} | ${Math.ceil(Math.max(0,this.maxTime-this.timer))}s`;
  }
  resetPuck(winner){
    this.puck.x=this.W/2;this.puck.y=this.H/2;
    this.puck.vx=(winner===0?-1:1)*280;this.puck.vy=(Math.random()-.5)*200;
    if(this.score[0]>=5||this.score[1]>=5){const w=this.score[0]>this.score[1]?0:1;this.endGame(w,this.pl.map((_,i)=>i<Math.ceil(this.pl.length/2)?this.score[0]:this.score[1]));}
  }
  timeUp(){const w=this.score[0]>=this.score[1]?0:1;this.endGame(w,this.pl.map((_,i)=>i<Math.ceil(this.pl.length/2)?this.score[0]:this.score[1]));}
  draw(){
    const{cx,W,H}=this;
    cx.fillStyle='#0f1e3c';cx.fillRect(0,0,W,H);
    // rink lines
    cx.strokeStyle='rgba(255,255,255,0.15)';cx.lineWidth=2;
    cx.beginPath();cx.moveTo(W/2,0);cx.lineTo(W/2,H);cx.stroke();
    const gH=H*0.35,gY=H/2;
    // goals
    cx.fillStyle='rgba(255,71,87,0.3)';cx.fillRect(0,gY-gH/2,12,gH);
    cx.fillStyle='rgba(30,144,255,0.3)';cx.fillRect(W-12,gY-gH/2,12,gH);
    cx.strokeStyle='#ff4757';cx.lineWidth=3;
    cx.strokeRect(0,gY-gH/2,12,gH);
    cx.strokeStyle='#1e90ff';cx.strokeRect(W-12,gY-gH/2,12,gH);
    // score
    cx.fillStyle='rgba(255,255,255,0.8)';cx.font='bold 28px Fredoka One';cx.textAlign='center';
    cx.fillText(this.score[0],W*0.25,36);cx.fillText(this.score[1],W*0.75,36);
    // puck
    const pk=this.puck;
    cx.fillStyle='#eee';cx.beginPath();cx.arc(pk.x,pk.y,pk.r,0,Math.PI*2);cx.fill();
    cx.fillStyle='#333';cx.beginPath();cx.arc(pk.x,pk.y,pk.r-3,0,Math.PI*2);cx.fill();
    // paddles
    const PCOLS=['#ff4757','#2ed573','#ffa502','#1e90ff'];
    this.paddles.forEach((p,i)=>{
      cx.fillStyle=PCOLS[i];cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();
      cx.fillStyle='rgba(255,255,255,0.3)';cx.beginPath();cx.arc(p.x-4,p.y-4,p.r*0.4,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';cx.font='bold 13px Nunito';cx.textAlign='center';
      cx.fillText('P'+(i+1),p.x,p.y+5);
    });
  }
}

class BumperCars extends BaseGame{
  init(){
    this.maxTime=35;
    const cx2=this.W/2,cy2=this.H/2;
    this.cars=this.pl.map((_,i)=>{
      const ang=i*(Math.PI*2/this.pl.length);
      return{x:cx2+Math.cos(ang)*120,y:cy2+Math.sin(ang)*120,
        vx:0,vy:0,ang:ang,score:0,r:22,hp:5};
    });
  }
  update(dt){
    super.update(dt);
    const sp=420;
    this.pl.forEach((_,i)=>{
      const c=this.cars[i];const k=this.pl[i].keys;
      if(KD[k.left])c.ang-=3*dt;
      if(KD[k.right])c.ang+=3*dt;
      const acc=KD[k.up]?1:KD[k.down]?-0.5:0;
      c.vx+=Math.cos(c.ang)*acc*sp*dt;
      c.vy+=Math.sin(c.ang)*acc*sp*dt;
      c.vx*=0.92;c.vy*=0.92;
      c.x+=c.vx*dt;c.y+=c.vy*dt;
      // walls
      c.x=Math.max(c.r,Math.min(this.W-c.r,c.x));
      c.y=Math.max(c.r,Math.min(this.H-c.r,c.y));
      if(c.x<=c.r||c.x>=this.W-c.r)c.vx*=-0.5;
      if(c.y<=c.r||c.y>=this.H-c.r)c.vy*=-0.5;
    });
    // collisions between cars
    for(let a=0;a<this.cars.length;a++){
      for(let b=a+1;b<this.cars.length;b++){
        const ca=this.cars[a],cb=this.cars[b];
        const dx=cb.x-ca.x,dy=cb.y-ca.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<ca.r+cb.r){
          const nx=dx/dist,ny=dy/dist;
          const relV=(ca.vx-cb.vx)*nx+(ca.vy-cb.vy)*ny;
          if(relV>0){
            const impact=Math.abs(relV);
            ca.vx-=nx*relV;ca.vy-=ny*relV;
            cb.vx+=nx*relV;cb.vy+=ny*relV;
            if(impact>80){ca.score++;cb.score++;}
          }
          const overlap=(ca.r+cb.r-dist)/2;
          ca.x-=nx*overlap;ca.y-=ny*overlap;
          cb.x+=nx*overlap;cb.y+=ny*overlap;
        }
      }
    }
  }
  timeUp(){
    const mx=Math.max(...this.cars.map(c=>c.score));
    this.endGame(this.cars.findIndex(c=>c.score===mx),this.cars.map(c=>Math.round(c.score)));
  }
  draw(){
    const{cx,W,H}=this;
    cx.fillStyle='#1a0a2e';cx.fillRect(0,0,W,H);
    // checkered floor
    const cell=40;
    for(let x=0;x<W;x+=cell)for(let y=0;y<H;y+=cell){
      cx.fillStyle=((x+y)/cell)%2===0?'#1f0f3a':'#250f40';
      cx.fillRect(x,y,cell,cell);
    }
    // wall bumpers
    cx.strokeStyle='#ffd32a';cx.lineWidth=6;cx.strokeRect(3,3,W-6,H-6);
    // cars
    const PCOLS=['#ff4757','#2ed573','#ffa502','#1e90ff'];
    this.cars.forEach((c,i)=>{
      cx.save();cx.translate(c.x,c.y);cx.rotate(c.ang);
      // body
      cx.fillStyle=PCOLS[i];cx.beginPath();cx.roundRect(-c.r,-c.r*0.7,c.r*2,c.r*1.4,6);cx.fill();
      // windshield
      cx.fillStyle='rgba(255,255,255,0.4)';cx.fillRect(2,-c.r*0.5,c.r-4,c.r*0.7);
      // bumper
      cx.fillStyle='#ffd32a';cx.fillRect(-c.r,-c.r*0.8,4,c.r*1.6);cx.fillRect(c.r-4,-c.r*0.8,4,c.r*1.6);
      cx.restore();
      cx.fillStyle='#fff';cx.font='bold 12px Nunito';cx.textAlign='center';
      cx.fillText('P'+(i+1)+' '+c.score,c.x,c.y-c.r-6);
    });
    const el=document.getElementById('gameTimer');
    if(el)el.textContent=Math.ceil(Math.max(0,this.maxTime-this.timer))+'s';
  }
}

class HotPotato extends BaseGame{
  init(){
    this.maxTime=30;
    this.holder=Math.floor(Math.random()*this.pl.length);
    this.bombTimer=this.newFuse();
    this.passed=[];
    this.out=this.pl.map(()=>false);
    this.passCD=this.pl.map(()=>0);
    this.ps=this.pl.map((_,i)=>{
      const ang=i*(Math.PI*2/this.pl.length);
      return{x:this.W/2+Math.cos(ang)*100,y:this.H/2+Math.sin(ang)*100,
        vx:0,vy:0,r:18};
    });
  }
  newFuse(){return 4+Math.random()*4;}
  update(dt){
    super.update(dt);
    const sp=480;
    this.pl.forEach((_,i)=>{
      if(this.out[i])return;
      const p=this.ps[i];const k=this.pl[i].keys;
      const ax=(KD[k.right]?1:0)-(KD[k.left]?1:0);
      const ay=(KD[k.down]?1:0)-(KD[k.up]?1:0);
      const l=Math.sqrt(ax*ax+ay*ay)||1;
      p.vx=ax/l*sp;p.vy=ay/l*sp;
      p.x+=p.vx*dt;p.y+=p.vy*dt;
      p.x=Math.max(p.r,Math.min(this.W-p.r,p.x));
      p.y=Math.max(p.r,Math.min(this.H-p.r,p.y));
      // pass with action
      if(this.passCD[i]>0)this.passCD[i]-=dt;
      if(i===this.holder&&KD[k.action]&&this.passCD[i]<=0){
        // find nearest player
        let bestD=Infinity,bestJ=-1;
        this.ps.forEach((q,j)=>{
          if(j===i||this.out[j])return;
          const d=Math.hypot(p.x-q.x,p.y-q.y);
          if(d<bestD){bestD=d;bestJ=j;}
        });
        if(bestJ>=0&&bestD<180){this.holder=bestJ;this.passCD[i]=0.5;}
      }
    });
    // bomb countdown
    if(!this.out[this.holder]){
      this.bombTimer-=dt;
      if(this.bombTimer<=0){
        this.out[this.holder]=true;
        const alive=this.pl.filter((_,i)=>!this.out[i]);
        if(alive.length<=1){
          const wi=this.out.findIndex(o=>!o);
          this.endGame(wi,this.out.map(o=>o?0:3));return;
        }
        this.holder=this.out.findIndex(o=>!o);
        this.bombTimer=this.newFuse()*0.7;
      }
    }
  }
  timeUp(){const wi=this.out.findIndex(o=>!o);this.endGame(wi>=0?wi:(this._lastSurvivor>=0?this._lastSurvivor:0),this.out.map(o=>o?0:3));}
  draw(){
    const{cx,W,H}=this;
    cx.fillStyle='#1a1a2e';cx.fillRect(0,0,W,H);
    const PCOLS=['#ff4757','#2ed573','#ffa502','#1e90ff'];
    // bomb timer ring
    const pct=this.bombTimer/8;
    cx.strokeStyle='rgba(255,255,255,0.1)';cx.lineWidth=8;
    cx.beginPath();cx.arc(W/2,H/2,40,0,Math.PI*2);cx.stroke();
    cx.strokeStyle=pct<0.3?'#ff4757':'#ffd32a';cx.lineWidth=8;
    cx.beginPath();cx.arc(W/2,H/2,40,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);cx.stroke();
    cx.fillStyle='#fff';cx.font='bold 16px Fredoka One';cx.textAlign='center';
    cx.fillText(Math.ceil(this.bombTimer)+'s',W/2,H/2+6);
    // players
    this.ps.forEach((p,i)=>{
      if(this.out[i]){
        cx.globalAlpha=0.2;
      }
      const isHolder=i===this.holder;
      cx.fillStyle=PCOLS[i];cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();
      if(isHolder){
        // bomb on holder
        cx.fillStyle='#222';cx.beginPath();cx.arc(p.x,p.y-p.r-10,10,0,Math.PI*2);cx.fill();
        cx.strokeStyle='#ffd32a';cx.lineWidth=2;
        cx.beginPath();cx.moveTo(p.x,p.y-p.r-20);cx.lineTo(p.x+8,p.y-p.r-32);cx.stroke();
        if(this.bombTimer<2){
          cx.fillStyle=`rgba(255,${Math.floor(Math.sin(this.timer*20)*127+128)},0,0.8)`;
          cx.beginPath();cx.arc(p.x,p.y-p.r-10,12,0,Math.PI*2);cx.fill();
        }
      }
      cx.fillStyle='#fff';cx.font='bold 11px Nunito';cx.textAlign='center';
      cx.fillText('P'+(i+1),p.x,p.y+4);
      cx.globalAlpha=1;
    });
    const el=document.getElementById('gameTimer');
    if(el)el.textContent='💣 '+Math.ceil(Math.max(0,this.maxTime-this.timer))+'s';
  }
}

class TagGame extends BaseGame{
  init(){
    this.maxTime=35;
    this.it=0;
    this.tagCD=0;
    // Track time each player spent as IT (bad) and NOT IT (good)
    this.itTime=this.pl.map(()=>0);  // seconds spent as IT
    this.ps=this.pl.map((_,i)=>{
      const ang=i*(Math.PI*2/this.pl.length);
      return{x:this.W/2+Math.cos(ang)*120,y:this.H/2+Math.sin(ang)*120,vx:0,vy:0,r:18};
    });
  }
  update(dt){
    super.update(dt);
    this.tagCD=Math.max(0,this.tagCD-dt);
    const spBase=520;
    this.pl.forEach((_,i)=>{
      const p=this.ps[i];const k=this.pl[i].keys;
      const ax=(KD[k.right]?1:0)-(KD[k.left]?1:0);
      const ay=(KD[k.down]?1:0)-(KD[k.up]?1:0);
      const l=Math.sqrt(ax*ax+ay*ay)||1;
      const sp=i===this.it?spBase*0.82:spBase;
      if(ax||ay){p.vx=ax/l*sp;p.vy=ay/l*sp;}
      else{p.vx*=0.15;p.vy*=0.15;}
      p.x+=p.vx*dt;p.y+=p.vy*dt;
      p.x=Math.max(p.r,Math.min(this.W-p.r,p.x));
      p.y=Math.max(p.r,Math.min(this.H-p.r,p.y));
    });
    // Track IT time
    this.itTime[this.it]+=dt;
    // tag check — snapshot current it to avoid mid-loop mutation
    if(this.tagCD<=0){
      const currentIt=this.it;
      const itPos=this.ps[currentIt];
      let tagged=-1;
      this.ps.forEach((p,i)=>{
        if(i===currentIt||tagged>=0)return;
        if(Math.hypot(p.x-itPos.x,p.y-itPos.y)<itPos.r+p.r+4){
          tagged=i;
        }
      });
      if(tagged>=0){this.it=tagged;this.tagCD=0.8;}
    }
  }
  timeUp(){
    // Winner = least time as IT
    const minIT=Math.min(...this.itTime);
    const wi=this.itTime.indexOf(minIT);
    const maxIT=Math.max(...this.itTime)||1;
    const pts=this.itTime.map(t=>Math.round((1-t/maxIT)*8));
    pts[wi]=8;
    this.endGame(wi,pts);
  }
  draw(){
    const{cx,W,H}=this;
    cx.fillStyle='#1a1a2e';cx.fillRect(0,0,W,H);
    // floor pattern
    cx.fillStyle='#1e1e38';
    for(let x=0;x<W;x+=50)for(let y=0;y<H;y+=50)
      cx.fillRect(x,y,25,25);
    const PCOLS=['#ff4757','#2ed573','#ffa502','#1e90ff'];
    this.ps.forEach((p,i)=>{
      const isIt=i===this.it;
      // shadow
      cx.fillStyle='rgba(0,0,0,0.3)';cx.beginPath();cx.ellipse(p.x,p.y+p.r,p.r,p.r*0.4,0,0,Math.PI*2);cx.fill();
      // dark outline so players are always visible against any bg
      cx.fillStyle='rgba(0,0,0,0.6)';cx.beginPath();cx.arc(p.x,p.y,p.r+3,0,Math.PI*2);cx.fill();
      cx.fillStyle=PCOLS[i];cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();
      if(isIt){
        // "IT" crown
        cx.fillStyle='#ffd32a';
        cx.font='bold 14px Nunito';cx.textAlign='center';
        cx.fillText('👑 IT',p.x,p.y-p.r-6);
        cx.strokeStyle='#ffd32a';cx.lineWidth=3;
        cx.beginPath();cx.arc(p.x,p.y,p.r+4,0,Math.PI*2);cx.stroke();
      }
      cx.fillStyle='#fff';cx.font='bold 11px Nunito';cx.textAlign='center';
      cx.fillText('P'+(i+1),p.x,p.y+4);
      // show time as IT
      cx.fillStyle=PCOLS[i];cx.font='12px Nunito';
      cx.fillText(Math.round(this.itTime[i])+'s⚡',p.x,p.y+p.r+14);
    });
    const el=document.getElementById('gameTimer');
    if(el)el.textContent=Math.ceil(Math.max(0,this.maxTime-this.timer))+'s';
  }
}

class CannonGame extends BaseGame{
  init(){
    this.maxTime=40;
    // each player has a cannon in a corner
    const corners=[[0.1,0.15],[0.9,0.15],[0.1,0.85],[0.9,0.85]];
    this.cannons=this.pl.map((_,i)=>({
      x:this.W*corners[i][0],y:this.H*corners[i][1],
      ang:Math.PI/4*(i<2?1:-1)*(i%2===0?1:-1)+Math.PI/4,
      cd:0,hp:5,pts:0,r:20
    }));
    this.balls=[];
  }
  update(dt){
    super.update(dt);
    this.pl.forEach((_,i)=>{
      const c=this.cannons[i];const k=this.pl[i].keys;
      c.cd=Math.max(0,c.cd-dt);
      if(KD[k.left])c.ang-=2.5*dt;
      if(KD[k.right])c.ang+=2.5*dt;
      if(KD[k.action]&&c.cd<=0&&c.hp>0){
        c.cd=0.55;
        const spd=680;
        this.balls.push({x:c.x,y:c.y,vx:Math.cos(c.ang)*spd,vy:Math.sin(c.ang)*spd,owner:i,r:7,life:3});
      }
    });
    // move balls
    this.balls=this.balls.filter(b=>{
      b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
      if(b.x<0||b.x>this.W){b.vx*=-1;b.x=Math.max(0,Math.min(this.W,b.x));}
      if(b.y<0||b.y>this.H){b.vy*=-1;b.y=Math.max(0,Math.min(this.H,b.y));}
      // hit cannons
      this.cannons.forEach((c,i)=>{
        if(i===b.owner||c.hp<=0)return;
        if(Math.hypot(b.x-c.x,b.y-c.y)<b.r+c.r+8){
          c.hp--;this.cannons[b.owner].pts+=2;
          b.life=-1;
          if(c.hp<=0){this.cannons[b.owner].pts+=5;this.checkEnd();}
        }
      });
      return b.life>0;
    });
    const el=document.getElementById('gameTimer');
    if(el)el.textContent=Math.ceil(Math.max(0,this.maxTime-this.timer))+'s';
  }
  checkEnd(){
    const alive=this.cannons.filter(c=>c.hp>0);
    if(alive.length<=1){
      const wi=this.cannons.findIndex(c=>c.hp>0);
      this.endGame(wi,this.cannons.map(c=>Math.round(c.pts)));
    }
  }
  timeUp(){const mx=Math.max(...this.cannons.map(c=>c.pts));this.endGame(this.cannons.findIndex(c=>c.pts===mx),this.cannons.map(c=>Math.round(c.pts)));}
  draw(){
    const{cx,W,H}=this;
    cx.fillStyle='#1a1a1a';cx.fillRect(0,0,W,H);
    // grid
    cx.strokeStyle='rgba(255,255,255,0.05)';cx.lineWidth=1;
    for(let x=0;x<W;x+=40){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
    for(let y=0;y<H;y+=40){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
    const PCOLS=['#ff4757','#2ed573','#ffa502','#1e90ff'];
    // balls
    this.balls.forEach(b=>{
      cx.fillStyle=PCOLS[b.owner];cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fill();
      cx.fillStyle='rgba(255,255,255,0.4)';cx.beginPath();cx.arc(b.x-2,b.y-2,b.r*0.4,0,Math.PI*2);cx.fill();
    });
    // cannons
    this.cannons.forEach((c,i)=>{
      cx.save();cx.translate(c.x,c.y);
      // base
      cx.fillStyle=c.hp>0?PCOLS[i]:'#444';cx.beginPath();cx.arc(0,0,c.r,0,Math.PI*2);cx.fill();
      // barrel
      if(c.hp>0){
        cx.rotate(c.ang);
        cx.fillStyle=PCOLS[i];cx.fillRect(0,-5,c.r+12,10);
        cx.fillStyle='#333';cx.fillRect(c.r+8,-3,4,6);
      }else{
        cx.fillStyle='rgba(255,255,255,0.3)';cx.font='16px Nunito';cx.textAlign='center';cx.fillText('💀',0,6);
      }
      cx.restore();
      // hp hearts
      for(let h=0;h<c.hp;h++){
        cx.fillStyle='#ff4757';cx.font='9px Nunito';cx.textAlign='left';
        cx.fillText('♥',c.x-18+h*10,c.y+c.r+14);
      }
      cx.fillStyle='#fff';cx.font='11px Nunito';cx.textAlign='center';
      cx.fillText('P'+(i+1),c.x,c.y+4);
    });
  }
}

class ShrinkZone extends BaseGame{
  init(){
    this.maxTime=45;
    this.zoneR=Math.min(this.W,this.H)*0.45;
    this.zoneX=this.W/2;this.zoneY=this.H/2;
    this.lives=this.pl.map(()=>4);
    this.ps=this.pl.map((_,i)=>{
      const ang=i*(Math.PI*2/this.pl.length);
      return{x:this.W/2+Math.cos(ang)*80,y:this.H/2+Math.sin(ang)*80,vx:0,vy:0,r:16,dmgCD:0};
    });
    this.phase=0;
  }
  update(dt){
    super.update(dt);
    // zone shrinks
    const target=Math.min(this.W,this.H)*0.45*Math.max(0.12,1-this.timer/this.maxTime*0.9);
    this.zoneR+=(target-this.zoneR)*dt*1.2;
    const sp=500;
    this.pl.forEach((_,i)=>{
      if(this.lives[i]<=0)return;
      const p=this.ps[i];const k=this.pl[i].keys;
      const ax=(KD[k.right]?1:0)-(KD[k.left]?1:0);
      const ay=(KD[k.down]?1:0)-(KD[k.up]?1:0);
      const l=Math.sqrt(ax*ax+ay*ay)||1;
      p.vx=ax/l*sp;p.vy=ay/l*sp;
      p.x+=p.vx*dt;p.y+=p.vy*dt;
      p.x=Math.max(p.r,Math.min(this.W-p.r,p.x));
      p.y=Math.max(p.r,Math.min(this.H-p.r,p.y));
      // outside zone damage
      const dz=Math.hypot(p.x-this.zoneX,p.y-this.zoneY);
      if(dz>this.zoneR-p.r){
        p.dmgCD-=dt;
        if(p.dmgCD<=0){p.dmgCD=0.7;this.lives[i]--;}
      }
    });
    // player collisions = knockback
    for(let a=0;a<this.ps.length;a++)for(let b=a+1;b<this.ps.length;b++){
      const pa=this.ps[a],pb=this.ps[b];
      if(this.lives[a]<=0||this.lives[b]<=0)continue;
      const d=Math.hypot(pa.x-pb.x,pa.y-pb.y);
      if(d<pa.r+pb.r){
        const nx=(pb.x-pa.x)/d,ny=(pb.y-pa.y)/d;
        pa.vx-=nx*200;pa.vy-=ny*200;pb.vx+=nx*200;pb.vy+=ny*200;
        const ov=(pa.r+pb.r-d)/2;pa.x-=nx*ov;pa.y-=ny*ov;pb.x+=nx*ov;pb.y+=ny*ov;
      }
    }
    const alive=this.lives.filter(l=>l>0);
    if(alive.length<=1){
      const wi=this.lives.findIndex(l=>l>0);
      this.endGame(wi,this.lives.map(l=>Math.max(0,l)));
    }
  }
  timeUp(){const mx=Math.max(...this.lives);this.endGame(this.lives.indexOf(mx),this.lives.map(l=>Math.max(0,l)));}
  draw(){
    const{cx,W,H}=this;
    // outside is red/dark
    cx.fillStyle='#2d0000';cx.fillRect(0,0,W,H);
    // safe zone
    cx.fillStyle='#0f2a1f';cx.beginPath();cx.arc(this.zoneX,this.zoneY,this.zoneR,0,Math.PI*2);cx.fill();
    // zone border (pulsing danger)
    const pulse=0.5+Math.sin(this.timer*6)*0.5;
    cx.strokeStyle=`rgba(255,${Math.floor(pulse*80)},0,0.8)`;cx.lineWidth=4+pulse*4;
    cx.beginPath();cx.arc(this.zoneX,this.zoneY,this.zoneR,0,Math.PI*2);cx.stroke();
    // danger text outside
    cx.fillStyle='rgba(255,60,0,0.25)';cx.font='bold 18px Fredoka One';cx.textAlign='center';
    cx.fillText('⚠ ZONA DE PERIGO',W/2,20);
    const PCOLS=['#ff4757','#2ed573','#ffa502','#1e90ff'];
    this.ps.forEach((p,i)=>{
      const dead=this.lives[i]<=0;
      if(dead){cx.globalAlpha=0.2;}
      const outzone=Math.hypot(p.x-this.zoneX,p.y-this.zoneY)>this.zoneR-p.r;
      cx.fillStyle=outzone&&!dead?'#ff4757':PCOLS[i];
      cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';cx.font='bold 10px Nunito';cx.textAlign='center';
      cx.fillText('P'+(i+1),p.x,p.y+4);
      // hearts
      cx.globalAlpha=1;
      for(let h=0;h<this.lives[i];h++){
        cx.fillStyle='#ff4757';cx.font='9px Nunito';
        cx.fillText('♥',p.x-12+h*9,p.y-p.r-6);
      }
    });
    const el=document.getElementById('gameTimer');
    if(el)el.textContent=Math.ceil(Math.max(0,this.maxTime-this.timer))+'s';
  }
}

class TicTacToe extends BaseGame{
  init(){
    this.maxTime=60;
    this.grid=Array(9).fill(-1);
    this.turn=0;
    this.selected=0;
    this.moveCD=0;
    this.winner=-2;
    this.winLine=null;
    this.scores=this.pl.map(()=>0);
    this.rounds=0;
    this.maxRounds=3;
  }
  getTeam(i){return i%2;}
  checkWinner(){
    const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(const line of wins){
      const [a,b,c]=line;
      if(this.grid[a]>=0&&this.grid[a]===this.grid[b]&&this.grid[b]===this.grid[c]){
        return{team:this.grid[a],line};
      }
    }
    if(this.grid.every(v=>v>=0))return{team:-1,line:null};
    return null;
  }
  update(dt){
    super.update(dt);
    this.moveCD=Math.max(0,this.moveCD-dt);
    if(this.winner>=-1)return;
    const k=this.pl[this.turn].keys;
    if(this.moveCD<=0){
      if(KD[k.right]){this.selected=(this.selected+1)%9;this.moveCD=0.18;}
      if(KD[k.left]){this.selected=(this.selected+8)%9;this.moveCD=0.18;}
      if(KD[k.down]){this.selected=(this.selected+3)%9;this.moveCD=0.18;}
      if(KD[k.up]){this.selected=(this.selected+6)%9;this.moveCD=0.18;}
      if(KD[k.action]&&this.grid[this.selected]<0){
        this.grid[this.selected]=this.getTeam(this.turn);
        const res=this.checkWinner();
        if(res){
          this.winner=res.team;this.winLine=res.line;
          this.rounds++;
          if(res.team>=0){
            this.pl.forEach((_,i)=>{if(this.getTeam(i)===res.team)this.scores[i]+=3;});
          }
          setTimeout(()=>{
            if(this.rounds<this.maxRounds){this.grid=Array(9).fill(-1);this.winner=-2;this.winLine=null;this.turn=0;}
            else{const mx=Math.max(...this.scores);this.endGame(this.scores.indexOf(mx),this.scores);}
          },1500);
        }else{
          // next player's turn
          let next=(this.turn+1)%this.pl.length;
          // make sure both teams get turns
          this.turn=next;
          this.moveCD=0.2;
        }
      }
    }
  }
  timeUp(){const mx=Math.max(...this.scores);this.endGame(this.scores.indexOf(mx),this.scores);}
  draw(){
    const{cx,W,H}=this;
    cx.fillStyle='#1a1a2e';cx.fillRect(0,0,W,H);
    const PCOLS=['#ff4757','#2ed573','#ffa502','#1e90ff'];
    const TCOLS=['#ff4757','#1e90ff'];
    const sz=Math.min(W,H)*0.55;
    const ox=(W-sz)/2,oy=(H-sz)/2+10;
    const cell=sz/3;
    // grid lines
    cx.strokeStyle='rgba(255,255,255,0.4)';cx.lineWidth=3;
    for(let i=1;i<3;i++){
      cx.beginPath();cx.moveTo(ox+cell*i,oy);cx.lineTo(ox+cell*i,oy+sz);cx.stroke();
      cx.beginPath();cx.moveTo(ox,oy+cell*i);cx.lineTo(ox+sz,oy+cell*i);cx.stroke();
    }
    // cells
    for(let idx=0;idx<9;idx++){
      const gx=ox+(idx%3)*cell,gy=oy+Math.floor(idx/3)*cell;
      const cx2=gx+cell/2,cy2=gy+cell/2;
      // hover
      if(idx===this.selected&&this.winner<-1){
        cx.fillStyle='rgba(255,255,255,0.08)';cx.fillRect(gx+2,gy+2,cell-4,cell-4);
      }
      if(this.grid[idx]>=0){
        const team=this.grid[idx];
        cx.strokeStyle=TCOLS[team];cx.lineWidth=5;
        if(team===0){
          // X
          const m=cell*0.25;
          cx.beginPath();cx.moveTo(gx+m,gy+m);cx.lineTo(gx+cell-m,gy+cell-m);cx.stroke();
          cx.beginPath();cx.moveTo(gx+cell-m,gy+m);cx.lineTo(gx+m,gy+cell-m);cx.stroke();
        }else{
          // O
          cx.beginPath();cx.arc(cx2,cy2,cell*0.3,0,Math.PI*2);cx.stroke();
        }
      }
    }
    // win line
    if(this.winLine){
      const [a,b,c]=this.winLine;
      const ax=ox+(a%3)*cell+cell/2,ay=oy+Math.floor(a/3)*cell+cell/2;
      const bx=ox+(c%3)*cell+cell/2,by=oy+Math.floor(c/3)*cell+cell/2;
      cx.strokeStyle='#ffd32a';cx.lineWidth=6;cx.beginPath();cx.moveTo(ax,ay);cx.lineTo(bx,by);cx.stroke();
    }
    // info
    cx.fillStyle='rgba(255,255,255,0.6)';cx.font='13px Nunito';cx.textAlign='center';
    cx.fillText(`Round ${this.rounds+1}/${this.maxRounds}`,W/2,oy-16);
    if(this.winner>=-1){
      const msg=this.winner<0?'EMPATE!':`EQUIPE ${this.winner+1} VENCEU!`;
      cx.fillStyle=this.winner>=0?TCOLS[this.winner]:'#ffd32a';
      cx.font='bold 22px Fredoka One';cx.fillText(msg,W/2,H-20);
    }else{
      const team=this.getTeam(this.turn);
      cx.fillStyle=TCOLS[team];cx.font='bold 14px Fredoka One';
      cx.fillText('Turno: Equipe '+(team+1)+' (P'+(this.turn+1)+')',W/2,H-20);
    }
    // scores
    this.pl.forEach((_,i)=>{
      cx.fillStyle=PCOLS[i];cx.font='bold 13px Nunito';cx.textAlign='left';
      cx.fillText('P'+(i+1)+' '+this.scores[i]+'pts',8+i*70,16);
    });
    const el=document.getElementById('gameTimer');
    if(el)el.textContent=Math.ceil(Math.max(0,this.maxTime-this.timer))+'s';
  }
}

class ReflexGame extends BaseGame{
  init(){
    this.maxTime=45;
    this.scores=this.pl.map(()=>0);
    this.phase='wait';// wait, show, input
    this.seq=[];this.seqLen=3;
    this.showing=-1;this.showIdx=0;this.showTimer=0;
    this.inputIdx=0;this.pInputs=this.pl.map(()=>null);
    this.pPressed=this.pl.map(()=>false);
    this.feedback=this.pl.map(()=>null);
    this.fbTimer=0;
    this.phaseTimer=0;
    this.DIRS=['up','down','left','right'];
    this.genSeq();
  }
  genSeq(){
    this.seq=Array(this.seqLen).fill(0).map(()=>this.DIRS[Math.floor(Math.random()*4)]);
    this.phase='show';this.showIdx=0;this.showTimer=0.7;
    this.inputIdx=0;this.pInputs=this.pl.map(()=>null);
    this.pPressed=this.pl.map(()=>false);
  }
  update(dt){
    super.update(dt);
    this.fbTimer=Math.max(0,this.fbTimer-dt);
    if(this.phase==='show'){
      this.showTimer-=dt;
      if(this.showTimer<=0){
        this.showIdx++;
        if(this.showIdx>=this.seq.length){this.phase='input';}
        else this.showTimer=0.6;
      }
    }else if(this.phase==='input'){
      this.pl.forEach((_,i)=>{
        if(this.pInputs[i]!==null)return;
        const k=this.pl[i].keys;
        const dir=KD[k.up]?'up':KD[k.down]?'down':KD[k.left]?'left':KD[k.right]?'right':null;
        if(dir&&!this.pPressed[i]){
          this.pPressed[i]=true;
          this.pInputs[i]=dir;
          this.pPressed[i]=dir;
        }
        if(!KD[k.up]&&!KD[k.down]&&!KD[k.left]&&!KD[k.right])this.pPressed[i]=false;
      });
      // check if all players answered current step
      const expected=this.seq[this.inputIdx];
      const answered=this.pInputs.filter(p=>p!==null).length;
      if(answered===this.pl.length||this.phaseTimer>3){
        // score
        this.pInputs.forEach((inp,i)=>{
          if(inp===expected)this.scores[i]+=2;
          else if(inp!==null)this.scores[i]=Math.max(0,this.scores[i]-1);
          this.feedback[i]=inp===expected?'✓':'✗';
        });
        this.fbTimer=0.8;this.pInputs=this.pl.map(()=>null);this.phaseTimer=0;
        this.inputIdx++;
        if(this.inputIdx>=this.seq.length){
          // next round, longer seq
          setTimeout(()=>{this.seqLen=Math.min(this.seqLen+1,6);this.genSeq();},1000);
          this.phase='wait';
        }
      }
      this.phaseTimer+=dt;
    }
  }
  timeUp(){const mx=Math.max(...this.scores);this.endGame(this.scores.indexOf(mx),this.scores);}
  draw(){
    const{cx,W,H}=this;
    cx.fillStyle='#0d0d1a';cx.fillRect(0,0,W,H);
    const PCOLS=['#ff4757','#2ed573','#ffa502','#1e90ff'];
    const ARROWS={up:'↑',down:'↓',left:'←',right:'→'};
    // sequence display
    cx.fillStyle='rgba(255,255,255,0.7)';cx.font='bold 15px Fredoka One';cx.textAlign='center';
    if(this.phase==='show'){
      cx.fillText('MEMORIZE A SEQUÊNCIA',W/2,H*0.12);
      this.seq.forEach((d,idx)=>{
        const showing=idx<this.showIdx||(idx===this.showIdx&&this.showTimer>0.2);
        cx.fillStyle=showing?'#ffd32a':'rgba(255,255,255,0.15)';
        cx.font='bold 32px Nunito';
        cx.fillText(showing?ARROWS[d]:'?',W/2+(idx-this.seq.length/2+0.5)*50,H*0.35);
      });
    }else if(this.phase==='input'){
      cx.fillStyle='#2ed573';cx.fillText('APERTE: '+ARROWS[this.seq[this.inputIdx]],W/2,H*0.12);
      // progress dots
      this.seq.forEach((_,idx)=>{
        cx.fillStyle=idx<this.inputIdx?'#2ed573':idx===this.inputIdx?'#ffd32a':'rgba(255,255,255,0.2)';
        cx.beginPath();cx.arc(W/2+(idx-this.seq.length/2+0.5)*30,H*0.22,8,0,Math.PI*2);cx.fill();
      });
    }else{
      cx.fillStyle='#ffd32a';cx.font='bold 20px Fredoka One';cx.textAlign='center';
      cx.fillText('PREPARE-SE!',W/2,H*0.25);
    }
    // player status
    const slotW=Math.min(160,(W-20)/this.pl.length);
    this.pl.forEach((_,i)=>{
      const sx=W/2+(i-this.pl.length/2+0.5)*slotW;
      const sy=H*0.6;
      cx.fillStyle=PCOLS[i];cx.beginPath();cx.roundRect(sx-slotW/2+4,sy,slotW-8,80,10);cx.fill();
      cx.fillStyle='#fff';cx.font='bold 13px Nunito';cx.textAlign='center';
      cx.fillText('P'+(i+1),sx,sy+20);
      cx.font='bold 24px Nunito';
      if(this.fbTimer>0&&this.feedback[i]){
        cx.fillStyle=this.feedback[i]==='✓'?'#ffd32a':'#ff4757';
        cx.fillText(this.feedback[i],sx,sy+52);
      }
      cx.fillStyle='#fff';cx.font='16px Nunito';
      cx.fillText(this.scores[i]+'pts',sx,sy+75);
    });
    const el=document.getElementById('gameTimer');
    if(el)el.textContent=Math.ceil(Math.max(0,this.maxTime-this.timer))+'s';
  }
}

class MiniGolf extends BaseGame{
  init(){
    this.maxTime=60;
    this.hole={x:this.W*0.75,y:this.H*0.45,r:14};
    this.balls=this.pl.map((_,i)=>{
      const ang=i*(Math.PI*2/this.pl.length);
      return{x:this.W*0.25+Math.cos(ang)*30,y:this.H*0.5+Math.sin(ang)*30,vx:0,vy:0,strokes:0,inHole:false,power:0,charging:false,ang:0};
    });
    this.walls=[
      {x:this.W*0.35,y:this.H*0.2,w:8,h:this.H*0.3},
      {x:this.W*0.55,y:this.H*0.5,w:8,h:this.H*0.3},
    ];
    this.par=5;
  }
  update(dt){
    super.update(dt);
    this.pl.forEach((_,i)=>{
      const b=this.balls[i];if(b.inHole)return;
      const k=this.pl[i].keys;
      const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
      if(spd<5){
        // aim
        if(KD[k.left])b.ang-=2.5*dt;
        if(KD[k.right])b.ang+=2.5*dt;
        // charge
        if(KD[k.action]){b.charging=true;b.power=Math.min(b.power+dt*0.9,1);}
        else if(b.charging){
          const shotSpd=b.power*600;
          b.vx=Math.cos(b.ang)*shotSpd;b.vy=Math.sin(b.ang)*shotSpd;
          b.strokes++;b.power=0;b.charging=false;
        }
      }
      // physics
      b.vx*=0.96;b.vy*=0.96;
      b.x+=b.vx*dt;b.y+=b.vy*dt;
      // walls
      b.x=Math.max(12,Math.min(this.W-12,b.x));
      b.y=Math.max(12,Math.min(this.H-12,b.y));
      if(b.x<=12||b.x>=this.W-12)b.vx*=-0.7;
      if(b.y<=12||b.y>=this.H-12)b.vy*=-0.7;
      // obstacle walls
      this.walls.forEach(w=>{
        if(b.x+10>w.x&&b.x-10<w.x+w.w&&b.y+10>w.y&&b.y-10<w.y+w.h){
          const dl=Math.abs(b.x-(w.x)),dr=Math.abs(b.x-(w.x+w.w));
          const dt2=Math.abs(b.y-(w.y)),db=Math.abs(b.y-(w.y+w.h));
          const m=Math.min(dl,dr,dt2,db);
          if(m===dl){b.x=w.x-11;b.vx*=-0.7;}
          else if(m===dr){b.x=w.x+w.w+11;b.vx*=-0.7;}
          else if(m===dt2){b.y=w.y-11;b.vy*=-0.7;}
          else{b.y=w.y+w.h+11;b.vy*=-0.7;}
        }
      });
      // hole check
      if(Math.hypot(b.x-this.hole.x,b.y-this.hole.y)<this.hole.r){b.inHole=true;b.vx=0;b.vy=0;}
    });
    if(this.balls.every(b=>b.inHole)){
      const mn=Math.min(...this.balls.map(b=>b.strokes));
      const wi=this.balls.findIndex(b=>b.strokes===mn);
      const pts=this.balls.map(b=>Math.max(0,this.par-b.strokes+2));
      this.endGame(wi,pts);
    }
  }
  timeUp(){
    const mn=Math.min(...this.balls.map(b=>b.inHole?b.strokes:999));
    const wi=this.balls.findIndex(b=>b.strokes===mn&&b.inHole)||(()=>{const s=this.balls.map(b=>b.strokes);return s.indexOf(Math.min(...s));})();
    this.endGame(wi,this.balls.map(b=>Math.max(0,this.par-b.strokes+2)));
  }
  draw(){
    const{cx,W,H}=this;
    // green
    cx.fillStyle='#2d6a2d';cx.fillRect(0,0,W,H);
    cx.fillStyle='#265c26';
    for(let x=0;x<W;x+=30)for(let y=0;y<H;y+=30)
      if((x+y)/30%2===0)cx.fillRect(x,y,30,30);
    // walls of course
    cx.strokeStyle='#a0522d';cx.lineWidth=12;cx.strokeRect(6,6,W-12,H-12);
    // obstacles
    cx.fillStyle='#8B4513';
    this.walls.forEach(w=>cx.fillRect(w.x,w.y,w.w,w.h));
    // hole
    cx.fillStyle='#111';cx.beginPath();cx.arc(this.hole.x,this.hole.y,this.hole.r,0,Math.PI*2);cx.fill();
    cx.fillStyle='#ff4757';cx.fillRect(this.hole.x,this.hole.y-32,3,22);
    cx.fillStyle='#fff';cx.font='14px Nunito';cx.textAlign='left';
    cx.fillText('⛳',this.hole.x-2,this.hole.y-12);
    // balls
    const PCOLS=['#ff4757','#2ed573','#ffa502','#1e90ff'];
    this.balls.forEach((b,i)=>{
      if(b.inHole)return;
      // aim line
      if(Math.sqrt(b.vx*b.vx+b.vy*b.vy)<5){
        const aimLen=(20+b.power*80);
        cx.strokeStyle=`rgba(255,255,255,${0.3+b.power*0.5})`;cx.lineWidth=2;cx.setLineDash([4,4]);
        cx.beginPath();cx.moveTo(b.x,b.y);
        cx.lineTo(b.x+Math.cos(b.ang)*aimLen,b.y+Math.sin(b.ang)*aimLen);cx.stroke();
        cx.setLineDash([]);
        // power bar
        if(b.charging){
          cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(b.x-20,b.y-30,40,8);
          cx.fillStyle=`hsl(${120-b.power*120},100%,50%)`;cx.fillRect(b.x-20,b.y-30,40*b.power,8);
        }
      }
      cx.fillStyle=PCOLS[i];cx.beginPath();cx.arc(b.x,b.y,10,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';cx.font='bold 9px Nunito';cx.textAlign='center';cx.fillText(b.strokes,b.x,b.y+4);
      cx.fillStyle=PCOLS[i];cx.font='11px Nunito';cx.textAlign='center';
      cx.fillText('P'+(i+1)+' '+b.strokes+'🏌️',b.x,b.y-14);
    });
    const el=document.getElementById('gameTimer');
    if(el)el.textContent=Math.ceil(Math.max(0,this.maxTime-this.timer))+'s';
  }
}

    tutDesc:{controls:'Cada jogador usa seu próprio conjunto de teclas. Todos os jogos usam as mesmas teclas — aprenda uma vez, jogue para sempre!',sumo:'Empurre os adversários para FORA do círculo. Cada jogador tem 3 vidas. Colida em alta velocidade para empurrar mais forte. Último dentro vence!',collect:'Colete o máximo de itens possível no tempo! ⭐ = 1 ponto, 🪙 = 2 pontos, 💰 = 5 pontos. Mais pontos = vence!',race:'Chegue à linha de chegada primeiro! Desvie das pedras no caminho. Quanto mais à direita estiver, mais próximo da vitória!',laststand:'Projéteis surgem de todos os lados — desvie! Cada vez que for atingido perde 1 ponto. Sobreviva mais tempo que os outros!',icerink:'Arena escorregadia! Você DESLIZA sem parar. Use isso a seu favor para ganhar impulso e empurrar os outros para fora do círculo!',tug:'Time par vs time ímpar. Pressione [AÇÃO] o mais rápido possível para puxar a corda para o seu lado. Puxe até o nó passar da linha!',soccer:'1v1 ou 2v2! Times esquerda vs direita. Pressione [AÇÃO] para chutar a bola com mais força. Marque 3 gols para vencer!',paint:'Corra pelo mapa e pinte o chão com sua cor! O jogador que cobrir MAIS área ao final do tempo vence. Passe por cima da cor dos outros para repintar!',king:'Fique dentro da zona dourada para acumular tempo. O jogador com mais tempo dentro ao fim vence. Empurre os outros para fora!',volley:'Dois lados, uma quadra. Não deixe a bola cair no seu lado! A bola fica mais rápida com o tempo — fique alerta e mova-se rápido!',bounce:'Cada jogador tem uma raquete em uma parede. Use ← → ou ↑ ↓ para mover a raquete. Se a bola passar por você, perde 1 vida. Surgem mais bolas ao longo do jogo!',zombie:'Um jogador começa como zumbi (verde). Toque nos humanos para infectá-los — eles viram zumbis! O último humano vivo ganha. Humanos são mais rápidos!',asteroid:'Nave espacial no espaço! ← → para girar, ↑ para propulsão, [AÇÃO] para atirar. Destrua asteróides = pontos. Cuidado com colisões!',snake:'Guie sua cobra para comer comida e crescer. Colidir com a parede ou com outra cobra = game over. Cobra mais longa e com mais pontos vence!',gravity:'Nave em gravidade zero: ← → para girar, ↑ para propulsão. Pegue a bandeira 🚩 e segure pelo maior tempo. Quem tiver a bandeira acumula 1★ por segundo!',hotfloor:'A lava SOBE continuamente! Pule entre as plataformas com ↑ ou [AÇÃO]. Cair na lava perde 1 vida. A lava sobe mais rápido com o tempo!',duel:'← → para girar a mira, ↑ ↓ para mover, [AÇÃO] para atirar. Cada carregador tem 3 balas — recarga automática após 3s. As balas ricocheteiam nas paredes!',balloon:'Cada jogador tem um balão colorido voando acima. Pressione [AÇÃO] para disparar uma agulha. Estoure o balão dos outros para eliminá-los! Último com balão vence.',dash:'Pressione [AÇÃO] para um dash relâmpago na direção do movimento. Atropele os adversários para tirar vidas! Há cooldown após cada dash — espere o ícone recarregar.',builder:'Pressione [AÇÃO] para construir um muro atrás de você. Cerque os inimigos para eliminar — se 3 lados tiverem muros de outros, você é eliminado!',punch:'Segure [AÇÃO] para carregar o soco — barra aparece acima. Quanto mais carregar (até 100%), mais forte a onda de impacto ao redor! Jogadores atingidos com carga >60% perdem vida!',iceblock:'Blocos de gelo deslizam pela arena. Pressione [AÇÃO] perto de um bloco para empurrá-lo com força. Acerte os adversários com blocos em alta velocidade para tirar vidas!',chicken:'Plataforma que ENCOLHE! Fique em cima e não caia. Empurre os outros para fora. A plataforma fica vermelha quando está pequena — cuidado nas bordas!',magnet:'Cada jogador é um ímã! [AÇÃO] troca entre polo N (atrai) e polo S (repele). Use para atrair bolas metálicas nos outros, ou repelir jogadores para fora do círculo!',drill:'Pressione [AÇÃO] na direção que quer perfurar para criar um buraco no chão. Adversários que pisarem no buraco caem! Mas cuidado — você também pode cair!',thunder:'Raios caem do céu — um aviso vermelho ⚠ aparece ANTES do golpe! Mova-se para os lados rapidamente. Cada raio que acerta tira 1 vida. Sobreviva mais tempo para marcar pontos!',runner:'Scroll infinito acelerado! ↑ ou [AÇÃO] para pular sobre obstáculos baixos. Use ← → para pequenos ajustes. A velocidade aumenta com o tempo — reaja cada vez mais rápido!',boostrace:'Mova ↑ ↓ para desviar de barreiras 🚧 na pista. Colete ⚡ para carregar o boost. Pressione [AÇÃO] para ativar o Turbo — velocidade explode por 0.7s! Mais distância = mais pontos.',bullet:'Ondas de balas surgem em padrões: espiral 🔴, cruz 🟠, chuva verde, expansão azul, aleatório roxo. Mova em todas as direções. Após ser atingido, fica invencível por 1s (pisca).',flappy:'Cada jogador controla um pássaro. Pressione [AÇÃO] ou ↑ para bater as asas. Não toque nos canos ou no chão! Mais canos passados = mais pontos.',hockey:'Times esquerdo vs direito. Use ↑ ↓ para mover o paddle. Mande o puck para o gol adversário! Primeiro a 5 gols ou mais gols no tempo.',bumper:'Controle seu carrinho com ↑ para acelerar e ← → para girar. Cada colisão forte conta pontos. Mais batidas = vence!',bomb:'Alguém começa com a bomba. [AÇÃO] perto de outro jogador para passar. A bomba explode após alguns segundos — eliminado!',tag:'Um jogador começa como pegador (coroa 👑). Ele é mais lento. Toque para passar! Quem ficar menos tempo como pegador vence.',cannon:'Canhão num canto. ← → girar mira, [AÇÃO] disparar. Acerte o canhão dos outros. Cada canhão tem 5 vidas. Balas ricocheteiam!',shrinkzone:'Zona verde encolhe continuamente. Fique dentro! Quem sair perde 1 vida por segundo. Empurre adversários para fora. Último vence.',tictactoe:'P1/P3 = ❌  vs  P2/P4 = ⭕. Setas para mover cursor, [AÇÃO] para marcar. Faça 3 em linha para vencer a rodada. Melhor de 3!',reflect:'Sequência de setas aparece — MEMORIZE! Depois reproduza na ordem correta. Acerto = +2pts, erro = -1pt. Sequência cresce cada rodada!',minigolf:'← → para mirar, segure [AÇÃO] para carregar potência, solte para tacar. Desvie de obstáculos. Menos tacadas = mais pontos!',done:'Você conhece todos os jogos! Selecione os que quiser no lobby, escolha a quantidade de rodadas e divirta-se. Pode voltar ao tutorial a qualquer momento!'},
    tutHint:{controls:'EXPERIMENTE MOVER OS PERSONAGENS AGORA!',sumo:'GANHE VELOCIDADE ANTES DE COLIDIR!',collect:'PRIORIZE AS MOEDAS DE OURO!',race:'DESVIE DAS PEDRAS — NÃO REDUZA A VELOCIDADE!',laststand:'NUNCA PARE DE SE MOVER!',icerink:'DEIXE A FÍSICA TRABALHAR POR VOCÊ!',tug:'MARTELE [AÇÃO] RÁPIDO — NÃO PARE!',soccer:'[AÇÃO] = CHUTE FORTE!',paint:'CUBRA O MÁXIMO DE CHÃO — REPINTE O DOS OUTROS!',king:'SEGURE A ZONA — EXPULSE OS INVASORES!',volley:'POSICIONE-SE EMBAIXO DA BOLA ANTES QUE CAI!',bounce:'MOVA COM ← → OU ↑ ↓  —  NÃO DEIXE PASSAR!',zombie:'HUMANOS: FOGEM!   ZUMBIS: CAÇAM EM BANDO!',asteroid:'GIRE, PROPULSE E ATIRE COM [AÇÃO]!',snake:'NÃO BATA — PENSE ANTES DE VIRAR!',gravity:'ROUBE A BANDEIRA — FUJA GIRANDO!',hotfloor:'↑ OU [AÇÃO] = PULAR  —  NUNCA FIQUE NO CHÃO!',duel:'[AÇÃO] = ATIRAR  —  BALAS RICOCHETEIAM!',balloon:'[AÇÃO] = AGULHA  —  MIRE NO BALÃO!',dash:'MOVA + [AÇÃO] = DASH NA DIREÇÃO!',builder:'CORRA + [AÇÃO] = MURO ATRÁS!',punch:'SEGURE [AÇÃO] → SOLTE PARA SOCAR!',iceblock:'[AÇÃO] PERTO DO BLOCO = EMPURRAR!',chicken:'NÃO CAIA! EMPURRE OS OUTROS!',magnet:'[AÇÃO] = TROCAR N/S  •  N=ATRAI  S=REPELE',drill:'[AÇÃO] + DIREÇÃO = PERFURAR O CHÃO!',thunder:'OBSERVE OS AVISOS ⚠ — MOVA NA HORA CERTA!',runner:'↑ OU [AÇÃO] = PULAR  •  ← → AJUSTAR!',boostrace:'↑ ↓ DESVIAR  •  COLETE ⚡  •  [AÇÃO] = TURBO!',bullet:'MOVA CONSTANTEMENTE — NUNCA FIQUE PARADO!',flappy:'[AÇÃO] OU ↑ = VOAR  •  CONTROLE A ALTITUDE!',hockey:'↑ ↓ MOVER  •  INTERCEPTE O PUCK!',bumper:'↑ ACELERA  •  ← → GIRA  •  BATA EM TODOS!',bomb:'[AÇÃO] PERTO = PASSA A BOMBA!',tag:'PEGADOR = 👑  •  TOQUE PARA TRANSFERIR!',cannon:'← → MIRA  •  [AÇÃO] DISPARA!',shrinkzone:'FIQUE NA ZONA  •  EMPURRE OS OUTROS!',tictactoe:'SETAS = MOVER  •  [AÇÃO] = MARCAR!',reflect:'MEMORIZE → REPRODUZA NA ORDEM CERTA!',minigolf:'← → MIRA  •  [AÇÃO] CARREGA  •  SOLTE = TACADA!',done:'BOA SORTE — QUE COMECEM OS JOGOS! 🎉'}
  },

    descs:{sumo:'Push everyone off the circle!',collect:'Collect more items than others!',race:'First to the finish line wins!',laststand:'Dodge projectiles and survive!',icerink:'Slippery arena — slide others off!',tug:'Mash [ACTION] to pull the rope!',soccer:'Score 3 goals to win!',paint:'Cover more floor than others!',king:'Stay in the golden zone longest!',volley:'Don\'t let the ball drop on your side!',bounce:'Deflect balls — don\'t take points!',dash:'[ACTION] = lightning dash — run over!',builder:'[ACTION] = wall behind you — trap foes!',punch:'Hold [ACTION] and release a shockwave!',iceblock:'[ACTION] near block = push into foes!',chicken:'Don\'t fall off the shrinking platform!',magnet:'[ACTION] = switch N/S — attract or repel!',drill:'[ACTION] = drill holes — set traps!',zombie:'Run from zombies — infected join the hunt!',asteroid:'← → rotate ↑ thrust [ACTION] shoot!',snake:'Grow your snake and trap opponents!',gravity:'Grab the flag and hold it longest!',hotfloor:'Stay on platforms — lava rises!',duel:'Aim and shoot — 3 bullets each!',balloon:'[ACTION] = needle — pop others\' balloons!',thunder:'Dodge lightning — watch for warnings ⚠!',runner:'Jump obstacles — speed increases!',boostrace:'↑ ↓ dodge, grab ⚡, [ACTION] = turbo!',bullet:'Dodge bullet waves in varied patterns!',flappy:'Tap [ACTION] to fly — dodge pipes!',hockey:'Shoot the puck into the opponent goal!',bumper:'Ram everyone — more hits = more points!',bomb:'Pass the bomb before it explodes!',tag:'Run from the tagger — or tag them all!',cannon:'Aim your cannon and fire at opponents!',shrinkzone:'Stay inside the zone — it shrinks!',tictactoe:'Get 3 in a row before the others!',reflect:'Repeat the button sequence fastest!',minigolf:'Sink the hole in fewest shots!'},
    tutGame:{controls:'🎮 CONTROLS',sumo:'🥋 SUMO',collect:'⭐ STAR GRAB',race:'🏁 RACE',laststand:'💥 LAST STAND',icerink:'🧊 ICE RINK',tug:'🪢 TUG OF WAR',soccer:'⚽ MINI SOCCER',paint:'🎨 PAINT WAR',king:'👑 KING OF THE HILL',volley:'🏐 VOLLEY',bounce:'🏓 PONG CHAOS',zombie:'🧟 ZOMBIE',asteroid:'☄️ ASTEROIDS',snake:'🐍 SNAKE',gravity:'🚀 ZERO GRAVITY',hotfloor:'🌋 LAVA FLOOR',duel:'🔫 DUEL',balloon:'🎈 BALLOON',dash:'⚡ DASH ATTACK',builder:'🧱 BUILDER',punch:'🥊 SHOCKWAVE',iceblock:'🧊 ICE BLOCK',chicken:'🐔 CHICKEN',magnet:'🧲 MAGNET',drill:'🔩 DRILLER',thunder:'🌩️ LIGHTNING',runner:'🏃 RUNNER',boostrace:'🚗 TURBO BOOST',bullet:'💣 BULLET HELL',done:'🏆 READY!',flappy:'🐦 FLAPPY CHAOS',hockey:'🏒 HOCKEY',bumper:'🚗 BUMPER CARS',bomb:'💣 HOT POTATO',tag:'🏃 TAG',cannon:'💥 CANNON',shrinkzone:'☠️ SHRINK ZONE',tictactoe:'⭕ TIC-TAC-TOE',reflect:'🪞 REFLEX',minigolf:'⛳ MINI GOLF'},
    tutDesc:{controls:'Each player uses their own set of keys. All games use the same keys — learn once, play forever!',sumo:'Push opponents OUT of the circle. Each player has 3 lives. Build up speed before colliding to push harder. Last one inside wins!',collect:'Collect as many items as possible! ⭐ = 1pt, 🪙 = 2pts, 💰 = 5pts. Most points wins!',race:'Reach the finish line first! Dodge rocks along the way. The further right you are, the closer to victory!',laststand:'Projectiles come from all sides — dodge them! Each hit costs 1 point. Survive longer than everyone else!',icerink:'Slippery arena! You SLIDE without stopping. Use momentum to bump others off the circle!',tug:'Even team vs odd team. Mash [ACTION] as fast as possible to pull the rope to your side!',soccer:'1v1 or 2v2! Left vs right. Press [ACTION] to kick harder. First to 3 goals wins!',paint:'Run across the map painting the floor your color! Most area covered at time\'s end wins. Run over others\' paint to repaint!',king:'Stay inside the golden zone to accumulate time. Most time inside wins. Push others out!',volley:'Two sides, one court. Don\'t let the ball drop on your side! Ball gets faster over time!',bounce:'Each player has a paddle on a wall. Use ← → or ↑ ↓ to move. If the ball passes you, lose 1 life. More balls spawn over time!',zombie:'One player starts as a zombie (green). Touch humans to infect them! Last human alive wins. Humans are faster!',asteroid:'Spaceship in space! ← → to rotate, ↑ for thrust, [ACTION] to shoot. Destroy asteroids for points. Watch for collisions!',snake:'Guide your snake to eat food and grow. Colliding with walls or other snakes = game over. Longest snake with most points wins!',gravity:'Zero gravity ship: ← → to rotate, ↑ for thrust. Grab the flag 🚩 and hold it longest. Flag holder earns 1★ per second!',hotfloor:'Lava RISES continuously! Jump between platforms with ↑ or [ACTION]. Falling in lava loses 1 life. Lava speeds up over time!',duel:'← → to aim, ↑ ↓ to move, [ACTION] to fire. 3 bullets per reload — auto-reloads after 3s. Bullets ricochet off walls!',balloon:'Each player has a colored balloon flying above them. Press [ACTION] to fire a needle. Pop others\' balloons to eliminate them! Last with balloon wins.',dash:'Press [ACTION] for a lightning dash in your movement direction. Run over opponents to take their lives! Cooldown after each dash.',builder:'Press [ACTION] to build a wall behind you. Surround enemies to eliminate them — if 3 sides have others\' walls, you\'re out!',punch:'Hold [ACTION] to charge — bar appears above. More charge = stronger shockwave! Players hit with >60% charge lose a life!',iceblock:'Ice blocks slide around the arena. Press [ACTION] near a block to push it hard. Hit opponents with fast blocks to take their lives!',chicken:'The platform SHRINKS! Stay on top and don\'t fall. Push others off. Platform turns red when small — watch the edges!',magnet:'Each player is a magnet! [ACTION] switches between N (attract) and S (repel). Use to pull metal balls at enemies or repel players off!',drill:'Press [ACTION] in your movement direction to drill a hole. Opponents stepping on holes fall through! But you can fall too!',thunder:'Lightning bolts fall from above — a red warning ⚠ appears BEFORE the strike! Move sideways quickly. Each hit costs 1 life. Survive for points!',runner:'Infinite scrolling runner! ↑ or [ACTION] to jump over obstacles. ← → for small adjustments. Speed increases over time — react faster!',boostrace:'Move ↑ ↓ to dodge barriers 🚧. Collect ⚡ to charge boost. Press [ACTION] to activate Turbo — speed explodes for 0.7s! More distance = more points.',bullet:'Bullet waves fire in patterns: spiral 🔴, cross 🟠, rain green, expand blue, random purple. Move in all directions. 1s invincibility after being hit.',flappy:'Each player controls a bird. Press [ACTION] or ↑ to flap. Don\'t hit pipes or floor! More pipes passed = more points.',hockey:'Left vs right teams. Use ↑ ↓ to move paddle. Send puck into opponent goal! First to 5 goals or most in time wins.',bumper:'Drive with ↑ to accelerate and ← → to steer. Each hard collision scores points. Most bumps = wins!',bomb:'Someone starts with the bomb. [ACTION] near another player to pass it. Bomb explodes after a few seconds — eliminated!',tag:'One player starts as it (crown 👑). They are slower. Touch to pass it! Least time as it wins.',cannon:'Cannon in a corner. ← → to aim, [ACTION] to fire. Hit other cannons. Each has 5 lives. Bullets ricochet!',shrinkzone:'Green zone shrinks constantly. Stay inside! Stepping out loses 1 life per second. Push opponents out. Last one wins.',tictactoe:'P1/P3 = ❌  vs  P2/P4 = ⭕. Arrows to move cursor, [ACTION] to mark. Get 3 in a row to win the round. Best of 3!',reflect:'Sequence of arrows appears — MEMORIZE! Then reproduce in order. Correct = +2pts, wrong = -1pt. Sequence grows each round!',minigolf:'← → to aim, hold [ACTION] to charge power, release to shoot. Dodge obstacles. Fewer shots = more points!',done:'You know all the games! Select your favorites in the lobby, choose the number of rounds, and have fun. You can return to the tutorial anytime!'},
    tutHint:{controls:'TRY MOVING YOUR CHARACTERS NOW!',sumo:'BUILD SPEED BEFORE COLLIDING!',collect:'PRIORITIZE GOLD COINS!',race:'DODGE ROCKS — DON\'T SLOW DOWN!',laststand:'NEVER STOP MOVING!',icerink:'LET PHYSICS WORK FOR YOU!',tug:'MASH [ACTION] FAST — DON\'T STOP!',soccer:'[ACTION] = POWER KICK!',paint:'COVER MAX FLOOR — REPAINT OTHERS\'!',king:'HOLD THE ZONE — EXPEL INVADERS!',volley:'GET UNDER THE BALL BEFORE IT FALLS!',bounce:'MOVE ← → OR ↑ ↓  —  DON\'T LET IT PASS!',zombie:'HUMANS: RUN!   ZOMBIES: HUNT IN PACKS!',asteroid:'ROTATE, THRUST AND SHOOT WITH [ACTION]!',snake:'DON\'T CRASH — THINK BEFORE TURNING!',gravity:'STEAL THE FLAG — ESCAPE BY SPINNING!',hotfloor:'↑ OR [ACTION] = JUMP  —  NEVER TOUCH LAVA!',duel:'[ACTION] = SHOOT  —  BULLETS RICOCHET!',balloon:'[ACTION] = NEEDLE  —  AIM AT THE BALLOON!',dash:'MOVE + [ACTION] = DASH THAT DIRECTION!',builder:'RUN + [ACTION] = WALL BEHIND YOU!',punch:'HOLD [ACTION] → RELEASE TO PUNCH!',iceblock:'[ACTION] NEAR BLOCK = PUSH IT!',chicken:'DON\'T FALL! PUSH THE OTHERS OFF!',magnet:'[ACTION] = SWITCH N/S  •  N=ATTRACT  S=REPEL',drill:'[ACTION] + DIRECTION = DRILL THE FLOOR!',thunder:'WATCH WARNINGS ⚠ — MOVE IN TIME!',runner:'↑ OR [ACTION] = JUMP  •  ← → ADJUST!',boostrace:'↑ ↓ DODGE  •  GRAB ⚡  •  [ACTION] = TURBO!',bullet:'KEEP MOVING — NEVER STAND STILL!',flappy:'[ACTION] OR ↑ = FLAP  •  CONTROL YOUR HEIGHT!',hockey:'↑ ↓ MOVE  •  INTERCEPT THE PUCK!',bumper:'↑ ACCELERATE  •  ← → STEER  •  HIT EVERYONE!',bomb:'[ACTION] NEARBY = PASS THE BOMB!',tag:'IT = 👑  •  TOUCH TO TRANSFER!',cannon:'← → AIM  •  [ACTION] FIRE!',shrinkzone:'STAY IN THE ZONE  •  PUSH OTHERS OUT!',tictactoe:'ARROWS = MOVE  •  [ACTION] = MARK!',reflect:'MEMORIZE → REPRODUCE IN CORRECT ORDER!',minigolf:'← → AIM  •  [ACTION] CHARGE  •  RELEASE = SHOT!',done:'GOOD LUCK — LET THE GAMES BEGIN! 🎉'}

function updateAllUI(){
  const g=id=>document.getElementById(id);
  // Setup
  const sub=g('setupSub');if(sub)sub.textContent=t('who');
  const tBtn=g('tutorialBtn');if(tBtn)tBtn.textContent=t('tutorial');
  const cgBtn=g('chooseGamesBtn');if(cgBtn)cgBtn.textContent=t('choosegames');
  // Lobby
  const lobTitle=g('lobbyTitleEl');if(lobTitle)lobTitle.textContent=t('lobbyTitle');
  const scrollH=g('scrollHint');if(scrollH)scrollH.textContent=t('scrollHint');
  const backBtn=document.querySelector('#lobbyBtns .btn-ghost');if(backBtn)backBtn.textContent=t('back');
  const playBtn=g('playBtn');if(playBtn)playBtn.textContent=t('play');
  // Win
  const nextBtn=g('nextBtn');
  if(nextBtn){const isLast=typeof currentRoundGame!=='undefined'&&currentRoundGame>=(totalRounds-1);nextBtn.textContent=isLast?t('finalScore'):t('nextRound');}
  // Scores
  const ftEl=document.getElementById('finalTitleEl');if(ftEl)ftEl.textContent=t('finalTitle');
  const agBtn=g('playAgainBtn');if(agBtn)agBtn.textContent=t('playAgain');
  const menuBtn=g('menuBtn');if(menuBtn)menuBtn.textContent=t('menu');
  // Tutorial nav
  const tPrev=g('tutPrev');if(tPrev)tPrev.textContent=t('tutPrev');
  const tSkip=g('tutSkip');if(tSkip)tSkip.textContent=t('tutSkip');
  updateSelCount();
  // Section headers (rebuild if in lobby)
  document.querySelectorAll('.game-section-title').forEach((el,i)=>{el.textContent=i===0?t('classics'):t('newgames');});
}

function buildLangBars(){
  ['langBar','tutLangBar'].forEach(bid=>{
    const bar=document.getElementById(bid);
    if(!bar)return;
    bar.innerHTML=Object.entries(LANGS).map(([code,l])=>`<button class="lang-btn${code===curLang?' active':''}" data-lang="${code}" onclick="setLang('${code}')">${l.label}</button>`).join('');
  });
}
function setLang(code){
  curLang=code;
  // Rebuild lobby cards completely to update both name AND desc
  if(!document.getElementById('sLobby').classList.contains('off'))buildLobby();
  else document.querySelectorAll('.game-card').forEach(card=>{
    const id=card.id.replace('gc_','');
    const L3=LANGS[code]||LANGS.pt;const nm=card.querySelector('.game-name');const dc=card.querySelector('.game-desc');
    if(nm&&L3.names[id])nm.textContent=L3.names[id];if(dc&&L3.descs[id])dc.textContent=L3.descs[id];
  });
  // Update lang buttons
  document.querySelectorAll('.lang-btn').forEach(b=>{b.classList.toggle('active',b.dataset.lang===code);});
  updateAllUI();
  buildLangBars();
  // Update tutorial if visible
  if(document.getElementById('sTutorial').style.display!=='none')tutRender();
}

  // ── MINI GOLFE ───────────────────────────────────────────────

    id:'minigolf',game:'⛳ MINI GOLFE',color:'#2ecc71',

      cx.fillStyle='#2d6a2d';cx.fillRect(0,0,w,h);

      for(let x=0;x<w;x+=28)for(let y=0;y<h;y+=28)
        if(((x/28)+(y/28))%2===0)cx.fillRect(x,y,28,28);
      cx.strokeStyle='#8B4513';cx.lineWidth=10;cx.strokeRect(5,5,w-10,h-10);
      cx.fillStyle='#8B4513';cx.fillRect(w*0.42,h*0.2,8,h*0.25);cx.fillRect(w*0.62,h*0.55,8,h*0.25);
      // Hole
      const hx=w*0.72,hy=h*0.38;
      cx.fillStyle='#111';cx.beginPath();cx.arc(hx,hy,13,0,Math.PI*2);cx.fill();
      cx.fillStyle='#ff4757';cx.fillRect(hx,hy-28,3,20);
      cx.font='12px Nunito';cx.textAlign='left';cx.fillText('⛳',hx-2,hy-10);

        }

      cx.fillStyle='rgba(255,211,42,.95)';cx.font='bold 26px Fredoka One';cx.textAlign='center';cx.fillText('HOUSE OF JOY',w/2,h*.68);
      cx.fillStyle='rgba(255,255,255,.55)';cx.font='13px Nunito';cx.fillText(tc('tagline'),w/2,h*.78);
